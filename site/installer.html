<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Tuned Yota — Installer Console</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/fox.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#3A2E26">
<style>
  :root{--ink:#3A2E26;--accent:#5B4B42;--line:#d8d2ca;--muted:#7c8472;}
  *{box-sizing:border-box;} body{font-family:-apple-system,Arial,sans-serif;color:var(--ink);margin:0;background:#faf8f5;}
  main{max-width:640px;margin:0 auto;padding:16px 14px 60px;}
  h1{font-size:19px;color:var(--accent);margin:6px 0 10px;}
  input{width:100%;padding:12px;font-size:16px;border:1px solid var(--line);border-radius:8px;}
  .btn{padding:12px;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:8px;cursor:pointer;}
  .btn[disabled]{opacity:.45;}
  .link{display:inline-block;margin:2px 0 8px;color:#2f5d8a;font-size:14px;}
  .card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:#fff;}
  .top{display:flex;justify-content:space-between;gap:8px;font-size:14px;}
  .who{font-weight:700;} .meta{color:var(--muted);font-size:13px;margin:2px 0 6px;}
  .ffnote{background:#fdf3e3;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:6px 8px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn{background:#fdf0dd;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:8px 10px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn-h{font-weight:700;margin-bottom:2px;} .vinwarn ul{margin:2px 0 4px;padding-left:18px;}
  select{padding:9px;font-size:15px;border:1px solid var(--line);border-radius:8px;width:100%;margin:6px 0;}
  .row-actions{display:flex;gap:8px;margin-top:6px;} .row-actions .btn{flex:1;}
  .ns{background:#8a6a3a;} .done{color:#2f5d2a;font-weight:700;} .noshow{color:#8a2a2a;font-weight:700;}
  .hidden{display:none;} .msg{margin-top:8px;font-size:13px;} .err{color:#8a2a2a;} .msg.ok{color:#2f5d2a;font-weight:700;}
  .otthdr{font-size:11px;color:var(--muted);margin:10px 0 0;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .nsconfirm{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px;color:#8a2a2a;}
  .nsconfirm input{width:auto;}
  .banner{background:#fff4e5;border:1px solid #e0b877;border-radius:10px;padding:4px 12px;margin:10px 0;}
  .mnav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 6px;}
  .mnav .lbl{font-weight:800;color:var(--accent);font-size:16px;}
  .mnav button{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:16px;cursor:pointer;}
  details{border:1px solid var(--line);border-radius:10px;background:#fff;margin:8px 0;}
  summary{padding:12px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:8px;}
  summary::-webkit-details-marker{display:none;}
  details[open]>summary{border-bottom:1px solid var(--line);}
  .dbody{padding:2px 12px 8px;}
  .count{color:var(--muted);font-weight:600;}
  .sec-h{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;}
  .walkform input{margin:5px 0;}
  .scanvin{background:#5B4B42;margin:0 0 6px;width:100%;}
  .scanwrap{position:relative;margin:6px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;}
  .scanwrap video{width:100%;display:block;max-height:60vh;object-fit:cover;}
  .scanhint{color:#fff;font-size:12px;text-align:center;padding:6px;background:rgba(0,0,0,.55);position:absolute;top:0;left:0;right:0;}
  .scanmsg{color:#ffe;font-size:12px;text-align:center;padding:4px 4px 8px;background:#000;}
  /* --- smart-feed dashboard --- */
  .hdr{position:sticky;top:0;z-index:5;background:#faf8f5;padding:6px 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .tally{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;font-size:13px;color:var(--muted);margin:2px 0 8px;}
  .tally b{color:var(--ink);font-size:15px;} .tally .g{color:#2f5d2a;} .tally .o{color:#8a5a12;} .tally .r{color:#8a2a2a;}
  .tally .next{flex-basis:100%;color:var(--accent);font-weight:600;}
  .search{position:relative;}
  .search input{width:100%;padding:11px 34px 11px 12px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;}
  .search .x{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:#e7e2da;color:#555;width:24px;height:24px;border-radius:12px;font-size:15px;line-height:1;cursor:pointer;}
  .sec{margin:16px 0 4px;} .sec .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .sec.warn .lbl{color:#8a5a12;}
  .evt{border:1px solid var(--line);border-radius:11px;background:#fff;margin:8px 0;overflow:hidden;}
  .evt.warn{border-color:#e6c99a;} .evt.today{border-color:#bcd0bc;}
  .evt>summary{padding:12px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .evt>summary::-webkit-details-marker{display:none;}
  .evt[open]>summary{border-bottom:1px solid var(--line);}
  .evt .etitle{font-weight:800;font-size:15px;color:var(--accent);} .evt .edate{font-size:12px;color:var(--muted);font-weight:600;}
  .pill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;background:#eef1ea;color:var(--muted);}
  .pill.hasopen{background:#fdf0dd;color:#8a5a12;} .pill.alldone{background:#e7f2e2;color:#2f5d2a;}
  .ebody{padding:4px 12px 10px;}
  .donehdr{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;border-top:1px dashed var(--line);padding-top:8px;}
  .addwalk{width:100%;margin:8px 0 2px;background:#5B4B42;} .walkmini input{margin:5px 0;} .walkmini select{margin:5px 0;}
  .walkmini .fld{font-size:12px;color:var(--muted);font-weight:700;margin:6px 0 0;display:block;}
  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .showmore{width:100%;background:#fff;color:var(--accent);border:1px dashed var(--line);border-radius:9px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;margin:6px 0;}
  .card .installer-tag{font-size:11px;font-weight:700;color:#5B4B42;background:#eef1ea;padding:1px 6px;border-radius:10px;}
</style>
</head>
<body>
<main>
  <h1>Tuned Yota — Installer Console</h1>
  <div id="gate">
    <input id="tok" type="password" autocomplete="off" placeholder="Your installer passcode">
    <div style="height:8px"></div>
    <button class="btn" id="unlock" style="width:100%">Unlock</button>
  </div>
  <div id="app" class="hidden">
    <a class="link" href="/calibration.html">Calibration reference (cal ID · TSB)</a>
    <a class="link" href="#" id="logout" style="margin-left:14px;color:#8a2a2a">Log out</a>
    <div id="header" class="hdr"></div>
    <div id="feed"></div>
    <div id="msg" class="msg"></div>
  </div>
</main>
<script>
  var CAL = ["Light","Mild","Medium","Spicy","SS","Light and Mild","Mild and Medium","Medium and Spicy","Spicy and SS"];
  var TP = ["VFT","HPT","PCM","BB"];
  var CT = ["Basic","MAF","Basic + MAF","Supercharger","CARB Update","9.2 New","9.2 Update","TCM Update","Custom","K-Line"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var STATE = { today:'', bookings:[], events:[], admin:false, installerFilter:'', q:'', showAllPast:false, eventOpen:{}, walkOpen:{}, vinBlocked:{} };

  function sel(id,list,ph){ return '<select id="'+id+'"><option value="" disabled selected>'+ph+'…</option>'+list.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>'; }
  function val(id){ var el=document.getElementById(id); return el?(el.value||'').trim():''; }
  function tok(){ return localStorage.getItem('ty_installer_token') || ''; }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }
  function ym(iso){ return (iso||'').slice(0,7); }
  function isOpen(b){ return b.status!=='Completed' && b.status!=='No-show' && b.status!=='Cancelled'; }
  function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }
  // The installer's LOCAL date (Central), not server UTC — UTC rolls to tomorrow in
  // the evening, which would mis-date an evening walk-in + push it into the wrong OTT month.
  function localToday(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
  function daysBetween(aISO,bISO){ return Math.round((Date.parse(aISO+'T00:00:00Z')-Date.parse(bISO+'T00:00:00Z'))/86400000); }
  // Human date relative to today: Today / Tomorrow / in N days / Mon D[, YYYY].
  function relDate(iso){
    if(!iso) return '';
    var p=iso.split('-'), md=MONTHS[parseInt(p[1],10)-1].slice(0,3)+' '+parseInt(p[2],10);
    var full=md+(p[0]!==STATE.today.slice(0,4)?', '+p[0]:'');
    var d=daysBetween(iso,STATE.today);
    if(d===0) return 'Today'; if(d===1) return 'Tomorrow';
    if(d>1 && d<=7) return 'in '+d+' days · '+md;
    return full;
  }

  document.getElementById('unlock').onclick=function(){ var v=document.getElementById('tok').value.trim(); if(!v) return; localStorage.setItem('ty_installer_token', v); showApp(); };
  if(tok()) showApp();
  document.getElementById('logout').onclick=function(e){ e.preventDefault(); localStorage.removeItem('ty_installer_token'); location.reload(); };
  async function showApp(){ if(!(await nativeLock())) return; document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); load(); }
  function fail(m){ var el=document.getElementById('msg'); el.className='msg err'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function succeed(m){ var el=document.getElementById('msg'); el.className='msg ok'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function clearMsg(){ var el=document.getElementById('msg'); el.className='msg'; el.textContent=''; }

  // --- Native (Capacitor) helpers — no-ops on the plain website ---
  function isNative(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }
  async function nativeLock(){
    if(!isNative()) return true;
    var B = window.Capacitor.Plugins && window.Capacitor.Plugins.BiometricAuth;
    if(!B) return true;
    try{ await B.authenticate({ reason:'Unlock Tuned Yota', allowDeviceCredential:true }); return true; }
    catch(e){ return false; }
  }
  async function registerPush(){
    if(!isNative()) return;
    var P = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
    if(!P) return;
    try{
      var perm = await P.requestPermissions(); if(perm.receive!=='granted') return;
      P.addListener('registration', function(t){
        fetch('/.netlify/functions/push-register',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({token:t.value,platform:(window.Capacitor.getPlatform&&window.Capacitor.getPlatform())||''})});
      });
      await P.register();
    }catch(e){}
  }

  async function load(){
    document.getElementById('feed').innerHTML='<div class="empty">Loading…</div>';
    var res = await fetch('/.netlify/functions/installer-roster', { headers:{ 'x-installer-token':tok() } });
    if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    if(!res.ok){ document.getElementById('feed').innerHTML='<div class="empty">Could not load roster.</div>'; return; }
    var data = await res.json();
    STATE.today = localToday(); STATE.bookings = data.bookings||[]; STATE.events = data.events||[];
    STATE.admin = !!data.admin;
    buildHeaderOnce();
    renderAll();
    registerPush();
  }

  // Admins see every installer's data; an optional filter narrows to one installer.
  function visibleBookings(){
    if(STATE.admin && STATE.installerFilter){ return STATE.bookings.filter(function(b){ return (b.installer||'')===STATE.installerFilter; }); }
    return STATE.bookings;
  }
  function visibleEvents(){
    if(STATE.admin && STATE.installerFilter){ return STATE.events.filter(function(e){ return (e.installer||'')===STATE.installerFilter; }); }
    return STATE.events;
  }

  // The sticky header (tally + admin filter + search) is built ONCE so typing in the
  // search box is never interrupted by a re-render; renderTally() only refreshes text.
  function buildHeaderOnce(){
    var host=document.getElementById('header'); if(!host || host.dataset.built) return; host.dataset.built='1';
    host.innerHTML =
      (STATE.admin?'<div style="margin-bottom:6px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Admin — viewing </label><select id="who"></select></div>':'')+
      '<div id="tally" class="tally"></div>'+
      '<div class="search"><input id="q" type="search" autocomplete="off" placeholder="Search name, VIN, vehicle, city…"><button class="x" id="qx" aria-label="Clear search" style="display:none">×</button></div>';
    var q=document.getElementById('q'), qx=document.getElementById('qx');
    q.oninput=function(){ STATE.q=this.value; qx.style.display=this.value?'':'none'; renderFeed(); };
    qx.onclick=function(){ STATE.q=''; q.value=''; qx.style.display='none'; q.focus(); renderFeed(); };
    var who=document.getElementById('who');
    if(who){ who.onchange=function(){ STATE.installerFilter=this.value; renderTally(); renderFeed(); }; }
  }

  function renderTally(){
    var who=document.getElementById('who');
    if(who){
      var keys=[], seen={};
      STATE.bookings.concat(STATE.events).forEach(function(b){ var k=b.installer||''; if(k&&!seen[k]){seen[k]=1;keys.push(k);} });
      keys.sort();
      who.innerHTML='<option value="">All installers</option>'+keys.map(function(k){ return '<option value="'+esc(k)+'"'+(STATE.installerFilter===k?' selected':'')+'>'+esc(cap(k))+'</option>'; }).join('');
    }
    var host=document.getElementById('tally'); if(!host) return;
    var mo=STATE.today.slice(0,7), mDone=0,mOpen=0,mNo=0,life=0;
    visibleBookings().forEach(function(b){
      if(b.status==='Completed') life++;
      if(ym(b.dateISO)===mo){ if(b.status==='Completed')mDone++; else if(b.status==='No-show')mNo++; else if(isOpen(b))mOpen++; }
    });
    var next=null;
    buildEvents().forEach(function(e){ if(e.dateISO>=STATE.today && (!next||e.dateISO<next.dateISO)) next=e; });
    host.innerHTML=
      '<span>This month <b class="g">'+mDone+'</b> done · <b class="o">'+mOpen+'</b> open'+(mNo?' · <b class="r">'+mNo+'</b> no-show':'')+'</span>'+
      '<span>Lifetime <b>'+life+'</b> tunes ✓</span>'+
      (next?'<span class="next">Next: '+esc(next.city)+' · '+esc(relDate(next.dateISO))+'</span>':'');
  }

  function renderAll(){ renderTally(); renderFeed(); }

  function bySlot(a,b){ return String(a.slot||'').localeCompare(String(b.slot||''),undefined,{numeric:true}); }

  // Merge scheduled event shells + grouped bookings into one event list keyed city|date,
  // each with done/open/no-show counts. This is the single source the feed renders from.
  function buildEvents(){
    var map={};
    function ev(city,dateISO,installer){ var k=city+'|'+dateISO; return (map[k]=map[k]||{key:k,city:city,dateISO:dateISO,installer:installer||'',bookings:[]}); }
    visibleEvents().forEach(function(e){ ev(e.city,e.dateISO,e.installer); });
    visibleBookings().forEach(function(b){ var e=ev(b.city,b.dateISO,b.installer); e.bookings.push(b); if(b.installer) e.installer=b.installer; });
    return Object.keys(map).map(function(k){
      var e=map[k]; e.done=0; e.open=0; e.no=0;
      e.bookings.forEach(function(b){ if(b.status==='Completed')e.done++; else if(b.status==='No-show')e.no++; else if(isOpen(b))e.open++; });
      e.total=e.bookings.length; e.hasOpen=e.open>0; return e;
    });
  }

  function matchesQ(b){
    var q=STATE.q.trim().toLowerCase(); if(!q) return true;
    return [b.name,b.vehicle,b.vin,b.city,b.calibration,b.phone,b.tuningPlatform,b.calibrationType]
      .some(function(v){ return String(v||'').toLowerCase().indexOf(q)>=0; });
  }

  function secHead(label,cls){ var d=document.createElement('div'); d.className='sec'+(cls?' '+cls:''); d.innerHTML='<span class="lbl">'+esc(label)+'</span>'; return d; }

  function renderFeed(){
    var host=document.getElementById('feed'); host.innerHTML='';
    var events=buildEvents();

    // Search mode: flat, all-history, event-grouped results (newest first).
    if(STATE.q.trim()){
      var hits=events.map(function(e){ return { e:e, bs:e.bookings.filter(matchesQ) }; })
        .filter(function(x){ return x.bs.length; })
        .sort(function(a,b){ return b.e.dateISO.localeCompare(a.e.dateISO); });
      var n=hits.reduce(function(s,x){ return s+x.bs.length; },0);
      host.appendChild(secHead('Search results ('+n+')',''));
      if(!n){ host.innerHTML+='<div class="empty">No matches.</div>'; return; }
      hits.forEach(function(x){ host.appendChild(eventCard(x.e, x.bs, true, false)); });
      return;
    }

    host.appendChild(anydayWalkForm());   // everyday walk-in / call-in — always available, any day

    var t=STATE.today;
    var needs=events.filter(function(e){ return e.dateISO<t && e.hasOpen; }).sort(function(a,b){ return b.dateISO.localeCompare(a.dateISO); });
    var today=events.filter(function(e){ return e.dateISO===t; }).sort(function(a,b){ return a.city.localeCompare(b.city); });
    var upcoming=events.filter(function(e){ return e.dateISO>t; }).sort(function(a,b){ return a.dateISO.localeCompare(b.dateISO); });
    var recent=events.filter(function(e){ return e.dateISO<t && !e.hasOpen && e.total>0; }).sort(function(a,b){ return b.dateISO.localeCompare(a.dateISO); });

    if(!needs.length && !today.length && !upcoming.length && !recent.length){
      var em=document.createElement('div'); em.className='empty'; em.textContent='No jobs yet. Use “Log a walk-in / call-in” above for everyday work; scheduled events show here too.'; host.appendChild(em); return;
    }
    if(needs.length){ host.appendChild(secHead('Needs close-out','warn')); needs.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true)); }); }
    if(today.length){ host.appendChild(secHead('Today','')); today.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true)); }); }
    if(upcoming.length){ host.appendChild(secHead('Upcoming','')); upcoming.forEach(function(e,i){ host.appendChild(eventCard(e,e.bookings,i===0,true)); }); }
    if(recent.length){
      host.appendChild(secHead('Recent',''));
      (STATE.showAllPast?recent:recent.slice(0,5)).forEach(function(e){ host.appendChild(eventCard(e,e.bookings,false,false)); });
      if(recent.length>5 && !STATE.showAllPast){
        var btn=document.createElement('button'); btn.className='showmore'; btn.textContent='Show older events ('+(recent.length-5)+') ▾';
        btn.onclick=function(){ STATE.showAllPast=true; renderFeed(); }; host.appendChild(btn);
      }
    }
  }

  // One event = one <details> card. defaultOpen sets the initial state; the user's own
  // toggle is remembered in STATE.eventOpen so a close-out never collapses it. canAdd
  // shows the per-event walk-in adder (actionable events only).
  function eventCard(e, bookings, defaultOpen, canAdd){
    var open=(e.key in STATE.eventOpen)?STATE.eventOpen[e.key]:defaultOpen;
    var det=document.createElement('details');
    det.className='evt'+(e.dateISO<STATE.today&&e.hasOpen?' warn':(e.dateISO===STATE.today?' today':''));
    det.open=open;
    det.addEventListener('toggle',function(){ STATE.eventOpen[e.key]=det.open; });
    var pillCls=e.total===0?'':(e.hasOpen?'hasopen':'alldone');
    var pillTxt=e.total===0?'no bookings':(e.done+' done'+(e.open?' · '+e.open+' open':'')+(e.no?' · '+e.no+' no-show':''));
    var tag=STATE.admin&&e.installer?' <span class="installer-tag">'+esc(e.installer)+'</span>':'';
    var sum=document.createElement('summary');
    sum.innerHTML='<span><span class="etitle">'+esc(e.city)+'</span>'+tag+'<br><span class="edate">'+esc(relDate(e.dateISO))+'</span></span>'+
      '<span class="pill '+pillCls+'">'+esc(pillTxt)+'</span>';
    det.appendChild(sum);
    var body=document.createElement('div'); body.className='ebody';
    if(canAdd) body.appendChild(walkAdder(e));
    bookings.filter(isOpen).sort(bySlot).forEach(function(b){ body.appendChild(rowCard(b)); });
    bookings.filter(function(b){return b.status==='No-show';}).sort(bySlot).forEach(function(b){ body.appendChild(rowCard(b)); });
    var doneB=bookings.filter(function(b){return b.status==='Completed';}).sort(bySlot);
    if(doneB.length){ var h=document.createElement('div'); h.className='donehdr'; h.textContent='✓ Done ('+doneB.length+')'; body.appendChild(h); doneB.forEach(function(b){ body.appendChild(rowCard(b)); }); }
    if(!bookings.length && !canAdd){ var m=document.createElement('div'); m.className='empty'; m.textContent='No bookings.'; body.appendChild(m); }
    det.appendChild(body); return det;
  }

  // Per-event walk-in adder. Its open state persists in STATE.walkOpen[key] so it stays
  // put after a successful add (installers add several in a row). No id gymnastics —
  // inputs are held by reference so the event key never touches the DOM id space.
  function mkInput(ph){ var i=document.createElement('input'); i.placeholder=ph; return i; }
  function walkAdder(e){
    var det=document.createElement('details'); det.open=!!STATE.walkOpen[e.key];
    det.style.cssText='border:none;background:transparent;margin:0';
    det.addEventListener('toggle',function(){ STATE.walkOpen[e.key]=det.open; });
    var sum=document.createElement('summary'); sum.style.cssText='padding:8px 0;list-style:none;cursor:pointer';
    sum.innerHTML='<span style="font-weight:700;color:var(--accent)">+ Add walk-in</span>'; det.appendChild(sum);
    var box=document.createElement('div'); box.className='walkmini';
    var n=mkInput('Customer name'), v=mkInput('Vehicle (e.g. 2021 Tundra)'), p=mkInput('Phone'); p.inputMode='tel';
    var em=mkInput('Customer email (for their certificate)'); em.type='email';
    var btn=document.createElement('button'); btn.className='btn addwalk'; btn.textContent='Add walk-in to '+e.city;
    box.appendChild(n); box.appendChild(v); box.appendChild(p); box.appendChild(em); box.appendChild(btn);
    det.appendChild(box);
    btn.onclick=function(){ addWalkin(e,{name:n.value,vehicle:v.value,phone:p.value,email:em.value}); };
    return det;
  }

  // The installer's known markets, derived from their roster data (bookings + scheduled
  // events). Admin sees every city. Feeds the everyday walk-in location picker.
  function knownCities(){
    var seen={}, out=[];
    visibleBookings().forEach(function(b){ if(b.city&&!seen[b.city]){seen[b.city]=1;out.push(b.city);} });
    visibleEvents().forEach(function(e){ if(e.city&&!seen[e.city]){seen[e.city]=1;out.push(e.city);} });
    return out.sort();
  }

  // Top-level "log a walk-in on any day" — everyday call-in business, not tied to an
  // event. Captures the SAME info as an at-event walk-in (name/vehicle/phone) plus the
  // tune date (default today) + location, so the record + close-out fully feed the OTT
  // report. Creates a normal booking dated that day; it then appears in the feed.
  function anydayWalkForm(){
    var K='__anyday__';
    var det=document.createElement('details'); det.className='evt'; det.open=!!STATE.walkOpen[K];
    det.addEventListener('toggle',function(){ STATE.walkOpen[K]=det.open; });
    var sum=document.createElement('summary');
    sum.innerHTML='<span class="etitle">＋ Log a walk-in / call-in</span><span class="pill">any day</span>';
    det.appendChild(sum);
    var box=document.createElement('div'); box.className='ebody walkmini';
    var n=mkInput('Customer name'), v=mkInput('Vehicle — incl. year (e.g. 2021 Tundra)'), p=mkInput('Phone'); p.inputMode='tel';
    var ld=document.createElement('label'); ld.className='fld'; ld.textContent='Date of tune';
    var dt=document.createElement('input'); dt.type='date'; dt.value=STATE.today;
    var lc=document.createElement('label'); lc.className='fld'; lc.textContent='Location / market';
    var cities=knownCities(), city;
    if(cities.length){ city=document.createElement('select'); city.innerHTML=cities.map(function(x){return '<option>'+esc(x)+'</option>';}).join(''); }
    else { city=mkInput('City / market'); }
    var btn=document.createElement('button'); btn.className='btn addwalk'; btn.textContent='Log walk-in';
    var em=mkInput('Customer email (for their certificate)'); em.type='email';
    [n,v,p,ld,dt,lc,city,em,btn].forEach(function(el){ box.appendChild(el); });
    det.appendChild(box);
    btn.onclick=function(){
      var c=(city.value||'').trim(), d=(dt.value||'').trim();
      if(!c){ fail('Enter a city / market.'); return; }
      if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ fail('Pick the date of the tune.'); return; }
      STATE.walkOpen[K]=true;                       // keep this form open for the next entry
      addWalkin({city:c,dateISO:d,key:c+'|'+d},{name:n.value,vehicle:v.value,phone:p.value,email:em.value});
    };
    return det;
  }

  async function addWalkin(evt, vals){
    clearMsg();
    var name=(vals.name||'').trim(), vehicle=(vals.vehicle||'').trim(), phone=(vals.phone||'').trim();
    var email=(vals.email||'').trim();
    if(!name){ fail('Enter the customer name.'); return; }
    if(!phone){ fail('Enter a phone number.'); return; }
    var res=await fetch('/.netlify/functions/installer-walkin',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({city:evt.city,dateISO:evt.dateISO,name:name,vehicle:vehicle,phone:phone,email:email})});
    if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    var out=await res.json().catch(function(){return{};});
    if(out.status==='booked' && out.booking){
      STATE.walkOpen[evt.key]=true;        // keep this event's adder open for the next walk-in
      STATE.eventOpen[evt.key]=true;       // and keep the event itself expanded
      STATE.bookings.push(out.booking);
      renderAll();                         // #msg lives outside the feed, so this message survives
      succeed('✓ Added '+name+' — walk-in saved for '+evt.city+'.');
    } else {
      var er=out.error||('error '+res.status);
      fail( er==='unknown-event'   ? 'That event isn’t recognized — reload and try again.'
          : er==='not-your-market' ? 'That market isn’t assigned to you.'
          : er==='unknown-city'    ? 'That city isn’t a recognized market.'
          : er==='missing-contact' ? 'Enter both a customer name and a phone number.'
          : 'Could not add walk-in: '+er );
    }
  }

  // --- VIN scan (mirror of netlify/functions/lib/vin.js — keep in sync) ---
  function normalizeScannedVin(raw){
    var s=String(raw==null?'':raw).toUpperCase().replace(/[^A-Z0-9]/g,'');
    return /^[A-HJ-NPR-Z0-9]{17}$/.test(s)?s:'';
  }
  function canScan(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia); }
  var scanState=null, zxingLoading=null;
  function loadZXing(){
    if(window.ZXing) return Promise.resolve();
    if(zxingLoading) return zxingLoading;
    zxingLoading=new Promise(function(resolve,reject){
      var s=document.createElement('script'); s.src='/vendor/zxing.min.js';
      s.onload=function(){ resolve(); }; s.onerror=function(){ reject(new Error('zxing load failed')); };
      document.head.appendChild(s);
    });
    return zxingLoading;
  }
  function setScanMsg(id,m){ var el=document.getElementById('scanmsg_'+id); if(el) el.textContent=m; }
  function onVin(id,vin){ var i=document.getElementById('vin_'+id); if(i) i.value=vin; stopScan(id); checkVin(id); }
  function stopScan(id){
    if(scanState && scanState.id===id){
      if(scanState.raf) cancelAnimationFrame(scanState.raf);
      if(scanState.reader && scanState.reader.reset){ try{ scanState.reader.reset(); }catch(e){} }
      if(scanState.stream){ scanState.stream.getTracks().forEach(function(t){ t.stop(); }); }
      scanState=null;
    }
    var o=document.getElementById('scanov_'+id); if(o) o.remove();
    var b=document.getElementById('scan_'+id); if(b) b.style.display='';
  }
  async function startScan(id){
    if(isNative() && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner){
      try{
        var nres=await window.Capacitor.Plugins.BarcodeScanner.scan();
        var ncodes=(nres&&nres.barcodes)||[];
        for(var ni=0;ni<ncodes.length;ni++){ var nvin=normalizeScannedVin(ncodes[ni].rawValue||ncodes[ni].displayValue); if(nvin){ onVin(id,nvin); return; } }
        fail('No VIN barcode found — try again or type it.');
      }catch(e){ /* cancelled */ }
      return;
    }
    if(!canScan()) return;
    var card=document.getElementById('c_'+id); if(!card) return;
    if(document.getElementById('scanov_'+id)) return;
    var ov=document.createElement('div'); ov.id='scanov_'+id; ov.className='scanwrap';
    ov.innerHTML='<video id="scanvid_'+id+'" playsinline autoplay muted></video>'+
      '<div class="scanhint">Point at the VIN barcode — door jamb or windshield</div>'+
      '<div id="scanmsg_'+id+'" class="scanmsg"></div>'+
      '<button type="button" class="btn" id="scancx_'+id+'" style="width:100%;background:#8a2a2a">Cancel</button>';
    card.appendChild(ov);
    var sbtn=document.getElementById('scan_'+id); if(sbtn) sbtn.style.display='none';
    document.getElementById('scancx_'+id).onclick=function(){ stopScan(id); };
    var video=document.getElementById('scanvid_'+id);
    var stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } }); }
    catch(e){ setScanMsg(id,'Camera unavailable — type the VIN.'); return; }
    scanState={ id:id, stream:stream, raf:null, reader:null };
    video.srcObject=stream;
    if('BarcodeDetector' in window){
      var det=new window.BarcodeDetector({ formats:['code_39','data_matrix'] });
      var tick=async function(){
        if(!scanState || scanState.id!==id) return;
        try{ var codes=await det.detect(video);
          for(var i=0;i<codes.length;i++){ var vin=normalizeScannedVin(codes[i].rawValue); if(vin){ onVin(id,vin); return; } }
        }catch(e){}
        scanState.raf=requestAnimationFrame(tick);
      };
      scanState.raf=requestAnimationFrame(tick);
    } else {
      try{ await loadZXing(); }catch(e){ setScanMsg(id,'Scanner unavailable — type the VIN.'); return; }
      if(!scanState || scanState.id!==id) return;
      var Z=window.ZXing, reader;
      try{
        if(Z.DecodeHintType && Z.BarcodeFormat){
          var hints=new Map();
          hints.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.CODE_39,Z.BarcodeFormat.DATA_MATRIX]);
          hints.set(Z.DecodeHintType.TRY_HARDER,true);
          reader=new Z.BrowserMultiFormatReader(hints);
        } else { reader=new Z.BrowserMultiFormatReader(); }
      }catch(e){ reader=new Z.BrowserMultiFormatReader(); }
      scanState.reader=reader;
      reader.decodeFromVideoDevice(null, video, function(result){
        if(result){ var vin=normalizeScannedVin(result.getText?result.getText():result.text); if(vin){ onVin(id,vin); } }
      });
    }
  }

  var vinTimers = {};
  function scheduleVinCheck(id){ clearTimeout(vinTimers[id]); vinTimers[id]=setTimeout(function(){ checkVin(id); }, 500); }
  async function checkVin(id){
    var b = STATE.bookings.filter(function(x){ return x.id===id; })[0];
    var box = document.getElementById('vinwarn_'+id);
    if(!b || !box) return;
    var vin = val('vin_'+id).toUpperCase().replace(/[^A-Z0-9]/g,'');
    var clear = function(){ box.className='vinwarn hidden'; box.innerHTML=''; STATE.vinBlocked[id]=false; };
    if(vin.length!==17){ clear(); return; }
    try{
      var res = await fetch('/.netlify/functions/vin-decode',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({vin:vin,vehicle:b.vehicle,modelYear:b.modelYear})});
      var out = await res.json().catch(function(){ return {ok:true,warnings:[]}; });
      if(out.ok || !(out.warnings && out.warnings.length)){ clear(); return; }
      STATE.vinBlocked[id]=true;
      box.className='vinwarn';
      box.innerHTML='<div class="vinwarn-h">⚠ Check this VIN</div><ul>'+
        out.warnings.map(function(w){ return '<li>'+esc(w)+'</li>'; }).join('')+'</ul>'+
        '<label class="nsconfirm"><input type="checkbox" id="ackvin_'+id+'"> I\'ve verified this VIN is correct</label>';
    }catch(e){ clear(); }   // never block on our own failure
  }

  function rowCard(b){
    var c=document.createElement('div'); c.className='card'; c.id='c_'+b.id;
    var head='<div class="top"><span class="who">'+(b.slotLabel?esc(b.slotLabel)+' · ':'')+esc(b.name)+(b.isWalkin?' · walk-in':'')+'</span><span>'+esc(b.vehicle)+'</span></div>'+
      '<div class="meta">'+esc(b.phone)+(b.mods?' · '+esc(b.mods):'')+(STATE.admin&&b.installer?' · <b>'+esc(b.installer)+'</b>':'')+'</div>'+
      (b.flexFuelNote?'<div class="ffnote">⚠ '+esc(b.flexFuelNote)+'</div>':'');
    if(b.status==='Completed'){
      c.innerHTML=head+'<div class="done">✓ Completed'+(b.calibration?' · '+esc(b.calibration):'')+(b.vin?' · VIN '+esc(b.vin):'')+(b.tuningPlatform?' · '+esc(b.tuningPlatform)+(b.calibrationType?'/'+esc(b.calibrationType):''):'')+'</div>'+
        (b.certDelivery==='installer-fallback' ? '<div class="ffnote">No customer email on file — this certificate went to you. Re-open and add the email to send it to the customer.</div>' : '')+
        '<a href="#" class="link" id="cert_'+b.id+'">View / download certificate</a>';
      var certEl=c.querySelector('#cert_'+b.id);
      if(certEl) certEl.onclick=async function(e){
        e.preventDefault();
        var res=await fetch('/.netlify/functions/installer-certificate?recordId='+encodeURIComponent(b.id),{headers:{'x-installer-token':tok()}});
        if(!res.ok){ fail('Could not load certificate.'); return; }
        var html=await res.text();
        var url=URL.createObjectURL(new Blob([html],{type:'text/html'}));
        window.open(url,'_blank');
      };
      return c;
    }
    if(b.status==='No-show'){ c.innerHTML=head+'<div class="noshow">No-show · waitlisted</div>'; return c; }
    var opts='<option value="" disabled selected>Choose OTT Calibration…</option>'+CAL.map(function(o){return '<option>'+o+'</option>';}).join('');
    c.innerHTML=head+
      '<input id="vin_'+b.id+'" maxlength="17" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="VIN — 17 characters" style="text-transform:uppercase;margin:6px 0">'+
      (canScan()?'<button type="button" class="btn scanvin" id="scan_'+b.id+'">📷 Scan VIN</button>':'')+
      '<div id="vinwarn_'+b.id+'" class="vinwarn hidden"></div>'+
      '<select id="cal_'+b.id+'">'+opts+'</select>'+
      '<div class="otthdr">OTT commission report</div>'+
      sel('tp_'+b.id, TP, 'Tuning Platform')+
      sel('ct_'+b.id, CT, 'Calibration Type')+
      '<input id="ecu_'+b.id+'" autocomplete="off" spellcheck="false" placeholder="ECU ID" style="text-transform:uppercase;margin:5px 0">'+
      '<input id="gear_'+b.id+'" autocomplete="off" spellcheck="false" placeholder="Gear ratio (e.g. 4.30)" style="margin:5px 0">'+
      '<input id="mi_'+b.id+'" inputmode="numeric" autocomplete="off" placeholder="Mileage" style="margin:5px 0">'+
      '<input id="cem_'+b.id+'" type="email" autocomplete="off" placeholder="Customer email (for their certificate)" value="'+esc(b.email||'')+'" style="margin:5px 0">'+ 
      '<div class="row-actions"><button class="btn" id="ok_'+b.id+'">Mark complete</button></div>'+
      '<label class="nsconfirm"><input type="checkbox" id="nsc_'+b.id+'"> Customer didn\'t show — add to waitlist</label>'+
      '<div class="row-actions"><button class="btn ns" id="ns_'+b.id+'" disabled>No-show</button></div>';
    c.querySelector('#ok_'+b.id).onclick=function(){ complete(b.id); };
    if(canScan()){ var sb=c.querySelector('#scan_'+b.id); if(sb) sb.onclick=function(){ startScan(b.id); }; }
    var cb=c.querySelector('#nsc_'+b.id), nsb=c.querySelector('#ns_'+b.id);
    cb.onchange=function(){ nsb.disabled=!cb.checked; };
    nsb.onclick=function(){ if(cb.checked) closeout(b.id,{action:'noshow',confirmed:true}); };
    var vinEl = c.querySelector('#vin_'+b.id);
    if(vinEl) vinEl.oninput = function(){ scheduleVinCheck(b.id); };
    return c;
  }

  async function complete(id){
    clearMsg();
    var vin=val('vin_'+id).toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(vin.length!==17){ fail('Enter the full 17-character VIN.'); return; }
    var cal=val('cal_'+id); if(!cal){ fail('Pick an OTT Calibration.'); return; }
    var tp=val('tp_'+id); if(!tp){ fail('Pick the Tuning Platform.'); return; }
    var ct=val('ct_'+id); if(!ct){ fail('Pick the Calibration Type.'); return; }
    var ecu=val('ecu_'+id).toUpperCase(); if(!ecu){ fail('Enter the ECU ID.'); return; }
    var gear=val('gear_'+id); if(!gear){ fail('Enter the gear ratio.'); return; }
    var mi=val('mi_'+id).replace(/[^0-9]/g,''); if(!mi){ fail('Enter the mileage.'); return; }
    var cem=val('cem_'+id);
    if(STATE.vinBlocked[id]){ var ack=document.getElementById('ackvin_'+id); if(!(ack && ack.checked)){ fail("Double-check the VIN, or tick 'I've verified this VIN is correct'."); return; } }
    closeout(id,{action:'complete',calibration:cal,vin:vin,tuningPlatform:tp,calibrationType:ct,ecuId:ecu,gearSize:gear,mileage:mi,customerEmail:cem});
  }

  async function closeout(id,extra){
    clearMsg();
    var body=Object.assign({recordId:id},extra);
    var res=await fetch('/.netlify/functions/installer-closeout',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(body)});
    if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    var out=await res.json().catch(function(){return{};});
    var b=STATE.bookings.filter(function(x){return x.id===id;})[0];
    if(out.status==='completed'){ if(b){ b.status='Completed'; if(extra.calibration)b.calibration=extra.calibration; if(extra.vin)b.vin=extra.vin; if(extra.tuningPlatform)b.tuningPlatform=extra.tuningPlatform; if(extra.calibrationType)b.calibrationType=extra.calibrationType; } renderAll(); }
    else if(out.status==='noshow'){ if(b){ b.status='No-show'; } renderAll(); }
    else { fail('Could not save: '+(out.error||'error '+res.status)); }
  }
</script>
