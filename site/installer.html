<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Tuned Yota — Installer Console</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/fox.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/installer.webmanifest">
<meta name="theme-color" content="#3A2E26">
<script src="/commission-tally.js"></script>
  <script src="/offline-queue.js"></script>
<style>
  :root{--ink:#3A2E26;--accent:#5B4B42;--line:#d8d2ca;--muted:#7c8472;}
  *{box-sizing:border-box;} body{font-family:-apple-system,Arial,sans-serif;color:var(--ink);margin:0;background:#faf8f5;}
  main{max-width:640px;margin:0 auto;padding:16px 14px 60px;}
  h1{font-size:19px;color:var(--accent);margin:6px 0 10px;}
  input{width:100%;padding:12px;font-size:16px;border:1px solid var(--line);border-radius:8px;}
  .btn{padding:12px;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:8px;cursor:pointer;}
  .btn[disabled]{opacity:.45;}
  .link{display:inline-block;margin:2px 0 8px;color:#2f5d8a;font-size:14px;}
  .card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:#fff;}
  .top{display:flex;justify-content:space-between;gap:8px;font-size:14px;}
  .who{font-weight:700;} .meta{color:var(--muted);font-size:13px;margin:2px 0 6px;}
  .ffnote{background:#fdf3e3;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:6px 8px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn{background:#fdf0dd;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:8px 10px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn-h{font-weight:700;margin-bottom:2px;} .vinwarn ul{margin:2px 0 4px;padding-left:18px;}
  select{padding:9px;font-size:15px;border:1px solid var(--line);border-radius:8px;width:100%;margin:6px 0;}
  .row-actions{display:flex;gap:8px;margin-top:6px;} .row-actions .btn{flex:1;}
  .ns{background:#8a6a3a;} .done{color:#2f5d2a;font-weight:700;} .noshow{color:#8a2a2a;font-weight:700;}
  .hidden{display:none;} .msg{margin-top:8px;font-size:13px;} .err{color:#8a2a2a;} .msg.ok{color:#2f5d2a;font-weight:700;}
  .otthdr{font-size:11px;color:var(--muted);margin:10px 0 0;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .nsconfirm{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px;color:#8a2a2a;}
  .nsconfirm input{width:auto;}
  .banner{background:#fff4e5;border:1px solid #e0b877;border-radius:10px;padding:4px 12px;margin:10px 0;}
  .mnav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 6px;}
  .mnav .lbl{font-weight:800;color:var(--accent);font-size:16px;}
  .mnav button{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:16px;cursor:pointer;}
  details{border:1px solid var(--line);border-radius:10px;background:#fff;margin:8px 0;}
  summary{padding:12px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:8px;}
  summary::-webkit-details-marker{display:none;}
  details[open]>summary{border-bottom:1px solid var(--line);}
  .dbody{padding:2px 12px 8px;}
  .count{color:var(--muted);font-weight:600;}
  .sec-h{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;}
  .walkform input{margin:5px 0;}
  .scanvin{background:#5B4B42;margin:0 0 6px;width:100%;}
  .scanwrap{position:relative;margin:6px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;}
  .scanwrap video{width:100%;display:block;max-height:60vh;object-fit:cover;}
  .scanhint{color:#fff;font-size:12px;text-align:center;padding:6px;background:rgba(0,0,0,.55);position:absolute;top:0;left:0;right:0;}
  .scanmsg{color:#ffe;font-size:12px;text-align:center;padding:4px 4px 8px;background:#000;}
  /* --- smart-feed dashboard --- */
  .hdr{position:sticky;top:0;z-index:5;background:#faf8f5;padding:6px 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .tally{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;font-size:13px;color:var(--muted);margin:2px 0 8px;}
  .tally b{color:var(--ink);font-size:15px;} .tally .g{color:#2f5d2a;} .tally .o{color:#8a5a12;} .tally .r{color:#8a2a2a;}
  .tally .next{flex-basis:100%;color:var(--accent);font-weight:600;}
  .search{position:relative;}
  .search input{width:100%;padding:11px 34px 11px 12px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;}
  .search .x{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:#e7e2da;color:#555;width:24px;height:24px;border-radius:12px;font-size:15px;line-height:1;cursor:pointer;}
  .sec{margin:16px 0 4px;} .sec .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .sec.warn .lbl{color:#8a5a12;}
  .evt{border:1px solid var(--line);border-radius:11px;background:#fff;margin:8px 0;overflow:hidden;}
  .evt.warn{border-color:#e6c99a;} .evt.today{border-color:#bcd0bc;}
  .evt>summary{padding:12px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .evt>summary::-webkit-details-marker{display:none;}
  .evt[open]>summary{border-bottom:1px solid var(--line);}
  .evt .etitle{font-weight:800;font-size:15px;color:var(--accent);} .evt .edate{font-size:12px;color:var(--muted);font-weight:600;}
  .pill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;background:#eef1ea;color:var(--muted);}
  .pill.hasopen{background:#fdf0dd;color:#8a5a12;} .pill.alldone{background:#e7f2e2;color:#2f5d2a;}
  .ebody{padding:4px 12px 10px;}
  .donehdr{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;border-top:1px dashed var(--line);padding-top:8px;}
  .addwalk{width:100%;margin:8px 0 2px;background:#5B4B42;} .walkmini input{margin:5px 0;} .walkmini select{margin:5px 0;}
  .tabbtn{background:#1a1a1a;border:1px solid #333;color:var(--muted);padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer}
  .tabbtn.on{background:var(--accent);color:#111;border-color:var(--accent)}
  .tabbadge{background:#8a6d3b;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;margin-left:4px}
  .walkmini .fld{font-size:12px;color:var(--muted);font-weight:700;margin:6px 0 0;display:block;}
  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .showmore{width:100%;background:#fff;color:var(--accent);border:1px dashed var(--line);border-radius:9px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;margin:6px 0;}
  .card .installer-tag{font-size:11px;font-weight:700;color:#5B4B42;background:#eef1ea;padding:1px 6px;border-radius:10px;}
  .reviewov{display:none;position:fixed;inset:0;background:rgba(25,28,30,.75);z-index:50;align-items:center;justify-content:center;padding:20px;}
  .reviewbox{background:#fff;border-radius:14px;padding:22px;max-width:360px;width:100%;text-align:center;}
  .reviewh{font-weight:800;color:var(--accent);font-size:16px;margin-bottom:14px;}
  .reviewqr{width:70vw;max-width:300px;height:auto;display:block;margin:0 auto 12px;border:1px solid var(--line);border-radius:8px;}
</style>
</head>
<body>
<main>
  <h1>Tuned Yota — Installer Console</h1>
  <div id="gate">
    <input id="tok" type="password" autocomplete="off" placeholder="Your installer passcode">
    <div style="height:8px"></div>
    <button class="btn" id="unlock" style="width:100%">Unlock</button>
  </div>
  <div id="app" class="hidden">
    <a class="link" href="/calibration.html">Calibration reference (cal ID · TSB)</a>
    <a class="link" href="#" id="logout" style="margin-left:14px;color:#8a2a2a">Log out</a>
    <a class="link" href="#" id="reviewlink" style="display:none;margin-left:14px">★ Ask for a review</a>
    <a class="link" href="#" id="pushlink" style="display:none;margin-left:14px">🔔 Enable notifications</a>
    <a class="link" href="#" id="amsoillink" style="display:none;margin-left:14px">🛢 AMSOIL numbers</a>
    <div id="header" class="hdr"></div>
    <div id="feed"></div>
    <div id="msg" class="msg"></div>
  </div>
</main>
<script>
  var CAL = ["Light","Mild","Medium","Spicy","SS","Light and Mild","Mild and Medium","Medium and Spicy","Spicy and SS"];
  var TP = ["VFT","HPT","PCM","BB"];
  var CT = ["Basic","MAF","Basic + MAF","Supercharger","CARB Update","9.2 New","9.2 Update","TCM Update","Custom","K-Line"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var STATE = { today:'', bookings:[], events:[], admin:false, installerFilter:'', q:'', showAllPast:false, eventOpen:{}, walkOpen:{}, vinBlocked:{}, reviewUrl:'', vapidPublicKey:''
    , tab:'jobs', leads:[], leadsLoaded:false, leadStageOpen:{}, leadFilter:'', leadQ:''
    , jobTab: 'all'      // 'all' | '<city>' | 'done'
    , doneCity: '' };    // optional city filter applied inside the Done view
  function Q(){ return window.OfflineQueue; }
  function store(){ return window.localStorage; }

  function registerServiceWorker(){
    if(!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('/sw.js').catch(function(){});
    navigator.serviceWorker.addEventListener('message', function(e){ if(e.data && e.data.type==='ty-flush') flushQueue(); });
  }

  function sel(id,list,ph){ return '<select id="'+id+'"><option value="" disabled selected>'+ph+'…</option>'+list.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>'; }
  function val(id){ var el=document.getElementById(id); return el?(el.value||'').trim():''; }
  function tok(){ return localStorage.getItem('ty_installer_token') || ''; }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }
  function ym(iso){ return (iso||'').slice(0,7); }
  function isOpen(b){ return b.status!=='Completed' && b.status!=='No-show' && b.status!=='Cancelled'; }
  function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }
  function money(n){ return '$' + Math.round(n || 0).toLocaleString('en-US'); }
  // The installer's LOCAL date (Central), not server UTC — UTC rolls to tomorrow in
  // the evening, which would mis-date an evening walk-in + push it into the wrong OTT month.
  function localToday(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
  function daysBetween(aISO,bISO){ return Math.round((Date.parse(aISO+'T00:00:00Z')-Date.parse(bISO+'T00:00:00Z'))/86400000); }
  // Human date relative to today: Today / Tomorrow / in N days / Mon D[, YYYY].
  function relDate(iso){
    if(!iso) return '';
    var p=iso.split('-'), md=MONTHS[parseInt(p[1],10)-1].slice(0,3)+' '+parseInt(p[2],10);
    var full=md+(p[0]!==STATE.today.slice(0,4)?', '+p[0]:'');
    var d=daysBetween(iso,STATE.today);
    if(d===0) return 'Today'; if(d===1) return 'Tomorrow';
    if(d>1 && d<=7) return 'in '+d+' days · '+md;
    return full;
  }

  document.getElementById('unlock').onclick=function(){ var v=document.getElementById('tok').value.trim(); if(!v) return; localStorage.setItem('ty_installer_token', v); showApp(); };
  if(tok()) showApp();
  document.getElementById('logout').onclick=function(e){ e.preventDefault();
    if(Q().loadQueue(store()).length && !confirm('You have unsynced close-outs/walk-ins. Log out anyway and lose them?')) return;
    localStorage.removeItem('ty_installer_token'); location.reload(); };
  async function showApp(){ registerServiceWorker(); renderPendingBadge(); if(!(await nativeLock())) return; document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); load(); }
  function fail(m){ var el=document.getElementById('msg'); el.className='msg err'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function succeed(m){ var el=document.getElementById('msg'); el.className='msg ok'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function clearMsg(){ var el=document.getElementById('msg'); el.className='msg'; el.textContent=''; }

  function openReviewOverlay(){
    var ov = document.getElementById('reviewov');
    if(!ov){
      ov = document.createElement('div'); ov.id = 'reviewov'; ov.className = 'reviewov';
      ov.innerHTML = '<div class="reviewbox">'+
        '<div class="reviewh">Scan to review us on Google ★★★★★</div>'+
        '<img class="reviewqr" src="/.netlify/functions/review-qr" alt="Scan to review Tuned Yota on Google">'+
        '<a class="link" href="'+esc(STATE.reviewUrl)+'" target="_blank" rel="noopener">or tap here to review →</a>'+
        '<div style="height:8px"></div><button class="btn" id="reviewclose" style="width:100%">Close</button>'+
      '</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function(e){ if(e.target === ov) closeReviewOverlay(); });
      document.getElementById('reviewclose').onclick = closeReviewOverlay;
    }
    ov.style.display = 'flex';
  }
  function closeReviewOverlay(){ var ov = document.getElementById('reviewov'); if(ov) ov.style.display = 'none'; }

  // Admin-only AMSOIL funnel dashboard. Fetches /amsoil-metrics (admin-scoped) and
  // renders totals / funnel / by-source / a 14-day sparkline / recent clicks.
  function openAmsoilOverlay(){
    var ov=document.getElementById('amsoilov');
    if(!ov){
      ov=document.createElement('div'); ov.id='amsoilov'; ov.className='reviewov';
      ov.innerHTML='<div class="reviewbox" style="max-width:560px;width:92%;max-height:88vh;overflow:auto;text-align:left">'+
        '<div class="reviewh" style="text-align:center">🛢 AMSOIL funnel</div>'+
        '<div id="amsoilbody"><div class="empty">Loading…</div></div>'+
        '<div style="height:10px"></div><button class="btn" id="amsoilclose" style="width:100%">Close</button>'+
      '</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function(e){ if(e.target===ov) closeAmsoilOverlay(); });
      document.getElementById('amsoilclose').onclick=closeAmsoilOverlay;
    }
    ov.style.display='flex';
    loadAmsoilMetrics();
  }
  function closeAmsoilOverlay(){ var ov=document.getElementById('amsoilov'); if(ov) ov.style.display='none'; }
  async function loadAmsoilMetrics(){
    var body=document.getElementById('amsoilbody'); body.innerHTML='<div class="empty">Loading…</div>';
    var ctrl=new AbortController(), timer=setTimeout(function(){ ctrl.abort(); }, 15000);
    try{
      var res=await fetch('/.netlify/functions/amsoil-metrics',{ headers:{ 'x-installer-token':tok() }, signal:ctrl.signal });
      if(!res.ok){ body.innerHTML='<div class="empty">Couldn’t load AMSOIL numbers ('+res.status+').</div>'; return; }
      body.innerHTML=renderAmsoil(await res.json());
    }catch(e){ body.innerHTML='<div class="empty">Couldn’t load AMSOIL numbers — try again.</div>'; }
    finally{ clearTimeout(timer); }
  }
  function renderAmsoil(m){
    var t=m.totals||{}, f=m.funnel||{};
    function stat(label,val){ return '<div style="flex:1;min-width:88px;border:1px solid #e6e2d8;border-radius:10px;padding:10px 12px"><div style="font-size:22px;font-weight:800;color:var(--accent)">'+val+'</div><div style="font-size:12px;color:#7c8472">'+esc(label)+'</div></div>'; }
    var out='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px">'+
      stat('Clicks',t.clicks||0)+stat('Shop',t.shop||0)+stat('Preferred Customer',t.pc||0)+'</div>';
    out+='<div style="font-weight:700;margin:10px 0 4px">Funnel</div>'+
      '<div style="font-size:14px;color:#3A2E26;line-height:1.5">Certificates sent → <strong>'+(f.certsSent||0)+'</strong> &nbsp;·&nbsp; with an AMSOIL click → <strong>'+(f.certClicks||0)+'</strong> &nbsp;·&nbsp; became Preferred Customers → <strong>'+(f.pcCustomers||0)+'</strong></div>';
    out+='<div style="font-weight:700;margin:14px 0 4px">By source</div>';
    if(!(m.bySource||[]).length){ out+='<div class="empty">No clicks yet.</div>'; }
    else{
      out+='<table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="color:#7c8472;text-align:left"><th style="padding:3px 6px">Source</th><th style="text-align:right">Clicks</th><th style="text-align:right">Shop</th><th style="text-align:right;padding-right:6px">PC</th></tr>';
      m.bySource.forEach(function(s){ out+='<tr><td style="padding:3px 6px">'+esc(s.source)+'</td><td style="text-align:right">'+s.clicks+'</td><td style="text-align:right">'+s.shop+'</td><td style="text-align:right;padding-right:6px">'+s.pc+'</td></tr>'; });
      out+='</table>';
    }
    var max=Math.max.apply(null,(m.daily||[]).map(function(d){return d.clicks;}).concat([1]));
    out+='<div style="font-weight:700;margin:14px 0 4px">Last 14 days</div><div style="display:flex;gap:3px;align-items:flex-end;height:46px">';
    (m.daily||[]).forEach(function(d){ var h=Math.round((d.clicks/max)*40)+2; out+='<div title="'+esc(d.date)+': '+d.clicks+' click(s)" style="flex:1;height:'+h+'px;background:var(--accent);opacity:'+(d.clicks?0.9:0.22)+';border-radius:2px"></div>'; });
    out+='</div>';
    out+='<div style="font-weight:700;margin:14px 0 4px">Recent clicks</div>';
    if(!(m.recent||[]).length){ out+='<div class="empty">None yet.</div>'; }
    else{ out+='<div style="font-size:13px">'; m.recent.forEach(function(r){ out+='<div style="padding:3px 0;border-bottom:1px solid #f0ece2">'+esc((r.at||'').slice(0,10))+' · '+esc(r.destination)+' · '+esc(r.source)+(r.name?' · '+esc(r.name):'')+'</div>'; }); out+='</div>'; }
    return out;
  }

  var SIGPAD = null;
  function openSignOverlay(id, extra){
    var b = STATE.bookings.filter(function(x){return x.id===id;})[0] || {};
    var summary = esc(((b.modelYear?b.modelYear+' ':'')+(b.vehicle||'')).trim()+(extra.calibration?' · '+extra.calibration:''));
    var ov = document.createElement('div');
    ov.className = 'reviewov'; ov.id = 'signov';
    ov.innerHTML =
      '<div class="reviewbox">'+
        '<button class="btn ns" id="signx" aria-label="Cancel" style="float:right;padding:4px 10px;width:auto;margin:-8px -8px 0 0">✕</button>'+
        '<div class="reviewh">Confirm the tune</div>'+
        '<p class="meta">'+summary+'</p>'+
        '<p class="meta">Ask the customer to sign below confirming the work is complete.</p>'+
        '<canvas id="sigpad" width="600" height="180" style="width:100%;height:180px;border:2px dashed #b9c0ad;border-radius:10px;background:#fff;touch-action:none"></canvas>'+
        '<div class="row-actions" style="margin-top:10px">'+
          '<button class="btn ns" id="sigclear">Clear</button>'+
          '<button class="btn" id="sigdone">✓ Done &amp; complete</button>'+
        '</div>'+
        '<a href="#" class="link" id="sigskip" style="margin-top:10px">Customer unavailable — skip →</a>'+
      '</div>';
    document.body.appendChild(ov);
    ov.style.display = 'flex';
    var canvas = ov.querySelector('#sigpad'), ctx = canvas.getContext('2d');
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#1c1c1c';
    SIGPAD = { canvas: canvas, ctx: ctx, dirty: false };
    var drawing = false;
    function pos(e){ var r = canvas.getBoundingClientRect(); var t = (e.touches && e.touches[0]) || e; return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) }; }
    function down(e){ e.preventDefault(); drawing = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e){ if(!drawing) return; e.preventDefault(); var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); SIGPAD.dirty = true; }
    function up(){ drawing = false; }
    canvas.addEventListener('pointerdown', down); canvas.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    ov.querySelector('#sigclear').onclick = function(){ ctx.clearRect(0,0,canvas.width,canvas.height); SIGPAD.dirty = false; };
    ov.querySelector('#sigdone').onclick = function(){ if(SIGPAD.dirty){ extra.signature = canvas.toDataURL('image/png'); } closeSignOverlay(); closeout(id, extra); };
    ov.querySelector('#sigskip').onclick = function(e){ e.preventDefault(); closeSignOverlay(); closeout(id, extra); };
    ov.querySelector('#signx').onclick = function(){ closeSignOverlay(); };
  }
  function closeSignOverlay(){ var ov = document.getElementById('signov'); if(ov) ov.remove(); SIGPAD = null; }

  async function viewSignature(id){
    clearMsg();
    try{
      var res = await fetch('/.netlify/functions/installer-signature?id='+encodeURIComponent(id), { headers:{ 'x-installer-token':tok() } });
      if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
      var out = await res.json().catch(function(){return{};});
      if(out.status!=='ok' || !out.signature){ succeed('No signature on file for this tune.'); return; }
      var ov = document.createElement('div'); ov.className='reviewov'; ov.id='sigviewov';
      ov.innerHTML = '<div class="reviewbox">'+
        '<button class="btn ns" id="sigviewx" aria-label="Close" style="float:right;padding:4px 10px;width:auto;margin:-8px -8px 0 0">✕</button>'+
        '<div class="reviewh">Customer sign-off</div>'+
        '<img alt="Customer signature" src="'+out.signature+'" style="width:100%;background:#fff;border:1px solid #d8dcc9;border-radius:10px">'+
        '</div>';
      document.body.appendChild(ov);
      ov.style.display = 'flex';
      ov.addEventListener('click', function(e){ if(e.target === ov) ov.remove(); });
      ov.querySelector('#sigviewx').onclick=function(){ ov.remove(); };
    }catch(e){ fail('Could not load the signature.'); }
  }

  function urlB64ToUint8Array(base64String){
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var raw = atob(base64), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  async function enablePush(){
    clearMsg();
    if(!('serviceWorker' in navigator) || !('PushManager' in window)){ fail('Notifications aren’t supported on this browser.'); return; }
    try{
      var reg = await navigator.serviceWorker.register('/sw.js');
      var perm = await Notification.requestPermission();
      if(perm !== 'granted'){ fail('Notifications not enabled — allow them in your browser settings.'); return; }
      var sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(STATE.vapidPublicKey) });
      var res = await fetch('/.netlify/functions/push-subscribe', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-installer-token':tok() }, body: JSON.stringify({ subscription: sub }) });
      if(!res.ok){ fail('Could not save your subscription.'); return; }
      var pl = document.getElementById('pushlink'); if(pl){ pl.textContent = '🔔 Notifications on · Send test'; pl.onclick = function(e){ e.preventDefault(); testPush(); }; }
      succeed('Notifications enabled on this device.');
    }catch(e){ fail('Couldn’t enable notifications: ' + (e && e.message ? e.message : 'error')); }
  }
  async function testPush(){

  // --- Native (Capacitor) helpers — no-ops on the plain website ---
  function isNative(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }
  async function nativeLock(){
    if(!isNative()) return true;
    var B = window.Capacitor.Plugins && window.Capacitor.Plugins.BiometricAuth;
    if(!B) return true;
    try{ await B.authenticate({ reason:'Unlock Tuned Yota', allowDeviceCredential:true }); return true; }

  async function registerPush(){
    if(!isNative()) return;
    var P = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
    if(!P) return;
    try{
      var perm = await P.requestPermissions(); if(perm.receive!=='granted') return;
      P.addListener('registration', function(t){
        fetch('/.netlify/functions/push-register',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({token:t.value,platform:(window.Capacitor.getPlatform&&window.Capacitor.getPlatform())||''})});
      });

    }catch(e){}
  }

  // The roster fetch is bounded by a hard timeout so a slow/stalled server (cold
  // function, network blip, Airtable latency, or the events sheet hanging) can never
  // leave the console wedged on "Loading…". On any failure we fall back to the last
  // synced roster if we have one, else show an explicit error with a Retry button.
  var ROSTER_TIMEOUT_MS = 15000;
  async function load(){
    document.getElementById('feed').innerHTML='<div class="empty">Loading…</div>';
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, ROSTER_TIMEOUT_MS);
    try {
      var res = await fetch('/.netlify/functions/installer-roster', { headers:{ 'x-installer-token':tok() }, signal: ctrl.signal });
      if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
      if(!res.ok){ rosterUnavailable('Could not reach the server — showing your last synced roster.'); return; }
      var data = await res.json();
      try { localStorage.setItem('ty_roster_cache', JSON.stringify({ savedAt: Date.now(), data: data })); } catch(e){}
      clearOfflineBanner();
      applyRoster(data);
      flushQueue();
    } catch(err){
      // AbortError = our timeout fired; anything else = network/parse failure.
      var msg = (err && err.name==='AbortError')
        ? 'The roster took too long to load — showing your last synced roster.'
        : 'Offline — showing your last synced roster.';
      rosterUnavailable(msg);
    } finally { clearTimeout(timer); }
  }
  // Cache-or-retry fallback for a failed roster load: prefer the last synced roster
  // (with a banner), else render an actionable Retry rather than a dead-end message.
  function rosterUnavailable(bannerMsg){
    var hasCache=false; try { hasCache=!!localStorage.getItem('ty_roster_cache'); } catch(e){}
    if(hasCache){ renderFromCache(bannerMsg); return; }
    retryFeed('Couldn’t load your roster.');
  }
  function retryFeed(msg){
    var feed=document.getElementById('feed'); feed.innerHTML='';
    var m=document.createElement('div'); m.className='empty'; m.textContent=msg; feed.appendChild(m);
    var b=document.createElement('button'); b.className='btn'; b.textContent='Retry'; b.style.marginTop='10px';
    b.onclick=function(){ load(); }; feed.appendChild(b);
  }

  function applyRoster(data){
    STATE.today = localToday(); STATE.bookings = data.bookings||[]; STATE.events = data.events||[];
    STATE.admin = !!data.admin;
    STATE.reviewUrl = data.reviewUrl || '';
    var rl = document.getElementById('reviewlink');
    if(rl){
      if(STATE.reviewUrl){ rl.style.display = ''; rl.onclick = function(e){ e.preventDefault(); openReviewOverlay(); }; }
      else { rl.style.display = 'none'; }
    }
    STATE.vapidPublicKey = data.vapidPublicKey || '';
    var pl = document.getElementById('pushlink');
    if(pl){
      var supported = ('serviceWorker' in navigator) && ('PushManager' in window);
      if(STATE.vapidPublicKey && supported){ pl.style.display = ''; pl.onclick = function(e){ e.preventDefault(); enablePush(); }; }
      else { pl.style.display = 'none'; }
    }
    var al = document.getElementById('amsoillink');   // AMSOIL funnel numbers — admin only
    if(al){
      if(STATE.admin){ al.style.display = ''; al.onclick = function(e){ e.preventDefault(); openAmsoilOverlay(); }; }
      else { al.style.display = 'none'; }
    }
    buildHeaderOnce();
    renderAll();
    registerPush();
  }

  function renderFromCache(msg){
    var raw; try { raw = localStorage.getItem('ty_roster_cache'); } catch(e){ raw = null; }
    if(!raw){ retryFeed('No saved roster yet — reconnect once to load it.'); return; }
    var cached; try { cached = JSON.parse(raw); } catch(e){ cached = null; }
    if(!cached || !cached.data){ retryFeed('No saved roster yet — reconnect once to load it.'); return; }
    showOfflineBanner(msg + (cached.savedAt ? ' (saved '+relTime(cached.savedAt)+')' : ''));
    applyRoster(cached.data);
  }
  function relTime(ms){ var s=Math.round((Date.now()-ms)/1000); if(s<60) return 'just now'; var m=Math.round(s/60); if(m<60) return m+'m ago'; var h=Math.round(m/60); if(h<24) return h+'h ago'; return Math.round(h/24)+'d ago'; }
  function showOfflineBanner(text){ var el=document.getElementById('offlinebanner'); if(!el){ el=document.createElement('div'); el.id='offlinebanner'; el.style.cssText='background:#8a6d3b;color:#fff;padding:8px 12px;border-radius:8px;margin:8px 0;font-size:14px'; var app=document.getElementById('app'); app.insertBefore(el, app.firstChild); } el.textContent='⚠ '+text; el.style.display=''; }
  function clearOfflineBanner(){ var el=document.getElementById('offlinebanner'); if(el) el.style.display='none'; }

  // Admins see every installer's data; an optional filter narrows to one installer.
  function visibleBookings(){
    if(STATE.admin && STATE.installerFilter){ return STATE.bookings.filter(function(b){ return (b.installer||'')===STATE.installerFilter; }); }
    return STATE.bookings;
  }
  function visibleEvents(){
    if(STATE.admin && STATE.installerFilter){ return STATE.events.filter(function(e){ return (e.installer||'')===STATE.installerFilter; }); }
    return STATE.events;
  }

  // The sticky header (tally + admin filter + search) is built ONCE so typing in the
  // search box is never interrupted by a re-render; renderTally() only refreshes text.
  function buildHeaderOnce(){
    var host=document.getElementById('header'); if(!host || host.dataset.built) return; host.dataset.built='1';
    host.innerHTML =
      (STATE.admin?'<div style="margin-bottom:6px"><label style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)">Admin — viewing </label><select id="who"></select></div>':'')+
      '<div id="tally" class="tally"></div>'+
      '<div class="search"><input id="q" type="search" autocomplete="off" placeholder="Search name, VIN, vehicle, city…"><button class="x" id="qx" aria-label="Clear search" style="display:none">×</button></div>';
    var q=document.getElementById('q'), qx=document.getElementById('qx');
    q.oninput=function(){ STATE.q=this.value; qx.style.display=this.value?'':'none'; renderFeed(); };
    qx.onclick=function(){ STATE.q=''; q.value=''; qx.style.display='none'; q.focus(); renderFeed(); };
    var who=document.getElementById('who');
    if(who){ who.onchange=function(){ STATE.installerFilter=this.value; renderTally(); renderFeed(); }; }
  }

  function renderTally(){
    var who=document.getElementById('who');
    if(who){
      var keys=[], seen={};
      STATE.bookings.concat(STATE.events).forEach(function(b){ var k=b.installer||''; if(k&&!seen[k]){seen[k]=1;keys.push(k);} });
      keys.sort();
      who.innerHTML='<option value="">All installers</option>'+keys.map(function(k){ return '<option value="'+esc(k)+'"'+(STATE.installerFilter===k?' selected':'')+'>'+esc(cap(k))+'</option>'; }).join('');
    }
    var host=document.getElementById('tally'); if(!host) return;
    var mo=STATE.today.slice(0,7), mDone=0,mOpen=0,mNo=0,life=0;
    visibleBookings().forEach(function(b){
      if(b.status==='Completed') life++;
      if(ym(b.dateISO)===mo){ if(b.status==='Completed')mDone++; else if(b.status==='No-show')mNo++; else if(isOpen(b))mOpen++; }
    });
    var next=null;
    buildEvents().forEach(function(e){ if(e.dateISO>=STATE.today && (!next||e.dateISO<next.dateISO)) next=e; });
    var ct = (window.commissionTally
      ? window.commissionTally(visibleBookings(), mo)
      : { month:{total:0,tunes:0,pending:0}, lastMonth:{total:0}, lifetime:{total:0}, byInstaller:{} });
    var adminLines = '';
    if(STATE.admin && !STATE.installerFilter){
      var keys = Object.keys(ct.byInstaller).sort();
      if(keys.length) adminLines += '<span>'+keys.map(function(k){ return esc(cap(k))+' '+money(ct.byInstaller[k]); }).join(' · ')+'</span>';
      adminLines += '<span>Last month · est. <b>'+money(ct.lastMonth.total)+'</b> — report due by the 7th</span>';
    }
    host.innerHTML=
      '<span>This month <b class="g">'+mDone+'</b> done · <b class="o">'+mOpen+'</b> open'+(mNo?' · <b class="r">'+mNo+'</b> no-show':'')+'</span>'+
      '<span>This month · est. <b>'+money(ct.month.total)+'</b> · '+ct.month.tunes+' tunes'+(ct.month.pending?' · '+ct.month.pending+' pending':'')+'</span>'+
      '<span>Lifetime <b>'+life+'</b> tunes ✓ · <b>'+money(ct.lifetime.total)+'</b> commission</span>'+
      adminLines+
      (next?'<span class="next">Next: '+esc(next.city)+' · '+esc(relDate(next.dateISO))+'</span>':'');
  }

  function renderAll(){ renderTally(); renderTabs();
    var st=document.getElementById('subtabs'); if(st) st.style.display = STATE.tab==='leads' ? 'none' : 'flex';
    if(STATE.tab==='leads'){ renderLeads(); } else { renderFeed(); } }
  function renderTabs(){
    var host=document.getElementById('tabs');
    if(!host){ host=document.createElement('div'); host.id='tabs'; host.style.cssText='display:flex;gap:8px;margin:6px 0 10px';
      var feed=document.getElementById('feed'); feed.parentNode.insertBefore(host, feed); }
    function tab(id,label,badge){ return '<button class="tabbtn'+(STATE.tab===id?' on':'')+'" data-tab="'+id+'">'+esc(label)+(badge?' <span class="tabbadge">'+badge+'</span>':'')+'</button>'; }
    var due=STATE.leads.filter(function(l){ return ACTIVE_LEAD_STAGES.indexOf(l.stage)>=0 && l.nextFollowup && l.nextFollowup<=STATE.today; }).length;
    host.innerHTML=tab('jobs','Jobs','')+tab('leads','Leads', due? String(due):'');
    Array.prototype.forEach.call(host.querySelectorAll('.tabbtn'),function(b){ b.onclick=function(){ STATE.tab=b.getAttribute('data-tab'); if(STATE.tab==='leads'&&!STATE.leadsLoaded){ loadLeads(); } renderAll(); }; });
  }

  // The Jobs sub-tab strip: All + one tab per city with work + a Done tab.
  // Horizontally scrollable on mobile; a red dot marks a city needing close-out.
  function renderSubTabs(events){
    var host=document.getElementById('subtabs');
    if(!host){ host=document.createElement('div'); host.id='subtabs';
      host.style.cssText='display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 0 10px;padding-bottom:2px';
      var feed=document.getElementById('feed'); feed.parentNode.insertBefore(host, feed); }
    var t=STATE.today;
    var cities={};
    events.forEach(function(e){
      var c=(cities[e.city]=cities[e.city]||{city:e.city,open:0,overdue:false});
      c.open+=e.open; if(e.dateISO<t && e.hasOpen) c.overdue=true;
    });
    var list=Object.keys(cities).map(function(k){return cities[k];}).sort(function(a,b){return a.city.localeCompare(b.city);});
    function tab(id,label,dot,badge){ return '<button class="tabbtn'+(STATE.jobTab===id?' on':'')+'" data-sub="'+esc(id)+'" style="white-space:nowrap">'+(dot?'<span style="color:#c0392b">●</span> ':'')+esc(label)+(badge?' <span class="tabbadge">'+badge+'</span>':'')+'</button>'; }
    var html=tab('all','All','','');
    list.forEach(function(c){ html+=tab(c.city, c.city, c.overdue, c.open?String(c.open):''); });
    html+=tab('done','✓ Done','','');
    host.innerHTML=html;
    Array.prototype.forEach.call(host.querySelectorAll('.tabbtn'),function(b){ b.onclick=function(){ STATE.jobTab=b.getAttribute('data-sub'); if(STATE.jobTab!=='done') STATE.doneCity=''; renderFeed(); }; });
  }

  function bySlot(a,b){ return String(a.slot||'').localeCompare(String(b.slot||''),undefined,{numeric:true}); }

  // Merge scheduled event shells + grouped bookings into one event list keyed city|date,
  // each with done/open/no-show counts. This is the single source the feed renders from.
  function buildEvents(){
    var map={};
    function ev(city,dateISO,installer){ var k=city+'|'+dateISO; return (map[k]=map[k]||{key:k,city:city,dateISO:dateISO,installer:installer||'',bookings:[]}); }
    visibleEvents().forEach(function(e){ ev(e.city,e.dateISO,e.installer); });
    visibleBookings().forEach(function(b){ var e=ev(b.city,b.dateISO,b.installer); e.bookings.push(b); if(b.installer) e.installer=b.installer; });
    return Object.keys(map).map(function(k){
      var e=map[k]; e.done=0; e.open=0; e.no=0;
      e.bookings.forEach(function(b){ if(b.status==='Completed')e.done++; else if(b.status==='No-show')e.no++; else if(isOpen(b))e.open++; });
      e.total=e.bookings.length; e.hasOpen=e.open>0; return e;
    });
  }

  function matchesQ(b){
    var q=STATE.q.trim().toLowerCase(); if(!q) return true;
    return [b.name,b.vehicle,b.vin,b.city,b.calibration,b.phone,b.tuningPlatform,b.calibrationType]
      .some(function(v){ return String(v||'').toLowerCase().indexOf(q)>=0; });
  }

  function secHead(label,cls){ var d=document.createElement('div'); d.className='sec'+(cls?' '+cls:''); d.innerHTML='<span class="lbl">'+esc(label)+'</span>'; return d; }

  function renderFeed(){
    var host=document.getElementById('feed'); host.innerHTML='';
    var events=buildEvents();

    renderSubTabs(events);

    // Done tab: completed jobs only, grouped by event, newest first.
    if(STATE.jobTab==='done'){ renderDone(events, host); return; }

    host.appendChild(anydayWalkForm());   // everyday walk-in — always available

    // Search mode: flat, all-history, event-grouped results. Honors the active city
    // sub-tab (2026-07-16 owner decision): a city tab scopes the search to that market
    // with an explicit "search all markets ›" escape hatch; All searches everything.
    if(STATE.q.trim()){
      var scopedCity = STATE.jobTab!=='all' && STATE.jobTab!=='done' ? STATE.jobTab : '';
      var pool = scopedCity ? events.filter(function(e){ return e.city===scopedCity; }) : events;
      var hits=pool.map(function(e){ return { e:e, bs:e.bookings.filter(matchesQ) }; })
        .filter(function(x){ return x.bs.length; })
        .sort(function(a,b){ return b.e.dateISO.localeCompare(a.e.dateISO); });
      var n=hits.reduce(function(s,x){ return s+x.bs.length; },0);
      var head=secHead('Search results ('+n+')'+(scopedCity?' · '+scopedCity:''),'');
      if(scopedCity){
        var broaden=document.createElement('a'); broaden.href='#'; broaden.className='link'; broaden.id='qall';
        broaden.style.marginLeft='10px'; broaden.textContent='search all markets ›';
        broaden.onclick=function(ev){ ev.preventDefault(); STATE.jobTab='all'; renderFeed(); };
        head.appendChild(broaden);
      }
      host.appendChild(head);
      if(!n){ var qEmpty=document.createElement('div'); qEmpty.className='empty'; qEmpty.textContent='No matches'+(scopedCity?' in '+scopedCity:'')+'.'; host.appendChild(qEmpty); return; }
      hits.forEach(function(x){ host.appendChild(eventCard(x.e, x.bs, true, false, true)); });
      return;
    }

    var t=STATE.today;
    var scoped = STATE.jobTab==='all' ? events : events.filter(function(e){ return e.city===STATE.jobTab; });
    var needs=scoped.filter(function(e){ return e.dateISO<t && e.hasOpen; }).sort(function(a,b){ return b.dateISO.localeCompare(a.dateISO); });
    var today=scoped.filter(function(e){ return e.dateISO===t; }).sort(function(a,b){ return a.city.localeCompare(b.city); });
    var upcoming=scoped.filter(function(e){ return e.dateISO>t; }).sort(function(a,b){ return a.dateISO.localeCompare(b.dateISO); });

    if(!needs.length && !today.length && !upcoming.length){
      var em=document.createElement('div'); em.className='empty';
      em.textContent = STATE.jobTab==='all' ? 'No open jobs. Use “Log a walk-in / call-in” above; completed work is under ✓ Done.' : 'No open jobs in '+STATE.jobTab+'. Completed work is under ✓ Done.';
      host.appendChild(em); return;
    }
    // Active views hide completed rows (showDone=false) so they don't crowd the close-out UI.
    if(needs.length){ host.appendChild(secHead('Needs close-out','warn')); needs.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true,false)); }); }
    if(today.length){ host.appendChild(secHead('Today','')); today.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true,false)); }); }
    if(upcoming.length){ host.appendChild(secHead('Upcoming','')); upcoming.forEach(function(e,i){ host.appendChild(eventCard(e,e.bookings,i===0,true,false)); }); }
  }

  // The ✓ Done view: completed jobs across markets, grouped by event (city|date),
  // newest first, honoring the search box and an optional city filter (set by the
  // per-event "done — view ›" deep-link). Completed rows never crowd active work.
  function renderDone(events, host){
    if(STATE.doneCity){
      var chip=document.createElement('div'); chip.className='sec';
      chip.innerHTML='<span class="lbl">Completed · '+esc(STATE.doneCity)+'</span> <a href="#" class="link" id="doneall">show all markets ›</a>';
      host.appendChild(chip);
      chip.querySelector('#doneall').onclick=function(ev){ ev.preventDefault(); STATE.doneCity=''; renderFeed(); };
    }
    var done=events.map(function(e){
        var bs=e.bookings.filter(function(b){ return b.status==='Completed' && matchesQ(b) && (!STATE.doneCity || e.city===STATE.doneCity); });
        return { e:e, bs:bs };
      }).filter(function(x){ return x.bs.length; })
      .sort(function(a,b){ return b.e.dateISO.localeCompare(a.e.dateISO); });
    var n=done.reduce(function(s,x){ return s+x.bs.length; },0);
    host.appendChild(secHead('Completed ('+n+')',''));
    if(!n){ host.innerHTML+='<div class="empty">No completed jobs'+(STATE.q.trim()?' match your search':'')+' yet.</div>'; return; }
    done.forEach(function(x){ host.appendChild(eventCard(x.e, x.bs, false, false, true)); });
  }

  // One event = one <details> card. defaultOpen sets the initial state; the user's own
  // toggle is remembered in STATE.eventOpen so a close-out never collapses it. canAdd
  // shows the per-event walk-in adder (actionable events only).
  function eventCard(e, bookings, defaultOpen, canAdd, showDone){
    var open=(e.key in STATE.eventOpen)?STATE.eventOpen[e.key]:defaultOpen;
    var det=document.createElement('details');
    det.className='evt'+(e.dateISO<STATE.today&&e.hasOpen?' warn':(e.dateISO===STATE.today?' today':''));
    det.open=open;
    det.addEventListener('toggle',function(){ STATE.eventOpen[e.key]=det.open; });
    var pillCls=e.total===0?'':(e.hasOpen?'hasopen':'alldone');
    var pillTxt=e.total===0?'no bookings':(e.done+' done'+(e.open?' · '+e.open+' open':'')+(e.no?' · '+e.no+' no-show':''));
    var tag=STATE.admin&&e.installer?' <span class="installer-tag">'+esc(e.installer)+'</span>':'';
    var sum=document.createElement('summary');
    sum.innerHTML='<span><span class="etitle">'+esc(e.city)+'</span>'+tag+'<br><span class="edate">'+esc(relDate(e.dateISO))+'</span></span>'+
      '<span class="pill '+pillCls+'">'+esc(pillTxt)+'</span>';
    det.appendChild(sum);
    var body=document.createElement('div'); body.className='ebody';
    if(canAdd) body.appendChild(walkAdder(e));
    bookings.filter(isOpen).sort(bySlot).forEach(function(b){ body.appendChild(rowCard(b)); });
    bookings.filter(function(b){return b.status==='No-show';}).sort(bySlot).forEach(function(b){ body.appendChild(rowCard(b)); });
    var doneB=bookings.filter(function(b){return b.status==='Completed';}).sort(bySlot);
    if(doneB.length){
      if(showDone){ var h=document.createElement('div'); h.className='donehdr'; h.textContent='✓ Done ('+doneB.length+')'; body.appendChild(h); doneB.forEach(function(b){ body.appendChild(rowCard(b)); }); }
      else { var lk=document.createElement('a'); lk.href='#'; lk.className='link'; lk.textContent='✓ '+doneB.length+' done — view ›';
        lk.onclick=function(ev){ ev.preventDefault(); STATE.jobTab='done'; STATE.doneCity=e.city; renderFeed(); }; body.appendChild(lk); }
    }
    if(!bookings.length && !canAdd){ var m=document.createElement('div'); m.className='empty'; m.textContent='No bookings.'; body.appendChild(m); }
    det.appendChild(body); return det;
  }

  // Per-event walk-in adder. Its open state persists in STATE.walkOpen[key] so it stays
  // put after a successful add (installers add several in a row). No id gymnastics —
  // inputs are held by reference so the event key never touches the DOM id space.
  function mkInput(ph){ var i=document.createElement('input'); i.placeholder=ph; return i; }
  function walkAdder(e){
    var det=document.createElement('details'); det.open=!!STATE.walkOpen[e.key];
    det.style.cssText='border:none;background:transparent;margin:0';
    det.addEventListener('toggle',function(){ STATE.walkOpen[e.key]=det.open; });
    var sum=document.createElement('summary'); sum.style.cssText='padding:8px 0;list-style:none;cursor:pointer';
    sum.innerHTML='<span style="font-weight:700;color:var(--accent)">+ Add walk-in</span>'; det.appendChild(sum);
    var box=document.createElement('div'); box.className='walkmini';

  async function addWalkin(evt, vals){
    clearMsg();
    var name=(vals.name||'').trim(), vehicle=(vals.vehicle||'').trim(), phone=(vals.phone||'').trim();
    var email=(vals.email||'').trim();
    if(!name){ fail('Enter the customer name.'); return; }
    if(!phone){ fail('Enter a phone number.'); return; }
    var op = Q().makeOp('walkin', { city:evt.city, dateISO:evt.dateISO, name:name, vehicle:vehicle, phone:phone, email:email, clientKey:null });
    op.body.clientKey = op.clientKey;
    var res, netErr=null;
    try { res=await fetch('/.netlify/functions/installer-walkin',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(op.body)}); }
    catch(e){ netErr=e; }
    if(!netErr && res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    if(netErr || (res && Q().shouldQueue(null, res.status))){
      queuePush(op);
      STATE.walkOpen[evt.key]=true; STATE.eventOpen[evt.key]=true;
      STATE.bookings.push(optimisticWalkin(evt, op));
      renderAll();
      succeed('Saved '+name+' — will sync when you’re back online.');
      registerBgSync();
      return;
    }
    var out=await res.json().catch(function(){return{};});
    if(out.status==='booked' && out.booking){
      STATE.walkOpen[evt.key]=true;        // keep this event's adder open for the next walk-in
      STATE.eventOpen[evt.key]=true;       // and keep the event itself expanded
      STATE.bookings.push(out.booking);
      renderAll();                         // #msg lives outside the feed, so this message survives
      succeed('✓ Added '+name+' — walk-in saved for '+evt.city+'.');
    } else {
      var er=out.error||('error '+(res?res.status:'network'));
      fail( er==='unknown-event'   ? 'That event isn’t recognized — reload and try again.'
          : er==='not-your-market' ? 'That market isn’t assigned to you.'
          : er==='unknown-city'    ? 'That city isn’t a recognized market.'
          : er==='missing-contact' ? 'Enter both a customer name and a phone number.'
          : 'Could not add walk-in: '+er );
    }
  }

  // --- VIN scan (mirror of netlify/functions/lib/vin.js — keep in sync) ---
  function normalizeScannedVin(raw){
    var s=String(raw==null?'':raw).toUpperCase().replace(/[^A-Z0-9]/g,'');
    return /^[A-HJ-NPR-Z0-9]{17}$/.test(s)?s:'';
  }
  function canScan(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia); }
  var scanState=null, zxingLoading=null;
  function loadZXing(){
    if(window.ZXing) return Promise.resolve();
    if(zxingLoading) return zxingLoading;
    zxingLoading=new Promise(function(resolve,reject){
      var s=document.createElement('script'); s.src='/vendor/zxing.min.js';
      s.onload=function(){ resolve(); }; s.onerror=function(){ reject(new Error('zxing load failed')); };
      document.head.appendChild(s);
    });
    return zxingLoading;
  }
  function setScanMsg(id,m){ var el=document.getElementById('scanmsg_'+id); if(el) el.textContent=m; }
  function onVin(id,vin){ var i=document.getElementById('vin_'+id); if(i) i.value=vin; stopScan(id); checkVin(id); }
  function stopScan(id){
    if(scanState && scanState.id===id){
      if(scanState.raf) cancelAnimationFrame(scanState.raf);
      if(scanState.reader && scanState.reader.reset){ try{ scanState.reader.reset(); }catch(e){} }
      if(scanState.stream){ scanState.stream.getTracks().forEach(function(t){ t.stop(); }); }
      scanState=null;
    }
    var o=document.getElementById('scanov_'+id); if(o) o.remove();
    var b=document.getElementById('scan_'+id); if(b) b.style.display='';
  }
  // Photograph the current camera frame and OCR the VIN via /vin-ocr. On a
  // confident read, fill the (always-editable) VIN field and run the NHTSA guard;
  // on ANY failure, show a plain message and leave the installer to type it.
  // The camera is a convenience — it never blocks close-out.
  async function captureVin(id){
    var video=document.getElementById('scanvid_'+id);
    var btn=document.getElementById('scancap_'+id);
    if(!video || !video.videoWidth){ setScanMsg(id,'Hold steady and try again.'); return; }
    if(btn){ btn.disabled=true; btn.textContent='Reading…'; }
    setScanMsg(id,'Reading the VIN…');
    try{
      var maxEdge=1024, w=video.videoWidth, h=video.videoHeight, scale=Math.min(1, maxEdge/Math.max(w,h));
      var cv=document.createElement('canvas'); cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
      cv.getContext('2d').drawImage(video,0,0,cv.width,cv.height);
      var dataUrl=cv.toDataURL('image/jpeg',0.7);
      var res=await fetch('/.netlify/functions/vin-ocr',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({imageBase64:dataUrl,mediaType:'image/jpeg'})});
      var out=await res.json().catch(function(){ return {ok:false}; });
      if(out && out.ok && out.vin){ onVin(id,out.vin); return; }  // fills field, stops scan, runs checkVin
    }catch(e){}
    // Any failure → keep the camera open, tell them to retry or type it.
    if(btn){ btn.disabled=false; btn.textContent='● Capture VIN'; }
    setScanMsg(id,"Couldn't read it — retake, or Cancel and type the VIN.");
  }
  async function startScan(id){
    if(isNative() && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner){
      try{
        var nres=await window.Capacitor.Plugins.BarcodeScanner.scan();
        var ncodes=(nres&&nres.barcodes)||[];
        for(var ni=0;ni<ncodes.length;ni++){ var nvin=normalizeScannedVin(ncodes[ni].rawValue||ncodes[ni].displayValue); if(nvin){ onVin(id,nvin); return; } }
        fail('No VIN barcode found — try again or type it.');
      }catch(e){ /* cancelled */ }
      return;
    }
    if(!canScan()) return;
    var card=document.getElementById('c_'+id); if(!card) return;
    if(document.getElementById('scanov_'+id)) return;
    var ov=document.createElement('div'); ov.id='scanov_'+id; ov.className='scanwrap';
    ov.innerHTML='<video id="scanvid_'+id+'" playsinline autoplay muted></video>'+
      '<div class="scanhint">Point at the VIN — barcode auto-scans; or tap Capture to photograph a printed VIN</div>'+
      '<div id="scanmsg_'+id+'" class="scanmsg"></div>'+
      '<button type="button" class="btn" id="scancap_'+id+'" style="width:100%;margin-bottom:6px">● Capture VIN</button>'+
      '<button type="button" class="btn" id="scancx_'+id+'" style="width:100%;background:#8a2a2a">Cancel</button>';
    card.appendChild(ov);
    var sbtn=document.getElementById('scan_'+id); if(sbtn) sbtn.style.display='none';
    document.getElementById('scancx_'+id).onclick=function(){ stopScan(id); };
    document.getElementById('scancap_'+id).onclick=function(){ captureVin(id); };
    var video=document.getElementById('scanvid_'+id);
    var stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } }); }
    catch(e){ setScanMsg(id,'Camera unavailable — type the VIN.'); return; }
    scanState={ id:id, stream:stream, raf:null, reader:null };
    video.srcObject=stream;
    if('BarcodeDetector' in window){
      var det=new window.BarcodeDetector({ formats:['code_39','data_matrix'] });
      var tick=async function(){
        if(!scanState || scanState.id!==id) return;
        try{ var codes=await det.detect(video);
          for(var i=0;i<codes.length;i++){ var vin=normalizeScannedVin(codes[i].rawValue); if(vin){ onVin(id,vin); return; } }
        }catch(e){}
        scanState.raf=requestAnimationFrame(tick);
      };
      scanState.raf=requestAnimationFrame(tick);
    } else {
      try{ await loadZXing(); }catch(e){ setScanMsg(id,'Scanner unavailable — type the VIN.'); return; }
      if(!scanState || scanState.id!==id) return;
      var Z=window.ZXing, reader;
      try{
        if(Z.DecodeHintType && Z.BarcodeFormat){
          var hints=new Map();
          hints.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.CODE_39,Z.BarcodeFormat.DATA_MATRIX]);
          hints.set(Z.DecodeHintType.TRY_HARDER,true);
          reader=new Z.BrowserMultiFormatReader(hints);
        } else { reader=new Z.BrowserMultiFormatReader(); }
      }catch(e){ reader=new Z.BrowserMultiFormatReader(); }
      scanState.reader=reader;
      reader.decodeFromVideoDevice(null, video, function(result){
        if(result){ var vin=normalizeScannedVin(result.getText?result.getText():result.text); if(vin){ onVin(id,vin); } }
      });
    }
  }

      var out = await res.json().catch(function(){ return {ok:true,warnings:[]}; });

      STATE.vinBlocked[id]=true;

        '<a href="#" class="link" id="cert_'+b.id+'">View / download certificate</a>'+
        (b.signed ? '<a href="#" class="link" id="sig_'+b.id+'" style="margin-left:14px">✍ Signed — view</a>' : '');
      var certEl=c.querySelector('#cert_'+b.id);
      if(certEl) certEl.onclick=async function(e){
        e.preventDefault();
        var res=await fetch('/.netlify/functions/installer-certificate?recordId='+encodeURIComponent(b.id),{headers:{'x-installer-token':tok()}});
        if(!res.ok){ fail('Could not load certificate.'); return; }
        var html=await res.text();
        var url=URL.createObjectURL(new Blob([html],{type:'text/html'}));
        window.open(url,'_blank');
      };
      var sv=c.querySelector('#sig_'+b.id);
      if(sv) sv.onclick=function(e){ e.preventDefault(); viewSignature(b.id); };
      return c;
    }
    if(b.status==='No-show'){ c.innerHTML=head+'<div class="noshow">No-show · waitlisted</div>'; return c; }
    var opts='<option value="" disabled selected>Choose OTT Calibration…</option>'+CAL.map(function(o){return '<option>'+o+'</option>';}).join('');
    c.innerHTML=head+
      '<input id="vin_'+b.id+'" maxlength="17" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="VIN — 17 characters" style="text-transform:uppercase;margin:6px 0">'+
      (canScan()?'<button type="button" class="btn scanvin" id="scan_'+b.id+'">📷 Scan VIN</button>':'')+
      '<div id="vinwarn_'+b.id+'" class="vinwarn hidden"></div>'+
      '<select id="cal_'+b.id+'">'+opts+'</select>'+
      '<div class="otthdr">OTT commission report</div>'+
      sel('tp_'+b.id, TP, 'Tuning Platform')+
      sel('ct_'+b.id, CT, 'Calibration Type')+
      '<input id="ecu_'+b.id+'" autocomplete="off" spellcheck="false" placeholder="ECU ID" style="text-transform:uppercase;margin:5px 0">'+
      '<input id="gear_'+b.id+'" autocomplete="off" spellcheck="false" placeholder="Gear ratio (e.g. 4.30)" style="margin:5px 0">'+
      '<input id="mi_'+b.id+'" inputmode="numeric" autocomplete="off" placeholder="Mileage" style="margin:5px 0">'+
      '<input id="cem_'+b.id+'" type="email" autocomplete="off" placeholder="Customer email (for their certificate)" value="'+esc(b.email||'')+'" style="margin:5px 0">'+ 
      '<div class="row-actions"><button class="btn" id="ok_'+b.id+'">Mark complete</button></div>'+
      '<label class="nsconfirm"><input type="checkbox" id="nsc_'+b.id+'"> Customer didn\'t show — add to waitlist</label>'+
      '<div class="row-actions"><button class="btn ns" id="ns_'+b.id+'" disabled>No-show</button></div>';
    c.querySelector('#ok_'+b.id).onclick=function(){ complete(b.id); };
    if(canScan()){ var sb=c.querySelector('#scan_'+b.id); if(sb) sb.onclick=function(){ startScan(b.id); }; }
    var cb=c.querySelector('#nsc_'+b.id), nsb=c.querySelector('#ns_'+b.id);
    cb.onchange=function(){ nsb.disabled=!cb.checked; };
    nsb.onclick=function(){ if(cb.checked) closeout(b.id,{action:'noshow',confirmed:true}); };
    var vinEl = c.querySelector('#vin_'+b.id);
    if(vinEl) vinEl.oninput = function(){ scheduleVinCheck(b.id); };
    return c;
  }

  async function complete(id){
    clearMsg();
    var vin=val('vin_'+id).toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(vin.length!==17){ fail('Enter the full 17-character VIN.'); return; }
    var cal=val('cal_'+id); if(!cal){ fail('Pick an OTT Calibration.'); return; }
    var tp=val('tp_'+id); if(!tp){ fail('Pick the Tuning Platform.'); return; }
    var ct=val('ct_'+id); if(!ct){ fail('Pick the Calibration Type.'); return; }
    var ecu=val('ecu_'+id).toUpperCase(); if(!ecu){ fail('Enter the ECU ID.'); return; }
    var gear=val('gear_'+id); if(!gear){ fail('Enter the gear ratio.'); return; }
    var mi=val('mi_'+id).replace(/[^0-9]/g,''); if(!mi){ fail('Enter the mileage.'); return; }
    var cem=val('cem_'+id);
    if(STATE.vinBlocked[id]){ var ack=document.getElementById('ackvin_'+id); if(!(ack && ack.checked)){ fail("Double-check the VIN, or tick 'I've verified this VIN is correct'."); return; } }
    var extra={action:'complete',calibration:cal,vin:vin,tuningPlatform:tp,calibrationType:ct,ecuId:ecu,gearSize:gear,mileage:mi,customerEmail:cem};
    openSignOverlay(id, extra);
  }

  async function closeout(id,extra){
    clearMsg();
    var body=Object.assign({recordId:id},extra);
    var res, netErr=null;
    try { res=await fetch('/.netlify/functions/installer-closeout',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(body)}); }
    catch(e){ netErr=e; }
    if(!netErr && res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    if(netErr || (res && Q().shouldQueue(null, res.status))){ enqueueOp('closeout', body, id, extra); return; }
    var out=await res.json().catch(function(){return{};});
    var b=STATE.bookings.filter(function(x){return x.id===id;})[0];
    if(out.status==='completed'){ if(b){ b.status='Completed'; if(extra.calibration)b.calibration=extra.calibration; if(extra.vin)b.vin=extra.vin; if(extra.tuningPlatform)b.tuningPlatform=extra.tuningPlatform; if(extra.calibrationType)b.calibrationType=extra.calibrationType; if(extra.signature) b.signed=true; } renderAll(); }
    else if(out.status==='noshow'){ if(b){ b.status='No-show'; } renderAll(); }
    else { fail('Could not save: '+(out.error||'error '+res.status)); }
  }

  function queuePush(op){ var q=Q().loadQueue(store()); q.push(op); Q().saveQueue(store(), q); renderPendingBadge(); }
  function enqueueOp(type, body, id, extra){
    var op=Q().makeOp(type, body); queuePush(op);
    if(type==='closeout'){
      var b=STATE.bookings.filter(function(x){return x.id===id;})[0];
      if(b){ if(extra.action==='noshow'){ b.status='No-show'; } else { b.status='Completed'; if(extra.calibration)b.calibration=extra.calibration; if(extra.vin)b.vin=extra.vin; if(extra.signature)b.signed=true; b.pendingSync=true; } }
      renderAll();
      succeed('Saved — will sync when you’re back online.' + (extra.signature||extra.calibration ? ' The certificate sends once synced.' : ''));
    }
    registerBgSync();
  }

  var FLUSHING=false;
  async function flushQueue(){
    if(FLUSHING) return; FLUSHING=true;
    var synced=0;
    try{
      var q=Q().loadQueue(store());
      while(q.length){
        var op=q[0], url=op.type==='closeout'?'/.netlify/functions/installer-closeout':'/.netlify/functions/installer-walkin';
        var res, netErr=null;
        try{ res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(op.body)}); }
        catch(e){ netErr=e; }
        var verdict = netErr ? 'retry-later' : Q().nextFlushResult(res.status);
        if(verdict==='remove' || verdict==='drop'){
          if(verdict==='drop') fail('A queued '+op.type+' could not be saved and was dropped.');
          else synced++;
          q.shift(); Q().saveQueue(store(), q); renderPendingBadge();
        } else if(verdict==='stop-auth'){
          Q().saveQueue(store(), q); localStorage.removeItem('ty_installer_token'); location.reload(); return;
        } else { break; }
      }
      // Refresh the roster ONLY when we actually synced a queued op, so the newly
      // saved records appear. Reloading on an already-empty queue would recurse
      // load()→flushQueue()→load()… forever (load() calls flushQueue on every load).
      if(Q().shouldReloadAfterFlush(synced, Q().loadQueue(store()).length, navigator.onLine)){ load(); }
    } finally { FLUSHING=false; renderPendingBadge(); }
  }

  function renderPendingBadge(){
    var n=Q().loadQueue(store()).length, el=document.getElementById('pendingbadge');
    if(!el){ el=document.createElement('a'); el.id='pendingbadge'; el.href='#'; el.className='link'; el.style.cssText='margin-left:14px';
      el.onclick=function(e){ e.preventDefault(); flushQueue(); };
      // Insert in the header links row (before #header), not at the bottom of #app.
      var anchor=document.getElementById('pushlink')||document.getElementById('reviewlink')||document.getElementById('logout');
      if(anchor && anchor.parentNode){ anchor.parentNode.insertBefore(el, anchor.nextSibling); }
      else { var app=document.getElementById('app'); if(app) app.insertBefore(el, app.firstChild); } }
    if(n>0){ el.style.display=''; el.textContent='⏳ '+n+' pending sync'; } else { el.style.display='none'; }
  }
  function registerBgSync(){
    if('serviceWorker' in navigator && 'SyncManager' in window){
      navigator.serviceWorker.ready.then(function(reg){ if(reg.sync) reg.sync.register('ty-flush').catch(function(){}); }).catch(function(){});
    }
  }
  window.addEventListener('online', flushQueue);
  window.addEventListener('beforeunload', function(e){ if(Q().loadQueue(store()).length){ e.preventDefault(); e.returnValue=''; return ''; } });
</script>
</body>
