<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Tuned Yota — Installer Console</title>
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/fox.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/installer.webmanifest">
<meta name="theme-color" content="#3A2E26">
<script src="/commission-tally.js"></script>
  <script src="/offline-queue.js"></script>
<style>
  :root{--ink:#3A2E26;--accent:#5B4B42;--line:#d8d2ca;--muted:#7c8472;}
  *{box-sizing:border-box;} body{font-family:-apple-system,Arial,sans-serif;color:var(--ink);margin:0;background:#faf8f5;}
  main{max-width:640px;margin:0 auto;padding:16px 14px 110px;}
  h1{font-size:19px;color:var(--accent);margin:6px 0 10px;}
  input{width:100%;padding:12px;font-size:16px;border:1px solid var(--line);border-radius:8px;}
  .btn{padding:12px;font-size:15px;font-weight:700;color:#fff;background:var(--accent);border:0;border-radius:8px;cursor:pointer;}
  .btn[disabled]{opacity:.45;}
  .link{display:inline-block;margin:2px 0 8px;color:#2f5d8a;font-size:14px;}
  .card{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;background:#fff;}
  .top{display:flex;justify-content:space-between;gap:8px;font-size:14px;}
  .who{font-weight:700;} .meta{color:var(--muted);font-size:13px;margin:2px 0 6px;}
  .ffnote{background:#fdf3e3;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:6px 8px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn{background:#fdf0dd;border:1px solid #e6c99a;color:#8a5a12;border-radius:7px;padding:8px 10px;font-size:12.5px;line-height:1.35;margin:2px 0 8px;}
  .vinwarn-h{font-weight:700;margin-bottom:2px;} .vinwarn ul{margin:2px 0 4px;padding-left:18px;}
  select{padding:9px;font-size:15px;border:1px solid var(--line);border-radius:8px;width:100%;margin:6px 0;}
  /* Day-view booking picker: 16px+ stops iOS auto-zoom; bold + accent border marks it
     as the day's primary control. */
  .bookingpick{font-size:16px;font-weight:700;padding:12px;border-width:2px;border-color:var(--accent);}
  .row-actions{display:flex;gap:8px;margin-top:6px;} .row-actions .btn{flex:1;}
  .ns{background:#8a6a3a;} .done{color:#2f5d2a;font-weight:700;} .noshow{color:#8a2a2a;font-weight:700;}
  .hidden{display:none;} .msg{margin-top:8px;font-size:13px;} .err{color:#8a2a2a;} .msg.ok{color:#2f5d2a;font-weight:700;}
  .otthdr{font-size:11px;color:var(--muted);margin:10px 0 0;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
  .nsconfirm{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:8px;color:#8a2a2a;}
  .nsconfirm input{width:auto;}
  .banner{background:#fff4e5;border:1px solid #e0b877;border-radius:10px;padding:4px 12px;margin:10px 0;}
  .mnav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:14px 0 6px;}
  .mnav .lbl{font-weight:800;color:var(--accent);font-size:16px;}
  .mnav button{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:16px;cursor:pointer;}
  details{border:1px solid var(--line);border-radius:10px;background:#fff;margin:8px 0;}
  summary{padding:12px;font-weight:700;font-size:14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:8px;}
  summary::-webkit-details-marker{display:none;}
  details[open]>summary{border-bottom:1px solid var(--line);}
  .dbody{padding:2px 12px 8px;}
  .count{color:var(--muted);font-weight:600;}
  .sec-h{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;}
  .walkform input{margin:5px 0;}
  .scanvin{background:#5B4B42;margin:0 0 6px;width:100%;}
  .scanwrap{position:relative;margin:6px 0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#000;}
  .scanwrap video{width:100%;display:block;max-height:60vh;object-fit:cover;}
  .scanhint{color:#fff;font-size:12px;text-align:center;padding:6px;background:rgba(0,0,0,.55);position:absolute;top:0;left:0;right:0;}
  .scanmsg{color:#ffe;font-size:12px;text-align:center;padding:4px 4px 8px;background:#000;}
  /* --- smart-feed dashboard --- */
  .hdr{position:sticky;top:0;z-index:5;background:#faf8f5;padding:6px 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px;}
  .tally{display:flex;flex-wrap:wrap;gap:6px 14px;align-items:baseline;font-size:13px;color:var(--muted);margin:2px 0 8px;}
  .tally b{color:var(--ink);font-size:15px;} .tally .g{color:#2f5d2a;} .tally .o{color:#8a5a12;} .tally .r{color:#8a2a2a;}
  .tally .next{flex-basis:100%;color:var(--accent);font-weight:600;}
  .search{position:relative;}
  .search input{width:100%;padding:11px 34px 11px 12px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;}
  .search .x{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:#e7e2da;color:#555;width:24px;height:24px;border-radius:12px;font-size:15px;line-height:1;cursor:pointer;}
  .sec{margin:16px 0 4px;} .sec .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .sec.warn .lbl{color:#8a5a12;}
  .evt{border:1px solid var(--line);border-radius:11px;background:#fff;margin:8px 0;overflow:hidden;}
  .evt.warn{border-color:#e6c99a;} .evt.today{border-color:#bcd0bc;}
  .evt>summary{padding:12px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .evt>summary::-webkit-details-marker{display:none;}
  .evt[open]>summary{border-bottom:1px solid var(--line);}
  .evt .etitle{font-weight:800;font-size:15px;color:var(--accent);} .evt .edate{font-size:12px;color:var(--muted);font-weight:600;}
  .pill{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;background:#eef1ea;color:var(--muted);}
  .pill.hasopen{background:#fdf0dd;color:#8a5a12;} .pill.alldone{background:#e7f2e2;color:#2f5d2a;}
  .ebody{padding:4px 12px 10px;}
  .donehdr{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px;border-top:1px dashed var(--line);padding-top:8px;}
  .addwalk{width:100%;margin:8px 0 2px;background:#5B4B42;} .walkmini input{margin:5px 0;} .walkmini select{margin:5px 0;}
  .tabbtn{background:#1a1a1a;border:1px solid #333;color:var(--muted);padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer}
  .tabbtn.on{background:var(--accent);color:#111;border-color:var(--accent)}
  .tabbadge{background:#8a6d3b;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;margin-left:4px}
  .walkmini .fld{font-size:12px;color:var(--muted);font-weight:700;margin:6px 0 0;display:block;}
  .empty{color:var(--muted);font-size:13px;padding:8px 0;}
  .showmore{width:100%;background:#fff;color:var(--accent);border:1px dashed var(--line);border-radius:9px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;margin:6px 0;}
  .card .installer-tag{font-size:11px;font-weight:700;color:#5B4B42;background:#eef1ea;padding:1px 6px;border-radius:10px;}
  .reviewov{display:none;position:fixed;inset:0;background:rgba(25,28,30,.75);z-index:50;align-items:center;justify-content:center;padding:20px;}
  .reviewbox{background:#fff;border-radius:14px;padding:22px;max-width:360px;width:100%;text-align:center;}
  .reviewh{font-weight:800;color:var(--accent);font-size:16px;margin-bottom:14px;}
  .reviewqr{width:70vw;max-width:300px;height:auto;display:block;margin:0 auto 12px;border:1px solid var(--line);border-radius:8px;}
  /* ============ switchable theme layouts (source: design/installer-console.html) ============
     One functional console, three skins. Each theme sets the --t-* palette; the shared rules
     below repaint the existing components from those vars. Default = heritage (set at boot),
     the closest evolution of the console's classic warm palette. */
  body[data-theme="heritage"]{--t-bg:#f6f1e7;--t-ink:#231a10;--t-muted:#988a75;--t-soft:#5c5140;
    --t-card:#fffdf8;--t-line:rgba(43,32,22,.14);--t-accent:#b98a2e;--t-accent-ink:#2b2016;
    --t-strong:#2b2016;--t-strong-ink:#f6f1e7;--t-ok:#3d6b35;--t-ok-bg:#e4efe0;
    --t-warn:#8a6512;--t-warn-bg:#f5ead1;--t-danger:#c23b2e;--t-danger-bg:#f7e5e2;
    --t-pill:#efe7d7;--t-input:#fffdf8;--t-radius:14px;}
  body[data-theme="night"]{--t-bg:#0d0d0d;--t-ink:#fff;--t-muted:#898781;--t-soft:#c3c2b7;
    --t-card:#1a1a19;--t-line:rgba(255,255,255,.12);--t-accent:#fab219;--t-accent-ink:#161206;
    --t-strong:#fab219;--t-strong-ink:#161206;--t-ok:#4ec84e;--t-ok-bg:rgba(12,163,12,.14);
    --t-warn:#fab219;--t-warn-bg:rgba(250,178,25,.14);--t-danger:#e66767;--t-danger-bg:rgba(230,103,103,.14);
    --t-pill:#242422;--t-input:#242422;--t-radius:16px;}
  body[data-theme="field"]{--t-bg:#f4f5f7;--t-ink:#101318;--t-muted:#8a909c;--t-soft:#4c5361;
    --t-card:#fff;--t-line:rgba(16,19,24,.09);--t-accent:#1c5cab;--t-accent-ink:#fff;
    --t-strong:#1c5cab;--t-strong-ink:#fff;--t-ok:#006300;--t-ok-bg:#e4f3e4;
    --t-warn:#8a5a12;--t-warn-bg:#f7ecd9;--t-danger:#d03b3b;--t-danger-bg:#fbe9e9;
    --t-pill:#eef0f3;--t-input:#fff;--t-radius:18px;}
  body[data-theme]{background:var(--t-bg);color:var(--t-ink);}
  body[data-theme] h1{color:var(--t-ink);}
  body[data-theme] .hdr{background:var(--t-bg);border-bottom-color:var(--t-line);}
  body[data-theme] .card,body[data-theme] details{background:var(--t-card);border-color:var(--t-line);border-radius:var(--t-radius);}
  body[data-theme] details[open]>summary,body[data-theme] .evt[open]>summary{border-bottom-color:var(--t-line);}
  body[data-theme] .evt .etitle{color:var(--t-ink);}
  body[data-theme] .evt.warn{border-color:var(--t-danger);}
  body[data-theme] .evt.today{border-color:var(--t-accent);}
  body[data-theme] .evt .edate,body[data-theme] .meta,body[data-theme] .count,body[data-theme] .sec .lbl,
  body[data-theme] .empty,body[data-theme] .donehdr,body[data-theme] .otthdr{color:var(--t-muted);}
  body[data-theme] .sec.warn .lbl{color:var(--t-warn);}
  body[data-theme] .walkmini .fld{color:var(--t-muted);}
  body[data-theme] input,body[data-theme] select{background:var(--t-input);color:var(--t-ink);border-color:var(--t-line);}
  body[data-theme] input::placeholder{color:var(--t-muted);}
  body[data-theme] .search input{background:var(--t-input);color:var(--t-ink);border-color:var(--t-line);}
  body[data-theme] .search .x{background:var(--t-pill);color:var(--t-soft);}
  body[data-theme] .btn{background:var(--t-strong);color:var(--t-strong-ink);}
  body[data-theme] .btn.ns{background:transparent;color:var(--t-danger);border:1px solid var(--t-danger);}
  body[data-theme] .addwalk,body[data-theme] .scanvin{background:var(--t-strong);color:var(--t-strong-ink);}
  body[data-theme] .link{color:var(--t-accent);}
  body[data-theme] #logout{color:var(--t-danger) !important;}
  body[data-theme] .pill{background:var(--t-pill);color:var(--t-muted);}
  body[data-theme] .pill.hasopen{background:var(--t-warn-bg);color:var(--t-warn);}
  body[data-theme] .pill.alldone{background:var(--t-ok-bg);color:var(--t-ok);}
  body[data-theme] .tabbtn{background:var(--t-card);border-color:var(--t-line);color:var(--t-soft);}
  body[data-theme] .tabbtn.on{background:var(--t-accent);color:var(--t-accent-ink);border-color:var(--t-accent);}
  body[data-theme] .tabbadge{background:var(--t-danger);color:#fff;}
  body[data-theme] .done{color:var(--t-ok);} body[data-theme] .noshow{color:var(--t-danger);}
  body[data-theme] .msg.ok{color:var(--t-ok);} body[data-theme] .err{color:var(--t-danger);}
  body[data-theme] .showmore{background:transparent;color:var(--t-accent);border-color:var(--t-line);}
  body[data-theme] .card .installer-tag{background:var(--t-pill);color:var(--t-soft);}
  body[data-theme="night"] .ffnote,body[data-theme="night"] .vinwarn,body[data-theme="night"] .banner{background:#26200f;border-color:rgba(250,178,25,.4);color:#e8c87a;}
  body[data-theme="night"] .nsconfirm{color:#e66767;}
  /* --- themed dashboard summary (rendered by renderSummary) --- */
  #summary{margin:8px 0 2px;}
  .sm-hero{border:1px solid var(--t-line);border-radius:var(--t-radius);background:var(--t-card);padding:16px;margin-bottom:10px;}
  body[data-theme="night"] .sm-hero{background:linear-gradient(160deg,#262112 0%,#1a1a19 55%);border-color:rgba(250,178,25,.25);}
  .sm-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t-accent);margin-bottom:6px;}
  .sm-tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--t-accent);}
  body[data-theme="night"] .sm-tag::before{box-shadow:0 0 8px rgba(250,178,25,.8);}
  .sm-hero h2{font-size:24px;font-weight:800;margin:0;line-height:1.1;color:var(--t-ink);}
  .sm-when{font-size:13px;color:var(--t-soft);margin-top:3px;}
  .sm-meta{display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--t-line);font-size:12px;color:var(--t-muted);}
  .sm-meta b{display:block;font-size:16px;color:var(--t-ink);}
  .sm-cta{display:flex;gap:8px;margin-top:12px;}
  .sm-cta .btn{flex:1;padding:10px 0;}
  .sm-alert{display:flex;align-items:center;gap:12px;background:var(--t-card);border:1px solid var(--t-danger);border-radius:var(--t-radius);padding:12px 14px;margin-bottom:10px;cursor:pointer;}
  .sm-alert .icon{width:34px;height:34px;border-radius:10px;background:var(--t-danger-bg);display:flex;align-items:center;justify-content:center;font-size:15px;flex:0 0 34px;}
  .sm-alert b{font-size:13.5px;display:block;color:var(--t-ink);}
  .sm-alert span{font-size:12px;color:var(--t-muted);}
  .sm-alert .act{font-size:12.5px;font-weight:700;color:var(--t-danger);white-space:nowrap;}
  .sm-kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}
  .sm-tile{background:var(--t-card);border:1px solid var(--t-line);border-radius:var(--t-radius);padding:11px 12px 9px;}
  .sm-tile .label{font-size:11px;color:var(--t-muted);margin-bottom:3px;}
  .sm-tile .value{font-size:20px;font-weight:800;color:var(--t-ink);}
  .sm-tile .sub{font-size:11px;color:var(--t-muted);margin-top:2px;}
  .sm-life{display:flex;justify-content:space-between;align-items:center;background:var(--t-card);border:1px solid var(--t-line);border-radius:var(--t-radius);padding:10px 14px;margin-bottom:10px;font-size:12.5px;color:var(--t-muted);}
  .sm-life b{color:var(--t-ink);}
  .sm-head{display:flex;justify-content:space-between;align-items:flex-start;padding:2px 2px 8px;}
  .sm-date{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t-muted);}
  .sm-head h2{font-size:23px;font-weight:800;margin:2px 0 0;color:var(--t-ink);}
  .sm-sub{font-size:13px;color:var(--t-soft);margin-top:2px;}
  .sm-month{background:var(--t-card);border:1px solid var(--t-line);border-radius:var(--t-radius);padding:14px 16px;margin-bottom:10px;}
  .sm-row1{display:flex;justify-content:space-between;align-items:baseline;}
  .sm-label{font-size:12px;font-weight:700;color:var(--t-muted);letter-spacing:.06em;text-transform:uppercase;}
  .sm-frac{font-size:13px;color:var(--t-soft);font-weight:600;}
  .sm-big{display:flex;align-items:baseline;gap:8px;margin:7px 0 10px;}
  .sm-big b{font-size:30px;font-weight:800;color:var(--t-ink);}
  .sm-big span{font-size:13px;color:var(--t-soft);}
  .sm-meter{height:10px;border-radius:99px;background:var(--t-pill);overflow:hidden;display:flex;}
  .sm-fill{background:var(--t-accent);border-radius:99px;}
  .sm-legend{display:flex;gap:14px;margin-top:8px;font-size:11.5px;color:var(--t-soft);}
  .sm-legend i{display:inline-block;width:8px;height:8px;border-radius:3px;margin-right:5px;}
  .sm-duo{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .sm-fig{font-size:40px;font-weight:800;line-height:1.05;margin:4px 0 2px;color:var(--t-ink);}
  .sm-hsub{font-size:13px;color:var(--t-soft);}
  .sm-hsub b{color:var(--t-ok);}
  .sm-tally{display:flex;margin-top:12px;border-top:1px solid var(--t-line);padding-top:11px;}
  .sm-tally div{flex:1;text-align:center;border-right:1px solid var(--t-line);}
  .sm-tally div:last-child{border-right:none;}
  .sm-tally b{display:block;font-size:18px;font-weight:800;color:var(--t-ink);}
  .sm-tally span{font-size:10.5px;color:var(--t-muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
  .sm-marks{margin-top:11px;display:flex;align-items:center;gap:10px;}
  .sm-marks span{font-size:11.5px;color:var(--t-muted);}
  .sm-ledger{display:flex;align-items:center;gap:12px;background:var(--t-danger-bg);border:1px solid var(--t-danger);border-radius:var(--t-radius);padding:12px 14px;margin-bottom:10px;cursor:pointer;}
  .sm-stamp{font-size:10px;font-weight:900;letter-spacing:.08em;color:var(--t-danger);border:2px solid var(--t-danger);border-radius:6px;padding:3px 6px;transform:rotate(-4deg);flex:0 0 auto;}
  .sm-ledger b{font-size:13.5px;display:block;color:var(--t-ink);}
  .sm-ledger span{font-size:11.5px;color:var(--t-soft);}
  .sm-ledger .go{font-weight:800;color:var(--t-danger);font-size:13px;white-space:nowrap;margin-left:auto;}
  .sm-adminline{font-size:12px;color:var(--t-muted);margin:2px 2px 8px;}
  .sm-adminline b{color:var(--t-ink);}
  /* --- bottom action bar --- */
  .bbar{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;justify-content:center;pointer-events:none;}
  .bbar .inner{pointer-events:auto;display:flex;gap:8px;align-items:center;width:100%;max-width:640px;padding:18px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(250,248,245,0) 0%,#faf8f5 55%);}
  body[data-theme="night"] .bbar .inner{background:linear-gradient(180deg,rgba(13,13,13,0) 0%,#0d0d0d 55%);}
  body[data-theme="field"] .bbar .inner{background:linear-gradient(180deg,rgba(244,245,247,0) 0%,#f4f5f7 55%);}
  body[data-theme="heritage"] .bbar .inner{background:linear-gradient(180deg,rgba(246,241,231,0) 0%,#f6f1e7 55%);}
  .bbar .fab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--t-accent,#5B4B42);color:var(--t-accent-ink,#fff);font-weight:800;font-size:14px;padding:14px 0;border-radius:14px;border:0;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.18);font-family:inherit;}
  .bbar .bico{width:48px;height:48px;border-radius:14px;background:var(--t-card,#fff);border:1px solid var(--t-line,#d8d2ca);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--t-soft,#5B4B42);flex:0 0 48px;cursor:pointer;font-family:inherit;}
  /* --- theme switcher sheet + toast --- */
  .veil{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;}
  .veil.open{opacity:1;pointer-events:auto;}
  .sheet{position:fixed;left:50%;transform:translate(-50%,105%);bottom:0;width:100%;max-width:640px;z-index:61;background:#fff;border-radius:22px 22px 0 0;padding:18px 18px 34px;transition:transform .3s cubic-bezier(.32,.72,.28,1);box-shadow:0 -12px 40px rgba(0,0,0,.25);}

  .theme-opt{display:flex;align-items:center;gap:13px;border:2px solid #eceae4;border-radius:15px;padding:12px 13px;margin-bottom:9px;cursor:pointer;background:#fff;width:100%;text-align:left;font-family:inherit;transition:border-color .15s;}

  .swatch.field{background:linear-gradient(140deg,#f4f5f7 55%,#dce9f8);color:#1c5cab;}

  .theme-opt .check{margin-left:auto;font-size:17px;color:#16130e;opacity:0;}
  .theme-opt.sel .check{opacity:1;}
  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(8px);z-index:70;background:#16130e;color:#fff;font-size:12.5px;font-weight:700;padding:9px 16px;border-radius:99px;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<body>
<main>

    <a class="link" href="#" id="pushlink" style="display:none;margin-left:14px">🔔 Enable notifications</a>

    <a class="link" href="#" id="themelink" style="margin-left:14px" title="Change layout">🎨 Layout</a>
    <div id="header" class="hdr"></div>
    <div id="summary"></div>
    <div id="feed"></div>
    <div id="msg" class="msg"></div>
    <div class="bbar" id="bbar"><div class="inner">
      <button type="button" class="bico" id="bbsearch" title="Search" aria-label="Search">🔍</button>
      <button type="button" class="fab" id="bbwalk">＋ Log walk-in / call-in</button>
      <button type="button" class="bico" id="bbshare" title="Share a booking link" aria-label="Share a booking link">🔗</button>
    </div></div>
  </div>
</main>
<div class="veil" id="veil"></div>
<div class="sheet" id="sheet" role="dialog" aria-label="Choose your layout">
  <div class="grab"></div>
  <h4>Choose your layout</h4>
  <div class="hint">Pick the style that fits how you work. Same data, three looks — saved to your profile.</div>
  <button type="button" class="theme-opt" data-theme="night"><div class="swatch night">🌙</div><div><b>Night Shift</b><span>Dark mission-control · next event leads · thumb bar</span></div><div class="check">✓</div></button>

  <button type="button" class="theme-opt" data-theme="heritage"><div class="swatch heritage">🎟️</div><div><b>Heritage Garage</b><span>Brand classic · earnings ledger · tally wall</span></div><div class="check">✓</div></button>
</div>
<div class="toast" id="toast"></div>
<script>
  var CAL = ["Light","Mild","Medium","Spicy","SS","Light and Mild","Mild and Medium","Medium and Spicy","Spicy and SS"];
  var TP = ["VFT","HPT","PCM","BB"];
  var CT = ["Basic","MAF","Basic + MAF","Supercharger","CARB Update","9.2 New","9.2 Update","TCM Update","Custom","K-Line"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var STATE = { today:'', bookings:[], events:[], admin:false, installerFilter:'', q:'', showAllPast:false, eventOpen:{}, walkOpen:{}, eventSel:{}, vinBlocked:{}, reviewUrl:'', vapidPublicKey:''
    , tab:'jobs', leads:[], leadsLoaded:false, leadStageOpen:{}, leadFilter:'', leadQ:''
    , jobTab: 'all'      // 'all' | '<city>' | 'done'
    , doneCity: ''       // optional city filter applied inside the Done view
    , theme: '', me: '' };
  function Q(){ return window.OfflineQueue; }
  function store(){ return window.localStorage; }

  function registerServiceWorker(){
    if(!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('/sw.js').catch(function(){});
    navigator.serviceWorker.addEventListener('message', function(e){ if(e.data && e.data.type==='ty-flush') flushQueue(); });
  }

  function sel(id,list,ph){ return '<select id="'+id+'"><option value="" disabled selected>'+ph+'…</option>'+list.map(function(o){return '<option>'+o+'</option>';}).join('')+'</select>'; }
  function val(id){ var el=document.getElementById(id); return el?(el.value||'').trim():''; }
  function tok(){ return localStorage.getItem('ty_installer_token') || ''; }
  function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':s); return d.innerHTML; }
  function ym(iso){ return (iso||'').slice(0,7); }
  function isOpen(b){ return b.status!=='Completed' && b.status!=='No-show' && b.status!=='Cancelled'; }
  function cap(s){ return s?s.charAt(0).toUpperCase()+s.slice(1):''; }
  function money(n){ return '$' + Math.round(n || 0).toLocaleString('en-US'); }
  // The installer's LOCAL date (Central), not server UTC — UTC rolls to tomorrow in
  // the evening, which would mis-date an evening walk-in + push it into the wrong OTT month.
  function localToday(){ var d=new Date(),p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
  function daysBetween(aISO,bISO){ return Math.round((Date.parse(aISO+'T00:00:00Z')-Date.parse(bISO+'T00:00:00Z'))/86400000); }
  // Human date relative to today: Today / Tomorrow / in N days / Mon D[, YYYY].
  function relDate(iso){
    if(!iso) return '';
    var p=iso.split('-'), md=MONTHS[parseInt(p[1],10)-1].slice(0,3)+' '+parseInt(p[2],10);
    var full=md+(p[0]!==STATE.today.slice(0,4)?', '+p[0]:'');
    var d=daysBetween(iso,STATE.today);
    if(d===0) return 'Today'; if(d===1) return 'Tomorrow';
    if(d>1 && d<=7) return 'in '+d+' days · '+md;
    return full;
  }

  // --- Switchable theme layouts (source: design/installer-console.html) ---
  // The choice applies instantly from localStorage (zero-flash boot) and is persisted
  // server-side per installer (installer-prefs) so it follows them across devices; the
  // server value wins on the next load unless the installer just picked one here.
  var THEME_NAMES={night:'Night Shift',field:'Field Day',heritage:'Heritage Garage'};
  var THEME_COLORS={night:'#0d0d0d',field:'#f4f5f7',heritage:'#f6f1e7'};
  var themeTouched=false, toastTimer=null;
  function applyTheme(t){
    if(!THEME_NAMES[t]) t='heritage';
    STATE.theme=t; document.body.setAttribute('data-theme',t);
    var m=document.querySelector('meta[name="theme-color"]'); if(m) m.content=THEME_COLORS[t];
    Array.prototype.forEach.call(document.querySelectorAll('.theme-opt'),function(b){ b.classList.toggle('sel', b.getAttribute('data-theme')===t); });
  }
  function openSheet(){ document.getElementById('veil').classList.add('open'); document.getElementById('sheet').classList.add('open'); }
  function closeSheet(){ document.getElementById('veil').classList.remove('open'); document.getElementById('sheet').classList.remove('open'); }
  function setTheme(t){
    closeSheet();
    if(t===STATE.theme) return;
    themeTouched=true;
    applyTheme(t); try{ localStorage.setItem('ty_theme',t); }catch(e){}
    if(STATE.today) renderAll();   // re-render only once the roster is in — never stomp "Loading…"
    saveThemePref(t);
  }
  async function saveThemePref(t){
    try{
      var res=await fetch('/.netlify/functions/installer-prefs',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({theme:t})});
      var out=await res.json().catch(function(){return{};});
      showToast('Layout: '+THEME_NAMES[t]+(res.ok&&out.status==='ok'?' — saved to your profile':' — saved on this device'));
    }catch(e){ showToast('Layout: '+THEME_NAMES[t]+' — saved on this device'); }
  }
  async function loadThemePref(){
    try{
      var res=await fetch('/.netlify/functions/installer-prefs',{headers:{'x-installer-token':tok()}});
      if(!res.ok) return;
      var out=await res.json().catch(function(){return{};});
      if(out.status==='ok' && out.theme && !themeTouched && out.theme!==STATE.theme){
        applyTheme(out.theme); try{ localStorage.setItem('ty_theme',out.theme); }catch(e){}
        if(STATE.today) renderAll();   // roster not in yet → applyRoster's renderAll will paint it
      }
    }catch(e){}
  }
  function showToast(msg){
    var el=document.getElementById('toast'); if(!el) return;
    el.textContent=msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){ el.classList.remove('show'); },2200);
  }
  applyTheme(localStorage.getItem('ty_theme')||'heritage');

  document.getElementById('gate').onsubmit=function(e){ e.preventDefault(); var v=document.getElementById('tok').value.trim(); if(!v) return; localStorage.setItem('ty_installer_token', v); showApp(); };
  if(tok()) showApp();
  document.getElementById('logout').onclick=function(e){ e.preventDefault();
    if(Q().loadQueue(store()).length && !confirm('You have unsynced close-outs/walk-ins. Log out anyway and lose them?')) return;
    localStorage.removeItem('ty_installer_token'); location.reload(); };
  async function showApp(){ registerServiceWorker(); renderPendingBadge(); if(!(await nativeLock())) return; document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); load(); loadThemePref(); }
  function fail(m){ var el=document.getElementById('msg'); el.className='msg err'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function succeed(m){ var el=document.getElementById('msg'); el.className='msg ok'; el.textContent=m; el.scrollIntoView({block:'nearest'}); }
  function clearMsg(){ var el=document.getElementById('msg'); el.className='msg'; el.textContent=''; }

  function openReviewOverlay(){
    var ov = document.getElementById('reviewov');
    if(!ov){
      ov = document.createElement('div'); ov.id = 'reviewov'; ov.className = 'reviewov';
      ov.innerHTML = '<div class="reviewbox">'+
        '<div class="reviewh">Scan to review us on Google ★★★★★</div>'+
        '<img class="reviewqr" src="/.netlify/functions/review-qr" alt="Scan to review Tuned Yota on Google">'+
        '<a class="link" href="'+esc(STATE.reviewUrl)+'" target="_blank" rel="noopener">or tap here to review →</a>'+
        '<div style="height:8px"></div><button class="btn" id="reviewclose" style="width:100%">Close</button>'+
      '</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function(e){ if(e.target === ov) closeReviewOverlay(); });
      document.getElementById('reviewclose').onclick = closeReviewOverlay;
    }
    ov.style.display = 'flex';
  }
  function closeReviewOverlay(){ var ov = document.getElementById('reviewov'); if(ov) ov.style.display = 'none'; }

  // Admin-only AMSOIL funnel dashboard. Fetches /amsoil-metrics (admin-scoped) and
  // renders totals / funnel / by-source / a 14-day sparkline / recent clicks.
  function openAmsoilOverlay(){
    var ov=document.getElementById('amsoilov');
    if(!ov){
      ov=document.createElement('div'); ov.id='amsoilov'; ov.className='reviewov';
      ov.innerHTML='<div class="reviewbox" style="max-width:560px;width:92%;max-height:88vh;overflow:auto;text-align:left">'+
        '<div class="reviewh" style="text-align:center">🛢 AMSOIL funnel</div>'+
        '<div id="amsoilbody"><div class="empty">Loading…</div></div>'+
        '<div style="height:10px"></div><button class="btn" id="amsoilclose" style="width:100%">Close</button>'+
      '</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click', function(e){ if(e.target===ov) closeAmsoilOverlay(); });
      document.getElementById('amsoilclose').onclick=closeAmsoilOverlay;
    }
    ov.style.display='flex';
    loadAmsoilMetrics();
  }
  function closeAmsoilOverlay(){ var ov=document.getElementById('amsoilov'); if(ov) ov.style.display='none'; }
  async function loadAmsoilMetrics(){
    var body=document.getElementById('amsoilbody'); body.innerHTML='<div class="empty">Loading…</div>';
    var ctrl=new AbortController(), timer=setTimeout(function(){ ctrl.abort(); }, 15000);
    try{
      var res=await fetch('/.netlify/functions/amsoil-metrics',{ headers:{ 'x-installer-token':tok() }, signal:ctrl.signal });
      if(!res.ok){ body.innerHTML='<div class="empty">Couldn’t load AMSOIL numbers ('+res.status+').</div>'; return; }
      body.innerHTML=renderAmsoil(await res.json());
    }catch(e){ body.innerHTML='<div class="empty">Couldn’t load AMSOIL numbers — try again.</div>'; }
    finally{ clearTimeout(timer); }
  }
  function renderAmsoil(m){
    var t=m.totals||{}, f=m.funnel||{};
    function stat(label,val){ return '<div style="flex:1;min-width:88px;border:1px solid #e6e2d8;border-radius:10px;padding:10px 12px"><div style="font-size:22px;font-weight:800;color:var(--accent)">'+val+'</div><div style="font-size:12px;color:#7c8472">'+esc(label)+'</div></div>'; }
    var out='<div style="display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 12px">'+
      stat('Clicks',t.clicks||0)+stat('Shop',t.shop||0)+stat('Preferred Customer',t.pc||0)+'</div>';
    out+='<div style="font-weight:700;margin:10px 0 4px">Funnel</div>'+
      '<div style="font-size:14px;color:#3A2E26;line-height:1.5">Certificates sent → <strong>'+(f.certsSent||0)+'</strong> &nbsp;·&nbsp; with an AMSOIL click → <strong>'+(f.certClicks||0)+'</strong> &nbsp;·&nbsp; became Preferred Customers → <strong>'+(f.pcCustomers||0)+'</strong></div>';
    out+='<div style="font-weight:700;margin:14px 0 4px">By source</div>';
    if(!(m.bySource||[]).length){ out+='<div class="empty">No clicks yet.</div>'; }
    else{
      out+='<table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="color:#7c8472;text-align:left"><th style="padding:3px 6px">Source</th><th style="text-align:right">Clicks</th><th style="text-align:right">Shop</th><th style="text-align:right;padding-right:6px">PC</th></tr>';
      m.bySource.forEach(function(s){ out+='<tr><td style="padding:3px 6px">'+esc(s.source)+'</td><td style="text-align:right">'+s.clicks+'</td><td style="text-align:right">'+s.shop+'</td><td style="text-align:right;padding-right:6px">'+s.pc+'</td></tr>'; });
      out+='</table>';
    }
    var max=Math.max.apply(null,(m.daily||[]).map(function(d){return d.clicks;}).concat([1]));
    out+='<div style="font-weight:700;margin:14px 0 4px">Last 14 days</div><div style="display:flex;gap:3px;align-items:flex-end;height:46px">';
    (m.daily||[]).forEach(function(d){ var h=Math.round((d.clicks/max)*40)+2; out+='<div title="'+esc(d.date)+': '+d.clicks+' click(s)" style="flex:1;height:'+h+'px;background:var(--accent);opacity:'+(d.clicks?0.9:0.22)+';border-radius:2px"></div>'; });
    out+='</div>';
    out+='<div style="font-weight:700;margin:14px 0 4px">Recent clicks</div>';
    if(!(m.recent||[]).length){ out+='<div class="empty">None yet.</div>'; }
    else{ out+='<div style="font-size:13px">'; m.recent.forEach(function(r){ out+='<div style="padding:3px 0;border-bottom:1px solid #f0ece2">'+esc((r.at||'').slice(0,10))+' · '+esc(r.destination)+' · '+esc(r.source)+(r.name?' · '+esc(r.name):'')+'</div>'; }); out+='</div>'; }
    return out;
  }

  var SIGPAD = null;
  function openSignOverlay(id, extra){
    var b = STATE.bookings.filter(function(x){return x.id===id;})[0] || {};
    var summary = esc(((b.modelYear?b.modelYear+' ':'')+(b.vehicle||'')).trim()+(extra.calibration?' · '+extra.calibration:''));
    var ov = document.createElement('div');
    ov.className = 'reviewov'; ov.id = 'signov';
    ov.innerHTML =
      '<div class="reviewbox">'+
        '<button class="btn ns" id="signx" aria-label="Cancel" style="float:right;padding:4px 10px;width:auto;margin:-8px -8px 0 0">✕</button>'+
        '<div class="reviewh">Confirm the tune</div>'+
        '<p class="meta">'+summary+'</p>'+
        '<p class="meta">Ask the customer to sign below confirming the work is complete.</p>'+
        '<canvas id="sigpad" width="600" height="180" style="width:100%;height:180px;border:2px dashed #b9c0ad;border-radius:10px;background:#fff;touch-action:none"></canvas>'+
        '<div class="row-actions" style="margin-top:10px">'+
          '<button class="btn ns" id="sigclear">Clear</button>'+
          '<button class="btn" id="sigdone">✓ Done &amp; complete</button>'+
        '</div>'+
        '<a href="#" class="link" id="sigskip" style="margin-top:10px">Customer unavailable — skip →</a>'+
      '</div>';
    document.body.appendChild(ov);
    ov.style.display = 'flex';
    var canvas = ov.querySelector('#sigpad'), ctx = canvas.getContext('2d');
    ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#1c1c1c';
    SIGPAD = { canvas: canvas, ctx: ctx, dirty: false };
    var drawing = false;
    function pos(e){ var r = canvas.getBoundingClientRect(); var t = (e.touches && e.touches[0]) || e; return { x: (t.clientX - r.left) * (canvas.width / r.width), y: (t.clientY - r.top) * (canvas.height / r.height) }; }
    function down(e){ e.preventDefault(); drawing = true; var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
    function move(e){ if(!drawing) return; e.preventDefault(); var p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); SIGPAD.dirty = true; }
    function up(){ drawing = false; }
    canvas.addEventListener('pointerdown', down); canvas.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    ov.querySelector('#sigclear').onclick = function(){ ctx.clearRect(0,0,canvas.width,canvas.height); SIGPAD.dirty = false; };
    ov.querySelector('#sigdone').onclick = function(){ if(SIGPAD.dirty){ extra.signature = canvas.toDataURL('image/png'); } closeSignOverlay(); closeout(id, extra); };
    ov.querySelector('#sigskip').onclick = function(e){ e.preventDefault(); closeSignOverlay(); closeout(id, extra); };
    ov.querySelector('#signx').onclick = function(){ closeSignOverlay(); };
  }
  function closeSignOverlay(){ var ov = document.getElementById('signov'); if(ov) ov.remove(); SIGPAD = null; }

  async function viewSignature(id){
    clearMsg();
    try{
      var res = await fetch('/.netlify/functions/installer-signature?id='+encodeURIComponent(id), { headers:{ 'x-installer-token':tok() } });
      if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
      var out = await res.json().catch(function(){return{};});
      if(out.status!=='ok' || !out.signature){ succeed('No signature on file for this tune.'); return; }
      var ov = document.createElement('div'); ov.className='reviewov'; ov.id='sigviewov';
      ov.innerHTML = '<div class="reviewbox">'+
        '<button class="btn ns" id="sigviewx" aria-label="Close" style="float:right;padding:4px 10px;width:auto;margin:-8px -8px 0 0">✕</button>'+
        '<div class="reviewh">Customer sign-off</div>'+
        '<img alt="Customer signature" src="'+out.signature+'" style="width:100%;background:#fff;border:1px solid #d8dcc9;border-radius:10px">'+
        '</div>';
      document.body.appendChild(ov);
      ov.style.display = 'flex';
      ov.addEventListener('click', function(e){ if(e.target === ov) ov.remove(); });
      ov.querySelector('#sigviewx').onclick=function(){ ov.remove(); };
    }catch(e){ fail('Could not load the signature.'); }
  }

  function urlB64ToUint8Array(base64String){
    var padding = '='.repeat((4 - base64String.length % 4) % 4);
    var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    var raw = atob(base64), arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }
  async function enablePush(){
    clearMsg();
    if(!('serviceWorker' in navigator) || !('PushManager' in window)){ fail('Notifications aren’t supported on this browser.'); return; }
    try{
      var reg = await navigator.serviceWorker.register('/sw.js');
      var perm = await Notification.requestPermission();
      if(perm !== 'granted'){ fail('Notifications not enabled — allow them in your browser settings.'); return; }
      var sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64ToUint8Array(STATE.vapidPublicKey) });
      var res = await fetch('/.netlify/functions/push-subscribe', { method:'POST', headers:{ 'Content-Type':'application/json', 'x-installer-token':tok() }, body: JSON.stringify({ subscription: sub }) });
      if(!res.ok){ fail('Could not save your subscription.'); return; }
      var pl = document.getElementById('pushlink'); if(pl){ pl.textContent = '🔔 Notifications on · Send test'; pl.onclick = function(e){ e.preventDefault(); testPush(); }; }
      succeed('Notifications enabled on this device.');
    }catch(e){ fail('Couldn’t enable notifications: ' + (e && e.message ? e.message : 'error')); }
  }
  async function testPush(){
    clearMsg();
    try{ var res = await fetch('/.netlify/functions/push-check', { method:'POST', headers:{ 'x-installer-token':tok() } }); var out = await res.json().catch(function(){return{};}); succeed(out.sent ? 'Test sent — check your notifications.' : 'No device is subscribed yet.'); }
    catch(e){ fail('Test failed: ' + (e && e.message ? e.message : 'error')); }
  }

  // --- Native (Capacitor) helpers — no-ops on the plain website ---
  function isNative(){ return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }
  async function nativeLock(){
    if(!isNative()) return true;
    var B = window.Capacitor.Plugins && window.Capacitor.Plugins.BiometricAuth;
    if(!B) return true;
    try{ await B.authenticate({ reason:'Unlock Tuned Yota', allowDeviceCredential:true }); return true; }
    catch(e){ return false; }
  }
  async function registerPush(){
    if(!isNative()) return;
    var P = window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications;
    if(!P) return;
    try{
      var perm = await P.requestPermissions(); if(perm.receive!=='granted') return;
      P.addListener('registration', function(t){
        fetch('/.netlify/functions/push-register',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({token:t.value,platform:(window.Capacitor.getPlatform&&window.Capacitor.getPlatform())||''})});
      });
      await P.register();
    }catch(e){}
  }

  // The roster fetch is bounded by a hard timeout so a slow/stalled server (cold
  // function, network blip, Airtable latency, or the events sheet hanging) can never
  // leave the console wedged on "Loading…". On any failure we fall back to the last
  // synced roster if we have one, else show an explicit error with a Retry button.
  var ROSTER_TIMEOUT_MS = 15000;
  async function load(){
    document.getElementById('feed').innerHTML='<div class="empty">Loading…</div>';
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, ROSTER_TIMEOUT_MS);
    try {
      var res = await fetch('/.netlify/functions/installer-roster', { headers:{ 'x-installer-token':tok() }, signal: ctrl.signal });
      if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
      if(!res.ok){ rosterUnavailable('Could not reach the server — showing your last synced roster.'); return; }
      var data = await res.json();
      try { localStorage.setItem('ty_roster_cache', JSON.stringify({ savedAt: Date.now(), data: data })); } catch(e){}
      clearOfflineBanner();
      applyRoster(data);
      flushQueue();
    } catch(err){
      // AbortError = our timeout fired; anything else = network/parse failure.
      var msg = (err && err.name==='AbortError')
        ? 'The roster took too long to load — showing your last synced roster.'
        : 'Offline — showing your last synced roster.';
      rosterUnavailable(msg);
    } finally { clearTimeout(timer); }
  }
  // Cache-or-retry fallback for a failed roster load: prefer the last synced roster
  // (with a banner), else render an actionable Retry rather than a dead-end message.
  function rosterUnavailable(bannerMsg){
    var hasCache=false; try { hasCache=!!localStorage.getItem('ty_roster_cache'); } catch(e){}
    if(hasCache){ renderFromCache(bannerMsg); return; }
    retryFeed('Couldn’t load your roster.');
  }
  function retryFeed(msg){
    var feed=document.getElementById('feed'); feed.innerHTML='';
    var m=document.createElement('div'); m.className='empty'; m.textContent=msg; feed.appendChild(m);
    var b=document.createElement('button'); b.className='btn'; b.textContent='Retry'; b.style.marginTop='10px';
    b.onclick=function(){ load(); }; feed.appendChild(b);
  }

  function applyRoster(data){
    STATE.today = localToday(); STATE.bookings = data.bookings||[]; STATE.events = data.events||[];
    STATE.admin = !!data.admin;
    STATE.me = data.installer || '';
    STATE.reviewUrl = data.reviewUrl || '';
    var rl = document.getElementById('reviewlink');
    if(rl){
      if(STATE.reviewUrl){ rl.style.display = ''; rl.onclick = function(e){ e.preventDefault(); openReviewOverlay(); }; }
      else { rl.style.display = 'none'; }
    }
    STATE.vapidPublicKey = data.vapidPublicKey || '';
    var pl = document.getElementById('pushlink');
    if(pl){
      var supported = ('serviceWorker' in navigator) && ('PushManager' in window);
      if(STATE.vapidPublicKey && supported){ pl.style.display = ''; pl.onclick = function(e){ e.preventDefault(); enablePush(); }; }
      else { pl.style.display = 'none'; }
    }
    var al = document.getElementById('amsoillink');   // AMSOIL funnel numbers — admin only
    if(al){
      if(STATE.admin){ al.style.display = ''; al.onclick = function(e){ e.preventDefault(); openAmsoilOverlay(); }; }
      else { al.style.display = 'none'; }
    }
    buildHeaderOnce();
    renderAll();
    registerPush();
  }

  function renderFromCache(msg){
    var raw; try { raw = localStorage.getItem('ty_roster_cache'); } catch(e){ raw = null; }
    if(!raw){ retryFeed('No saved roster yet — reconnect once to load it.'); return; }
    var cached; try { cached = JSON.parse(raw); } catch(e){ cached = null; }
    if(!cached || !cached.data){ retryFeed('No saved roster yet — reconnect once to load it.'); return; }
    showOfflineBanner(msg + (cached.savedAt ? ' (saved '+relTime(cached.savedAt)+')' : ''));
    applyRoster(cached.data);
  }
  function relTime(ms){ var s=Math.round((Date.now()-ms)/1000); if(s<60) return 'just now'; var m=Math.round(s/60); if(m<60) return m+'m ago'; var h=Math.round(m/60); if(h<24) return h+'h ago'; return Math.round(h/24)+'d ago'; }
  function showOfflineBanner(text){ var el=document.getElementById('offlinebanner'); if(!el){ el=document.createElement('div'); el.id='offlinebanner'; el.style.cssText='background:#8a6d3b;color:#fff;padding:8px 12px;border-radius:8px;margin:8px 0;font-size:14px'; var app=document.getElementById('app'); app.insertBefore(el, app.firstChild); } el.textContent='⚠ '+text; el.style.display=''; }
  function clearOfflineBanner(){ var el=document.getElementById('offlinebanner'); if(el) el.style.display='none'; }

  // ---- Themed dashboard summary (Night Shift / Field Day / Heritage Garage) ----
  // Same data, three looks: everything below binds to visibleBookings()/buildEvents()/
  // commissionTally() — the numbers the console already loads. Mockup-only fictions
  // (monthly goals, cal files staged, crew rank) are dropped, not faked.
  function monthStats(){
    var mo=STATE.today.slice(0,7), s={done:0,open:0,no:0,life:0};
    visibleBookings().forEach(function(b){
      if(b.status==='Completed') s.life++;
      if(ym(b.dateISO)===mo){ if(b.status==='Completed')s.done++; else if(b.status==='No-show')s.no++; else if(isOpen(b))s.open++; }
    });
    return s;
  }
  function monthLabel(){ return MONTHS[parseInt(STATE.today.slice(5,7),10)-1]; }
  function needsCloseoutEvents(){
    return buildEvents().filter(function(e){ return e.dateISO<STATE.today && e.hasOpen; })
      .sort(function(a,b){ return a.dateISO.localeCompare(b.dateISO); });
  }
  function nextEvent(){
    var n=null;
    buildEvents().forEach(function(e){ if(e.dateISO>=STATE.today && (!n||e.dateISO<n.dateISO)) n=e; });
    return n;
  }
  // Completed tunes per month, trailing 8 months — the Night Shift sparkline (real data).
  function monthlySeries(){
    var y=+STATE.today.slice(0,4), m=+STATE.today.slice(5,7), months=[];
    for(var i=7;i>=0;i--){ var mm=m-i, yy=y; while(mm<1){mm+=12;yy--;} months.push(yy+'-'+String(mm).padStart(2,'0')); }
    var counts={};
    visibleBookings().forEach(function(b){ if(b.status==='Completed'){ var k=ym(b.dateISO); counts[k]=(counts[k]||0)+1; } });
    return months.map(function(k){ return counts[k]||0; });
  }
  function sparkline(series){
    var max=Math.max.apply(null,series.concat([1]));
    var pts=series.map(function(v,i){
      var x=2+i*(84/(series.length-1)), yv=20-(v/max)*16;
      return x.toFixed(1)+','+yv.toFixed(1);
    });
    var last=pts[pts.length-1].split(',');
    return '<svg width="88" height="24" viewBox="0 0 88 24" aria-hidden="true">'+
      '<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--t-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'+
      '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="4" fill="var(--t-accent)"/></svg>';
  }
  // Lifetime tunes as tally marks (groups of five), capped at 4 groups + remainder so the
  // wall never overflows the card; the caption carries the exact count.
  function tallyMarksSvg(n){
    var groups=Math.floor(n/5), rem=n%5, shown=Math.min(groups,4), svg='', x=0, g, i, r;
    for(g=0;g<shown;g++){
      for(i=0;i<4;i++){ svg+='<line x1="'+(x+4+i*7)+'" y1="3" x2="'+(x+4+i*7)+'" y2="19"/>'; }
      svg+='<line x1="'+x+'" y1="16" x2="'+(x+29)+'" y2="5"/>'; x+=40;
    }
    if(shown===groups && rem){ for(r=0;r<rem;r++){ svg+='<line x1="'+(x+4+r*7)+'" y1="3" x2="'+(x+4+r*7)+'" y2="19"/>'; } x+=rem*7+8; }
    if(!svg) return '';
    return '<svg width="'+x+'" height="22" viewBox="0 0 '+x+' 22" aria-label="'+n+' lifetime tunes as tally marks">'+
      '<g stroke="var(--t-accent)" stroke-width="2.4" stroke-linecap="round">'+svg+'</g></svg>';
  }

      var marks=tallyMarksSvg(s.life);

        '<div class="sm-fig">'+money(ct.month.total)+'</div>'+

        (next?' · <b>next: '+esc(next.city)+' '+esc(relDate(next.dateISO))+'</b>':'')+'</div>'+
        '<div class="sm-tally"><div><b>'+s.life+'</b><span>lifetime tunes</span></div>'+
        '<div><b>'+money(ct.lifetime.total)+'</b><span>lifetime comm.</span></div>'+
        '<div><b>'+ct.month.tunes+'</b><span>'+esc(mAb)+' tunes</span></div></div>'+
        (marks?'<div class="sm-marks">'+marks+'<span>every tune, on the wall</span></div>':'')+
        '</div>';
      if(needs.length){
        html+='<div class="sm-ledger" id="smledger"><div class="sm-stamp">OPEN</div><div style="flex:1;min-width:0">'+
          '<b>'+esc(needs[0].city)+' · '+esc(relDate(needs[0].dateISO))+' needs close-out</b>'+
          '<span>'+needs[0].open+' job'+(needs[0].open>1?'s':'')+' unresolved'+
          (needs.length>1?' · +'+(needs.length-1)+' more event'+(needs.length>2?'s':''):'')+
          (next?' · settle before '+esc(next.city):'')+'</span></div>'+
          '<div class="go">Settle →</div></div>';
      }
      html+=adminLine;
    }
    host.innerHTML=html;
    var a=host.querySelector('#smalert')||host.querySelector('#smledger');
    if(a) a.onclick=jumpToCloseout;

  function bySlot(a,b){ return String(a.slot||'').localeCompare(String(b.slot||''),undefined,{numeric:true}); }

  // Merge scheduled event shells + grouped bookings into one event list keyed city|date,
  // each with done/open/no-show counts. This is the single source the feed renders from.
  function buildEvents(){
    var map={};
    function ev(city,dateISO,installer){ var k=city+'|'+dateISO; return (map[k]=map[k]||{key:k,city:city,dateISO:dateISO,installer:installer||'',bookings:[]}); }
    visibleEvents().forEach(function(e){ ev(e.city,e.dateISO,e.installer); });
    visibleBookings().forEach(function(b){ var e=ev(b.city,b.dateISO,b.installer); e.bookings.push(b); if(b.installer) e.installer=b.installer; });
    return Object.keys(map).map(function(k){
      var e=map[k]; e.done=0; e.open=0; e.no=0;
      e.bookings.forEach(function(b){ if(b.status==='Completed')e.done++; else if(b.status==='No-show')e.no++; else if(isOpen(b))e.open++; });
      e.total=e.bookings.length; e.hasOpen=e.open>0; return e;
    });
  }

  function matchesQ(b){
    var q=STATE.q.trim().toLowerCase(); if(!q) return true;
    return [b.name,b.vehicle,b.vin,b.city,b.calibration,b.phone,b.tuningPlatform,b.calibrationType]
      .some(function(v){ return String(v||'').toLowerCase().indexOf(q)>=0; });
  }

  function secHead(label,cls){ var d=document.createElement('div'); d.className='sec'+(cls?' '+cls:''); d.innerHTML='<span class="lbl">'+esc(label)+'</span>'; return d; }

  function renderFeed(){
    var host=document.getElementById('feed'); host.innerHTML='';
    var events=buildEvents();

    renderSubTabs(events);

    // Done tab: completed jobs only, grouped by event, newest first.
    if(STATE.jobTab==='done'){ renderDone(events, host); return; }

    host.appendChild(anydayWalkForm());   // everyday walk-in — always available
    host.appendChild(shareEventWidget(events)); // share a per-event booking link

    // Search mode: flat, all-history, event-grouped results. Honors the active city
    // sub-tab (2026-07-16 owner decision): a city tab scopes the search to that market
    // with an explicit "search all markets ›" escape hatch; All searches everything.
    if(STATE.q.trim()){
      var scopedCity = STATE.jobTab!=='all' && STATE.jobTab!=='done' ? STATE.jobTab : '';
      var pool = scopedCity ? events.filter(function(e){ return e.city===scopedCity; }) : events;
      var hits=pool.map(function(e){ return { e:e, bs:e.bookings.filter(matchesQ) }; })
        .filter(function(x){ return x.bs.length; })
        .sort(function(a,b){ return b.e.dateISO.localeCompare(a.e.dateISO); });
      var n=hits.reduce(function(s,x){ return s+x.bs.length; },0);
      var head=secHead('Search results ('+n+')'+(scopedCity?' · '+scopedCity:''),'');
      if(scopedCity){
        var broaden=document.createElement('a'); broaden.href='#'; broaden.className='link'; broaden.id='qall';
        broaden.style.marginLeft='10px'; broaden.textContent='search all markets ›';
        broaden.onclick=function(ev){ ev.preventDefault(); STATE.jobTab='all'; renderFeed(); };
        head.appendChild(broaden);
      }
      host.appendChild(head);
      if(!n){ var qEmpty=document.createElement('div'); qEmpty.className='empty'; qEmpty.textContent='No matches'+(scopedCity?' in '+scopedCity:'')+'.'; host.appendChild(qEmpty); return; }
      hits.forEach(function(x){ host.appendChild(eventCard(x.e, x.bs, true, false, true)); });
      return;
    }

    var t=STATE.today;
    var scoped = STATE.jobTab==='all' ? events : events.filter(function(e){ return e.city===STATE.jobTab; });
    var needs=scoped.filter(function(e){ return e.dateISO<t && e.hasOpen; }).sort(function(a,b){ return b.dateISO.localeCompare(a.dateISO); });
    var today=scoped.filter(function(e){ return e.dateISO===t; }).sort(function(a,b){ return a.city.localeCompare(b.city); });
    var upcoming=scoped.filter(function(e){ return e.dateISO>t; }).sort(function(a,b){ return a.dateISO.localeCompare(b.dateISO); });

    if(!needs.length && !today.length && !upcoming.length){
      var em=document.createElement('div'); em.className='empty';
      em.textContent = STATE.jobTab==='all' ? 'No open jobs. Use “Log a walk-in / call-in” above; completed work is under ✓ Done.' : 'No open jobs in '+STATE.jobTab+'. Completed work is under ✓ Done.';
      host.appendChild(em); return;
    }
    // Active views hide completed rows (showDone=false) so they don't crowd the close-out UI.
    if(needs.length){ host.appendChild(secHead('Needs close-out','warn')); needs.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true,false)); }); }
    if(today.length){ host.appendChild(secHead('Today','')); today.forEach(function(e){ host.appendChild(eventCard(e,e.bookings,true,true,false)); }); }
    if(upcoming.length){ host.appendChild(secHead('Upcoming','')); upcoming.forEach(function(e,i){ host.appendChild(eventCard(e,e.bookings,i===0,true,false)); }); }
  }

  // The ✓ Done view: completed jobs across markets, grouped by event (city|date),
  // newest first, honoring the search box and an optional city filter (set by the
  // per-event "done — view ›" deep-link). Completed rows never crowd active work.
  function renderDone(events, host){
    if(STATE.doneCity){
      var chip=document.createElement('div'); chip.className='sec';
      chip.innerHTML='<span class="lbl">Completed · '+esc(STATE.doneCity)+'</span> <a href="#" class="link" id="doneall">show all markets ›</a>';
      host.appendChild(chip);
      chip.querySelector('#doneall').onclick=function(ev){ ev.preventDefault(); STATE.doneCity=''; renderFeed(); };
    }
    var done=events.map(function(e){
        var bs=e.bookings.filter(function(b){ return b.status==='Completed' && matchesQ(b) && (!STATE.doneCity || e.city===STATE.doneCity); });
        return { e:e, bs:bs };
      }).filter(function(x){ return x.bs.length; })
      .sort(function(a,b){ return b.e.dateISO.localeCompare(a.e.dateISO); });
    var n=done.reduce(function(s,x){ return s+x.bs.length; },0);
    host.appendChild(secHead('Completed ('+n+')',''));
    if(!n){ host.innerHTML+='<div class="empty">No completed jobs'+(STATE.q.trim()?' match your search':'')+' yet.</div>'; return; }
    done.forEach(function(x){ host.appendChild(eventCard(x.e, x.bs, false, false, true)); });
  }

  // One event = one <details> card. defaultOpen sets the initial state; the user's own
  // toggle is remembered in STATE.eventOpen so a close-out never collapses it. canAdd
  // includes the "＋ Add a new booking…" picker option (actionable events only).
  function eventCard(e, bookings, defaultOpen, canAdd){
    var open=(e.key in STATE.eventOpen)?STATE.eventOpen[e.key]:defaultOpen;
    var det=document.createElement('details');
    det.className='evt'+(e.dateISO<STATE.today&&e.hasOpen?' warn':(e.dateISO===STATE.today?' today':''));
    det.open=open;
    det.setAttribute('data-key', e.key);
    det.addEventListener('toggle',function(){ STATE.eventOpen[e.key]=det.open; });
    var pillCls=e.total===0?'':(e.hasOpen?'hasopen':'alldone');
    var pillTxt=e.total===0?'no bookings':(e.done+' done'+(e.open?' · '+e.open+' open':'')+(e.no?' · '+e.no+' no-show':''));
    var tag=STATE.admin&&e.installer?' <span class="installer-tag">'+esc(e.installer)+'</span>':'';
    var sum=document.createElement('summary');
    sum.innerHTML='<span><span class="etitle">'+esc(e.city)+'</span>'+tag+'<br><span class="edate">'+esc(relDate(e.dateISO))+'</span></span>'+
      '<span class="pill '+pillCls+'">'+esc(pillTxt)+'</span>';
    det.appendChild(sum);
    var body=document.createElement('div'); body.className='ebody';
    body.appendChild(bookingPicker(e, bookings, canAdd));
    det.appendChild(body); return det;
  }

  // One-record-at-a-time day view (2026-07-19 owner decision): a native <select> —
  // the OS wheel on phones — lists the day's bookings grouped by status, plus
  // "＋ Add a new booking…". Only the SELECTED record renders below it, so the
  // installer is never scrolling a wall of close-out forms mid-event. The choice
  // persists per event in STATE.eventSel, so a re-render (close-out, sync) never
  // yanks the record out from under them.
  function bookingPicker(e, bookings, canAdd){
    var opens=bookings.filter(isOpen).sort(bySlot);
    var nos=bookings.filter(function(b){return b.status==='No-show';}).sort(bySlot);
    var dones=bookings.filter(function(b){return b.status==='Completed';}).sort(bySlot);
    var all=opens.concat(nos,dones);
    if(!all.length && !canAdd){ var m=document.createElement('div'); m.className='empty'; m.textContent='No bookings.'; return m; }
    var wrap=document.createElement('div');
    var sel=document.createElement('select'); sel.className='bookingpick';
    sel.setAttribute('aria-label','Choose a booking — '+e.city+' '+e.dateISO);
    function optLabel(b,mark){ return (mark?mark+' ':'')+(b.scheduledTime||b.slotLabel||'—')+' · '+b.name+(b.vehicle?' · '+b.vehicle:''); }
    function group(label,list,mark){ if(!list.length) return; var g=document.createElement('optgroup'); g.label=label;
      list.forEach(function(b){ var o=document.createElement('option'); o.value=b.id; o.textContent=optLabel(b,mark); g.appendChild(o); }); sel.appendChild(g); }
    group('Open ('+opens.length+')',opens,'');
    group('No-show ('+nos.length+')',nos,'✗');
    group('Completed ('+dones.length+')',dones,'✓');
    if(canAdd){ var add=document.createElement('option'); add.value='__add__'; add.textContent='＋ Add a new booking…'; sel.appendChild(add); }
    // Restore the remembered choice; default to the first OPEN job (slot order) so
    // the next actionable record is zero taps away.
    var cur=STATE.eventSel[e.key];
    var valid=(cur==='__add__'&&canAdd) || all.some(function(b){return b.id===cur;});
    if(!valid) cur = opens.length?opens[0].id : (all.length?all[0].id:'__add__');
    STATE.eventSel[e.key]=cur;
    var slot=document.createElement('div');
    function renderSel(){
      slot.innerHTML='';
      if(STATE.eventSel[e.key]==='__add__'){ STATE.walkOpen[e.key]=true; slot.appendChild(walkAdder(e)); return; }
      var b=all.filter(function(x){return x.id===STATE.eventSel[e.key];})[0];
      if(!b) return;
      slot.appendChild(rowCard(b));
      // Just settled this one? Offer the next open job without touching the wheel.
      if(!isOpen(b)){
        var next=opens.filter(function(x){return x.id!==b.id;})[0];
        if(next){ var nb=document.createElement('button'); nb.className='btn'; nb.textContent='Next open job → '+(next.scheduledTime||next.slotLabel||next.name);
          nb.onclick=function(){ STATE.eventSel[e.key]=next.id; sel.value=next.id; renderSel(); };
          slot.appendChild(nb); }
      }
    }
    sel.value=cur;
    sel.onchange=function(){ STATE.eventSel[e.key]=sel.value; renderSel(); };
    wrap.appendChild(sel); wrap.appendChild(slot); renderSel();
    return wrap;
  }

  // Per-event walk-in adder. Its open state persists in STATE.walkOpen[key] so it stays
  // put after a successful add (installers add several in a row). No id gymnastics —
  // inputs are held by reference so the event key never touches the DOM id space.
  function mkInput(ph){ var i=document.createElement('input'); i.placeholder=ph; return i; }
  function walkAdder(e){
    var det=document.createElement('details'); det.open=!!STATE.walkOpen[e.key];
    det.style.cssText='border:none;background:transparent;margin:0';
    det.addEventListener('toggle',function(){ STATE.walkOpen[e.key]=det.open; });
    var sum=document.createElement('summary'); sum.style.cssText='padding:8px 0;list-style:none;cursor:pointer';
    sum.innerHTML='<span style="font-weight:700;color:var(--accent)">+ Add walk-in</span>'; det.appendChild(sum);
    var box=document.createElement('div'); box.className='walkmini';
    var n=mkInput('Customer name'), v=mkInput('Vehicle (e.g. 2021 Tundra)'), p=mkInput('Phone'); p.inputMode='tel';
    var em=mkInput('Customer email (for their certificate)'); em.type='email';
    var btn=document.createElement('button'); btn.className='btn addwalk'; btn.textContent='Add walk-in to '+e.city;
    box.appendChild(n); box.appendChild(v); box.appendChild(p); box.appendChild(em); box.appendChild(btn);
    det.appendChild(box);
    btn.onclick=function(){ addWalkin(e,{name:n.value,vehicle:v.value,phone:p.value,email:em.value}); };
    return det;
  }

  // The installer's known markets, derived from their roster data (bookings + scheduled
  // events). Admin sees every city. Feeds the everyday walk-in location picker.
  function knownCities(){
    var seen={}, out=[];
    visibleBookings().forEach(function(b){ if(b.city&&!seen[b.city]){seen[b.city]=1;out.push(b.city);} });
    visibleEvents().forEach(function(e){ if(e.city&&!seen[e.city]){seen[e.city]=1;out.push(e.city);} });
    return out.sort();
  }

  // "Share an event booking link": dropdown of upcoming events → link + native
  // share sheet / copy / QR. Events come from the roster the console already loads.
  function shareEventWidget(events){
    var slugify=function(c){return String(c||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");};
    var up=events.filter(function(e){return e.dateISO>=STATE.today;})
      .sort(function(a,b){return a.dateISO.localeCompare(b.dateISO);});
    var det=document.createElement('details'); det.id='evshare'; det.className='evt';
    det.innerHTML='<summary style="padding:10px 12px;cursor:pointer"><span class="etitle">🔗 Share an event booking link</span></summary>';
    var box=document.createElement('div'); box.style.cssText='padding:0 12px 12px';
    var sel=document.createElement('select'); sel.style.cssText='width:100%;padding:11px;font-size:15px;border:1px solid var(--line);border-radius:9px';
    sel.innerHTML='<option value="">Pick an event…</option>'+up.map(function(e){
      return '<option value="'+esc(slugify(e.city)+'-'+e.dateISO)+'">'+esc(e.city)+' · '+esc(e.dateISO)+'</option>'; }).join('');
    var link=document.createElement('div'); link.id='evsharelink'; link.style.cssText='margin:10px 0;font-weight:700;word-break:break-all';
    var row=document.createElement('div'); row.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
    function btn(label,id){ var b=document.createElement('button'); b.className='btn'; b.id=id; b.textContent=label; b.style.display='none'; return b; }
    var share=btn('📤 Share','evshareshare'), copy=btn('Copy','evsharecopy'), qr=btn('QR','evshareqr');
    var qrbox=document.createElement('div');
    row.appendChild(share); row.appendChild(copy); row.appendChild(qr);
    sel.onchange=function(){ qrbox.innerHTML='';
      if(!sel.value){ link.textContent=''; [share,copy,qr].forEach(function(b){b.style.display='none';}); return; }
      var url='https://tunedyota.com/book/'+sel.value; link.textContent=url;
      [copy,qr].forEach(function(b){b.style.display='';});
      share.style.display=(navigator.share?'':'none');
      share.onclick=function(){ try{ navigator.share({title:'Book your Tuned Yota time',url:url}); }catch(e){} };
      copy.onclick=function(){ try{ navigator.clipboard.writeText(url); copy.textContent='Copied ✓'; setTimeout(function(){copy.textContent='Copy';},1500); }catch(e){} };
      qr.onclick=function(){ qrbox.innerHTML='<img alt="Event booking QR" style="width:220px;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px" src="/.netlify/functions/event-qr?e='+encodeURIComponent(sel.value)+'">'; };
    };
    box.appendChild(sel); box.appendChild(link); box.appendChild(row); box.appendChild(qrbox); det.appendChild(box);
    return det;
  }

  // Top-level "log a walk-in on any day" — everyday call-in business, not tied to an
  // event. Captures the SAME info as an at-event walk-in (name/vehicle/phone) plus the
  // tune date (default today) + location, so the record + close-out fully feed the OTT
  // report. Creates a normal booking dated that day; it then appears in the feed.
  function anydayWalkForm(){
    var K='__anyday__';
    var det=document.createElement('details'); det.className='evt'; det.id='anydayform'; det.open=!!STATE.walkOpen[K];
    det.addEventListener('toggle',function(){ STATE.walkOpen[K]=det.open; });
    var sum=document.createElement('summary');
    sum.innerHTML='<span class="etitle">＋ Log a walk-in / call-in</span><span class="pill">any day</span>';
    det.appendChild(sum);
    var box=document.createElement('div'); box.className='ebody walkmini';
    var n=mkInput('Customer name'), v=mkInput('Vehicle — incl. year (e.g. 2021 Tundra)'), p=mkInput('Phone'); p.inputMode='tel';
    var ld=document.createElement('label'); ld.className='fld'; ld.textContent='Date of tune';
    var dt=document.createElement('input'); dt.type='date'; dt.value=STATE.today;
    var lc=document.createElement('label'); lc.className='fld'; lc.textContent='Location / market';
    // Always a free-text field so ANY of the installer's markets can be logged — even a
    // city not yet on the roster (everyday call-in). Known cities become datalist
    // suggestions for one-tap entry. A restricted <select> silently mis-filed a walk-in
    // under the wrong city when the intended market wasn't in the (roster-derived) list.
    var cities=knownCities(), city=mkInput('City / market'), dl=null;
    if(cities.length){
      dl=document.createElement('datalist'); dl.id='ty_walk_cities';
      dl.innerHTML=cities.map(function(x){return '<option value="'+esc(x)+'"></option>';}).join('');
      city.setAttribute('list','ty_walk_cities');
    }
    var btn=document.createElement('button'); btn.className='btn addwalk'; btn.textContent='Log walk-in';
    var em=mkInput('Customer email (for their certificate)'); em.type='email';
    [n,v,p,ld,dt,lc,city,em,btn].forEach(function(el){ box.appendChild(el); });
    if(dl) box.appendChild(dl);
    det.appendChild(box);
    btn.onclick=function(){
      var c=(city.value||'').trim(), d=(dt.value||'').trim();
      if(!c){ fail('Enter a city / market.'); return; }
      if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){ fail('Pick the date of the tune.'); return; }
      STATE.walkOpen[K]=true;                       // keep this form open for the next entry
      addWalkin({city:c,dateISO:d,key:c+'|'+d},{name:n.value,vehicle:v.value,phone:p.value,email:em.value});
    };
    return det;
  }

  async function addWalkin(evt, vals){
    clearMsg();
    var name=(vals.name||'').trim(), vehicle=(vals.vehicle||'').trim(), phone=(vals.phone||'').trim();
    var email=(vals.email||'').trim();
    if(!name){ fail('Enter the customer name.'); return; }
    if(!phone){ fail('Enter a phone number.'); return; }
    var op = Q().makeOp('walkin', { city:evt.city, dateISO:evt.dateISO, name:name, vehicle:vehicle, phone:phone, email:email, clientKey:null });
    op.body.clientKey = op.clientKey;
    var res, netErr=null;
    try { res=await fetch('/.netlify/functions/installer-walkin',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(op.body)}); }
    catch(e){ netErr=e; }
    if(!netErr && res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    if(netErr || (res && Q().shouldQueue(null, res.status))){
      queuePush(op);
      STATE.walkOpen[evt.key]=true; STATE.eventOpen[evt.key]=true;
      STATE.bookings.push(optimisticWalkin(evt, op));
      renderAll();
      succeed('Saved '+name+' — will sync when you’re back online.');
      registerBgSync();
      return;
    }
    var out=await res.json().catch(function(){return{};});
    if(out.status==='booked' && out.booking){
      STATE.walkOpen[evt.key]=true;        // keep this event's adder open for the next walk-in
      STATE.eventOpen[evt.key]=true;       // and keep the event itself expanded
      STATE.bookings.push(out.booking);
      renderAll();                         // #msg lives outside the feed, so this message survives
      succeed('✓ Added '+name+' — walk-in saved for '+evt.city+'.');
    } else {
      var er=out.error||('error '+(res?res.status:'network'));
      fail( er==='unknown-event'   ? 'That event isn’t recognized — reload and try again.'
          : er==='not-your-market' ? 'That market isn’t assigned to you.'
          : er==='unknown-city'    ? 'That city isn’t a recognized market.'
          : er==='missing-contact' ? 'Enter both a customer name and a phone number.'
          : 'Could not add walk-in: '+er );
    }
  }
  function optimisticWalkin(evt, op){
    return { id:'pending:'+op.clientKey, city:evt.city, dateISO:evt.dateISO, installer:'', slot:'', slotLabel:'',
      name:op.body.name, vehicle:op.body.vehicle, phone:op.body.phone, email:op.body.email, mods:'', status:'Booked',
      isWalkin:true, pendingSync:true, calibration:'', vin:'', tuningPlatform:'', calibrationType:'', ecuId:'', gearSize:'', mileage:'' };
  }

  // ---- Leads pipeline ----
  var LEAD_STAGES=['New','Contacted','Qualified','Following up','Booked','Not now'];
  var ACTIVE_LEAD_STAGES=LEAD_STAGES.slice(0,LEAD_STAGES.indexOf('Booked'));
  var CHAN_ICON={email:'📧',sms:'💬',phone:'📞',facebook:'f',instagram:'ig','walk-in':'🚶','ott-national':'🇺🇸',other:'•'};
  async function loadLeads(){
    try{
      var res=await fetch('/.netlify/functions/leads-list',{headers:{'x-installer-token':tok()}});
      if(res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
      var data=await res.json(); STATE.leads=data.leads||[]; STATE.leadsLoaded=true;
    }catch(e){ /* keep whatever we have */ }
    renderAll();
  }
  function leadMatchesQ(l){ var q=STATE.leadQ.trim().toLowerCase(); if(!q) return true;
    return [l.name,l.vehicle,l.phone,l.city,l.channel].some(function(v){ return String(v||'').toLowerCase().indexOf(q)>=0; }); }
  function renderLeads(){
    var host=document.getElementById('feed'); host.innerHTML='';
    host.appendChild(logLeadForm());
    var box=document.createElement('div'); box.className='search';
    box.innerHTML='<input id="leadq" type="search" placeholder="Search leads — name, vehicle, phone…">';
    host.appendChild(box);
    var qi=document.getElementById('leadq'); qi.value=STATE.leadQ; qi.oninput=function(){ STATE.leadQ=this.value; renderLeads(); };
    var visible=STATE.leads.filter(leadMatchesQ);
    LEAD_STAGES.forEach(function(stage){
      var inStage=visible.filter(function(l){ return (l.stage||'New')===stage; });
      if(!inStage.length) return;
      inStage.sort(function(a,b){
        var ao=(ACTIVE_LEAD_STAGES.indexOf(a.stage)>=0 && a.nextFollowup && a.nextFollowup<=STATE.today)?0:1;
        var bo=(ACTIVE_LEAD_STAGES.indexOf(b.stage)>=0 && b.nextFollowup && b.nextFollowup<=STATE.today)?0:1;
        if(ao!==bo) return ao-bo; return (b.lastContact||'').localeCompare(a.lastContact||'');
      });
      host.appendChild(secHead(stage+' ('+inStage.length+')',''));
      inStage.forEach(function(l){ host.appendChild(leadCard(l)); });
    });
    if(!visible.length){ var em=document.createElement('div'); em.className='empty'; em.textContent='No leads yet. Use "＋ Log a lead" above.'; host.appendChild(em); }
  }
  function leadCard(l){
    var overdue=(ACTIVE_LEAD_STAGES.indexOf(l.stage)>=0 && l.nextFollowup && l.nextFollowup<=STATE.today);
    var det=document.createElement('details'); det.className='evt';
    var sum=document.createElement('summary');
    sum.innerHTML='<span><span class="etitle">'+(CHAN_ICON[l.channel]||'•')+' '+esc(l.name)+'</span>'+(l.channel==='ott-national'?' <span class="tabbadge" style="background:#2f4f6f">OTT</span>':'')+(l.installer&&STATE.admin?' <span class="installer-tag">'+esc(l.installer)+'</span>':'')+
      '<br><span class="edate">'+esc(l.vehicle||'—')+' · '+esc(l.city||'—')+'</span></span>'+
      '<span class="pill'+(overdue?' hasopen':'')+'">'+(overdue?'⏰ due':(l.nextFollowup?('→ '+esc(l.nextFollowup)):esc(l.stage)))+'</span>';
    det.appendChild(sum);
    var body=document.createElement('div'); body.className='ebody';
    var row=document.createElement('div'); row.className='walkmini';
    function act(label,fn){ var b=document.createElement('button'); b.className='btn'; b.textContent=label; b.onclick=fn; return b; }
    if(l.phone){ row.appendChild(linkBtn('Call','tel:'+l.phone)); row.appendChild(linkBtn('Text','sms:'+l.phone)); }
    if(l.email){ row.appendChild(linkBtn('Email','mailto:'+l.email)); }
    body.appendChild(row);
    var stagesRow=document.createElement('div'); stagesRow.className='walkmini';
    LEAD_STAGES.forEach(function(s){ if(s!==l.stage){ stagesRow.appendChild(act('→ '+s,function(){ leadUpdate(l.id,{action:'setStage',stage:s}); })); } });
    body.appendChild(stagesRow);
    var fu=document.createElement('div'); fu.className='walkmini';
    [['Today',0],['Tomorrow',1],['+3d',3],['+1wk',7]].forEach(function(p){ fu.appendChild(act('Follow-up '+p[0],function(){ leadUpdate(l.id,{action:'setFollowup',date:addDays(STATE.today,p[1])}); })); });
    body.appendChild(fu);
