  // --- VIN scan (mirror of netlify/functions/lib/vin.js — keep in sync) ---
  function normalizeScannedVin(raw){
    var s=String(raw==null?'':raw).toUpperCase().replace(/[^A-Z0-9]/g,'');
    return /^[A-HJ-NPR-Z0-9]{17}$/.test(s)?s:'';
  }
  function canScan(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia); }
  var scanState=null, zxingLoading=null;
  function loadZXing(){
    if(window.ZXing) return Promise.resolve();
    if(zxingLoading) return zxingLoading;
    zxingLoading=new Promise(function(resolve,reject){
      var s=document.createElement('script'); s.src='/vendor/zxing.min.js';
      s.onload=function(){ resolve(); }; s.onerror=function(){ reject(new Error('zxing load failed')); };
      document.head.appendChild(s);
    });
    return zxingLoading;
  }
  function setScanMsg(id,m){ var el=document.getElementById('scanmsg_'+id); if(el) el.textContent=m; }
  function onVin(id,vin){ var i=document.getElementById('vin_'+id); if(i) i.value=vin; stopScan(id); checkVin(id); }
  function stopScan(id){
    if(scanState && scanState.id===id){
      if(scanState.raf) cancelAnimationFrame(scanState.raf);
      if(scanState.reader && scanState.reader.reset){ try{ scanState.reader.reset(); }catch(e){} }
      if(scanState.stream){ scanState.stream.getTracks().forEach(function(t){ t.stop(); }); }
      scanState=null;
    }
    var o=document.getElementById('scanov_'+id); if(o) o.remove();
    var b=document.getElementById('scan_'+id); if(b) b.style.display='';
  }
  // Photograph the current camera frame and OCR the VIN via /vin-ocr. On a
  // confident read, fill the (always-editable) VIN field and run the NHTSA guard;
  // on ANY failure, show a plain message and leave the installer to type it.
  // The camera is a convenience — it never blocks close-out.
  async function captureVin(id){
    var video=document.getElementById('scanvid_'+id);
    var btn=document.getElementById('scancap_'+id);
    if(!video || !video.videoWidth){ setScanMsg(id,'Hold steady and try again.'); return; }
    if(btn){ btn.disabled=true; btn.textContent='Reading…'; }
    setScanMsg(id,'Reading the VIN…');
    try{
      var maxEdge=1024, w=video.videoWidth, h=video.videoHeight, scale=Math.min(1, maxEdge/Math.max(w,h));
      var cv=document.createElement('canvas'); cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
      cv.getContext('2d').drawImage(video,0,0,cv.width,cv.height);
      var dataUrl=cv.toDataURL('image/jpeg',0.7);
      var res=await fetch('/.netlify/functions/vin-ocr',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify({imageBase64:dataUrl,mediaType:'image/jpeg'})});
      var out=await res.json().catch(function(){ return {ok:false}; });
      if(out && out.ok && out.vin){ onVin(id,out.vin); return; }  // fills field, stops scan, runs checkVin
    }catch(e){}
    // Any failure → keep the camera open, tell them to retry or type it.
    if(btn){ btn.disabled=false; btn.textContent='● Capture VIN'; }
    setScanMsg(id,"Couldn't read it — retake, or Cancel and type the VIN.");
  }
  async function startScan(id){
    if(isNative() && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner){
      try{
        var nres=await window.Capacitor.Plugins.BarcodeScanner.scan();
        var ncodes=(nres&&nres.barcodes)||[];
        for(var ni=0;ni<ncodes.length;ni++){ var nvin=normalizeScannedVin(ncodes[ni].rawValue||ncodes[ni].displayValue); if(nvin){ onVin(id,nvin); return; } }
        fail('No VIN barcode found — try again or type it.');
      }catch(e){ /* cancelled */ }
      return;
    }
    if(!canScan()) return;
    var card=document.getElementById('c_'+id); if(!card) return;
    if(document.getElementById('scanov_'+id)) return;
    var ov=document.createElement('div'); ov.id='scanov_'+id; ov.className='scanwrap';
    ov.innerHTML='<video id="scanvid_'+id+'" playsinline autoplay muted></video>'+
      '<div class="scanhint">Point at the VIN — barcode auto-scans; or tap Capture to photograph a printed VIN</div>'+
      '<div id="scanmsg_'+id+'" class="scanmsg"></div>'+
      '<button type="button" class="btn" id="scancap_'+id+'" style="width:100%;margin-bottom:6px">● Capture VIN</button>'+
      '<button type="button" class="btn" id="scancx_'+id+'" style="width:100%;background:#8a2a2a">Cancel</button>';
    card.appendChild(ov);
    var sbtn=document.getElementById('scan_'+id); if(sbtn) sbtn.style.display='none';
    document.getElementById('scancx_'+id).onclick=function(){ stopScan(id); };
    document.getElementById('scancap_'+id).onclick=function(){ captureVin(id); };
    var video=document.getElementById('scanvid_'+id);
    var stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } }); }
    catch(e){ setScanMsg(id,'Camera unavailable — type the VIN.'); return; }
    scanState={ id:id, stream:stream, raf:null, reader:null };
    video.srcObject=stream;
    if('BarcodeDetector' in window){
      var det=new window.BarcodeDetector({ formats:['code_39','data_matrix'] });
      var tick=async function(){
        if(!scanState || scanState.id!==id) return;
        try{ var codes=await det.detect(video);
          for(var i=0;i<codes.length;i++){ var vin=normalizeScannedVin(codes[i].rawValue); if(vin){ onVin(id,vin); return; } }
        }catch(e){}
        scanState.raf=requestAnimationFrame(tick);
      };
      scanState.raf=requestAnimationFrame(tick);
    } else {
      try{ await loadZXing(); }catch(e){ setScanMsg(id,'Scanner unavailable — type the VIN.'); return; }
      if(!scanState || scanState.id!==id) return;
      var Z=window.ZXing, reader;
      try{
        if(Z.DecodeHintType && Z.BarcodeFormat){
          var hints=new Map();
          hints.set(Z.DecodeHintType.POSSIBLE_FORMATS,[Z.BarcodeFormat.CODE_39,Z.BarcodeFormat.DATA_MATRIX]);
          hints.set(Z.DecodeHintType.TRY_HARDER,true);
          reader=new Z.BrowserMultiFormatReader(hints);
        } else { reader=new Z.BrowserMultiFormatReader(); }
      }catch(e){ reader=new Z.BrowserMultiFormatReader(); }
      scanState.reader=reader;
      reader.decodeFromVideoDevice(null, video, function(result){
        if(result){ var vin=normalizeScannedVin(result.getText?result.getText():result.text); if(vin){ onVin(id,vin); } }
      });
    }
  }

  async function closeout(id,extra){
    clearMsg();
    var body=Object.assign({recordId:id},extra);
    var res, netErr=null;
    try { res=await fetch('/.netlify/functions/installer-closeout',{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(body)}); }
    catch(e){ netErr=e; }
    if(!netErr && res.status===401){ localStorage.removeItem('ty_installer_token'); location.reload(); return; }
    if(netErr || (res && Q().shouldQueue(null, res.status))){ enqueueOp('closeout', body, id, extra); return; }
    var out=await res.json().catch(function(){return{};});
    var b=STATE.bookings.filter(function(x){return x.id===id;})[0];

    else if(out.status==='noshow'){ if(b){ b.status='No-show'; } renderAll(); }
    else { fail('Could not save: '+(out.error||'error '+res.status)); }
  }

  function queuePush(op){ var q=Q().loadQueue(store()); q.push(op); Q().saveQueue(store(), q); renderPendingBadge(); }
  function enqueueOp(type, body, id, extra){
    var op=Q().makeOp(type, body); queuePush(op);
    if(type==='closeout'){
      var b=STATE.bookings.filter(function(x){return x.id===id;})[0];
      if(b){ if(extra.action==='noshow'){ b.status='No-show'; } else { b.status='Completed'; if(extra.calibration)b.calibration=extra.calibration; if(extra.vin)b.vin=extra.vin; if(extra.signature)b.signed=true; b.pendingSync=true; } }
      renderAll();
      succeed('Saved — will sync when you’re back online.' + (extra.signature||extra.calibration ? ' The certificate sends once synced.' : ''));
    }
    registerBgSync();
  }

  var FLUSHING=false;
  async function flushQueue(){
    if(FLUSHING) return; FLUSHING=true;
    var synced=0;
    try{
      var q=Q().loadQueue(store());
      while(q.length){
        var op=q[0], url=op.type==='closeout'?'/.netlify/functions/installer-closeout':'/.netlify/functions/installer-walkin';
        var res, netErr=null;
        try{ res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-installer-token':tok()},body:JSON.stringify(op.body)}); }
        catch(e){ netErr=e; }
        var verdict = netErr ? 'retry-later' : Q().nextFlushResult(res.status);
        if(verdict==='remove' || verdict==='drop'){
          if(verdict==='drop') fail('A queued '+op.type+' could not be saved and was dropped.');
          else synced++;
          q.shift(); Q().saveQueue(store(), q); renderPendingBadge();
        } else if(verdict==='stop-auth'){
          Q().saveQueue(store(), q); localStorage.removeItem('ty_installer_token'); location.reload(); return;
        } else { break; }
      }
      // Refresh the roster ONLY when we actually synced a queued op, so the newly
      // saved records appear. Reloading on an already-empty queue would recurse
      // load()→flushQueue()→load()… forever (load() calls flushQueue on every load).
      if(Q().shouldReloadAfterFlush(synced, Q().loadQueue(store()).length, navigator.onLine)){ load(); }
    } finally { FLUSHING=false; renderPendingBadge(); }
  }

  function renderPendingBadge(){
    var n=Q().loadQueue(store()).length, el=document.getElementById('pendingbadge');
    if(!el){ el=document.createElement('a'); el.id='pendingbadge'; el.href='#'; el.className='link'; el.style.cssText='margin-left:14px';
      el.onclick=function(e){ e.preventDefault(); flushQueue(); };
      // Insert in the header links row (before #header), not at the bottom of #app.
      var anchor=document.getElementById('pushlink')||document.getElementById('reviewlink')||document.getElementById('logout');
      if(anchor && anchor.parentNode){ anchor.parentNode.insertBefore(el, anchor.nextSibling); }
      else { var app=document.getElementById('app'); if(app) app.insertBefore(el, app.firstChild); } }
    if(n>0){ el.style.display=''; el.textContent='⏳ '+n+' pending sync'; } else { el.style.display='none'; }
  }
  function registerBgSync(){
    if('serviceWorker' in navigator && 'SyncManager' in window){
      navigator.serviceWorker.ready.then(function(reg){ if(reg.sync) reg.sync.register('ty-flush').catch(function(){}); }).catch(function(){});
    }
  }
  // Theme switcher + bottom action bar wiring (the elements exist — this script runs at body end).
  document.getElementById('themelink').onclick=function(e){ e.preventDefault(); openSheet(); };
  document.getElementById('veil').onclick=closeSheet;
  Array.prototype.forEach.call(document.querySelectorAll('.theme-opt'),function(b){ b.onclick=function(){ setTheme(b.getAttribute('data-theme')); }; });
  document.getElementById('bbsearch').onclick=jumpToSearch;
  document.getElementById('bbwalk').onclick=jumpToWalkin;
  document.getElementById('bbshare').onclick=jumpToShare;
  window.addEventListener('online', flushQueue);
  window.addEventListener('beforeunload', function(e){ if(Q().loadQueue(store()).length){ e.preventDefault(); e.returnValue=''; return ''; } });
</script>
</body>
</html>
