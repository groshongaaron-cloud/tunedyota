[build]
  publish = "site"
  functions = "netlify/functions"

# Daily email-path canary (netlify/functions/email-health.js).
[functions."email-health"]
  schedule = "@daily"

# Weekly submissions digest (netlify/functions/submissions-report.js).
[functions."submissions-report"]
  schedule = "0 13 * * 1"

# Daily Certificate of Authenticity dispatch (netlify/functions/certificate-dispatch.js).
[functions."certificate-dispatch"]
  schedule = "0 14 * * *"
