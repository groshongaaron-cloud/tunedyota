[build]
  publish = "site"
  functions = "netlify/functions"

# Daily email-path canary (netlify/functions/email-health.js).
[functions."email-health"]
  schedule = "@daily"

# Hourly; acts only at 07:00 America/Chicago (netlify/functions/event-reminders.js).
[functions."event-reminders"]
  schedule = "0 * * * *"

# Monthly executive summary on the 1st (netlify/functions/submissions-report.js).
[functions."submissions-report"]
  schedule = "0 13 1 * *"

# Weekly rebook/waitlist backlog on Mondays (netlify/functions/rebook-report.js).
[functions."rebook-report"]
  schedule = "0 13 * * 1"

# Monthly OTT completed-calibrations DRAFT on the 1st (netlify/functions/ott-report.js).
# Covers the month that just closed; emails a DRAFT + approve-link to the owner only.
# The owner's approval triggers ott-report-send.js, which emails OTT.
[functions."ott-report"]
  schedule = "0 13 1 * *"

# OTT submission DEADLINE REMINDER on the 5th (netlify/functions/ott-report-reminder.js).
# Submission is due by the 7th; this nudges the owner (email + Slack, never OTT) two
# days ahead if the prior month has calibrations, re-surfacing the approve link.
[functions."ott-report-reminder"]
  schedule = "0 13 5 * *"

# Annual private OTT rollup (Tuned Yota internal) on Jan 1 for the prior year
# (netlify/functions/ott-annual.js). Emails info@ only — never OTT. Also on-demand
# via a token-gated HTTP call (?year=YYYY&token=OTT_APPROVE_SECRET).
[functions."ott-annual"]
  schedule = "0 14 1 1 *"

# Daily Certificate of Authenticity dispatch (netlify/functions/certificate-dispatch.js).
[functions."certificate-dispatch"]
  schedule = "0 14 * * *"

# Daily AMSOIL follow-up: ~3 days post-tune (netlify/functions/amsoil-followup.js).
# Active 2026-07-14 (AMSOIL_FOLLOWUP_START=2020-01-01 → all completed tunes on record).
[functions."amsoil-followup"]
  schedule = "0 15 * * *"

# "Get OTT Now!" share link -> the decision funnel, tagged to the share campaign.
[[redirects]]
  from = "/get-ott-now"
  to = "/find-your-exact-tune?utm_source=share&utm_medium=social&utm_campaign=get-ott-now"
  status = 302

# Serve the PWA manifest with the correct MIME (Netlify defaults .webmanifest to octet-stream).
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
