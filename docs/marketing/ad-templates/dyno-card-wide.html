<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Tuned Yota — DYNO PROOF CARD · 1080×565 (link preview / FB / website). Horizontal: numbers left, chart right. -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Spectral:wght@500;600;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#3A2E26;--blue:#B3D0D9;--sand:#DFC4B5;--sage:#99A08E;--sage-d:#7c8472;--paper:#F3EFEA}
  *{margin:0;box-sizing:border-box}
  body{background:#cfcdca;display:grid;place-items:center;min-height:100vh;padding:24px;font-family:'Lato',sans-serif}
  .canvas{width:1080px;height:565px;position:relative;overflow:hidden;color:var(--paper);background:radial-gradient(120% 130% at 18% 0%,#5B4B42 0%,#3A2E26 55%,#2a221c 100%)}
  .foxmark{position:absolute;left:-110px;bottom:-150px;width:460px;height:auto;opacity:.10}
  .pad{position:absolute;inset:0;padding:46px 50px;display:flex;gap:42px;align-items:stretch}
  .left{flex:0 0 46%;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:13px}.brand svg{width:56px;height:56px}
  .wordmark{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:21px;color:#fff}
  .eyebrow{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:15px;color:var(--blue);margin-top:26px}
  .headline{font-family:'Spectral',serif;font-weight:700;font-size:88px;line-height:.9;letter-spacing:-.02em;color:#fff;margin-top:6px}
  .headline span{font-size:38px;color:var(--blue)}
  .delta{font-family:'Lato';font-weight:900;font-size:20px;color:var(--sand);margin-top:14px}
  .sub{font-size:17px;font-weight:700;color:var(--sage);margin-top:6px;line-height:1.35}
  .spacer{flex:1}
  .foot{display:flex;align-items:center;gap:16px}
  .pill{font-family:'Lato';font-weight:900;font-size:18px;background:var(--blue);color:#23303a;border-radius:999px;padding:13px 22px}
  .url{font-family:'Spectral SC',serif;letter-spacing:.13em;text-transform:uppercase;font-size:14px;color:var(--paper)}
  .chart{flex:1;background:#fff;border-radius:16px;padding:16px;box-shadow:0 18px 50px -18px rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center}
  .chart img{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
  <div class="canvas">
    <svg class="foxmark" viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
    <div class="pad">
      <div class="left">
        <div class="brand">
          <svg viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
          <span class="wordmark">Tuned Yota</span>
        </div>
        <div class="eyebrow">Dyno-proven</div>
        <div class="headline">292→450<span> WHP</span></div>
        <div class="delta">+158 HP · +138 LB-FT</div>
        <div class="sub">5.7L V8 Tundra · Magnuson Stage 1 + OTT</div>
        <div class="spacer"></div>
        <div class="foot"><span class="pill">Find Your Exact Tune →</span><span class="url">tunedyota.com</span></div>
      </div>
      <div class="chart"><img src="../../../site/images/dyno/tundra-5.7-magnuson-dyno.png" alt="Tundra Magnuson dyno"></div>
    </div>
  </div>
</body>
</html>
