<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Tuned Yota — TESTIMONIAL / REVIEW · 1080×1920 (Story / Reel / TikTok). data: stars, quote, name, vehicle, city. -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Spectral:wght@500;600;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#3A2E26;--blue:#B3D0D9;--sand:#DFC4B5;--sage:#99A08E;--sage-d:#7c8472;--paper:#F3EFEA}
  *{margin:0;box-sizing:border-box}
  body{background:#cfcdca;display:grid;place-items:center;min-height:100vh;padding:24px;font-family:'Lato',sans-serif}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--paper);background:radial-gradient(120% 70% at 75% 0%,#5B4B42 0%,#3A2E26 54%,#2a221c 100%)}
  .foxmark{position:absolute;right:-150px;bottom:-120px;width:720px;height:auto;opacity:.10}
  .qmark{position:absolute;left:70px;top:560px;font-family:'Spectral',serif;font-weight:700;font-size:520px;line-height:.6;color:var(--blue);opacity:.13}
  .pad{position:absolute;inset:0;padding:96px 84px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:18px}.brand svg{width:88px;height:88px}
  .wordmark{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:32px;color:#fff}
  .eyebrow{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:20px;color:var(--blue)}
  .stars{font-size:70px;letter-spacing:10px;color:var(--sand);margin-top:120px}
  .quote{font-family:'Spectral',serif;font-weight:600;font-size:88px;line-height:1.2;color:#fff;margin-top:40px;position:relative;z-index:1}
  .spacer{flex:1}
  .attr{font-family:'Lato';font-weight:900;font-size:36px;color:var(--sand);line-height:1.35}
  .attr span{color:var(--sage);font-weight:700}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:44px;gap:24px}
  .pill{font-family:'Lato';font-weight:900;font-size:30px;background:var(--blue);color:#23303a;border-radius:999px;padding:22px 38px;white-space:nowrap}
  .url{font-family:'Spectral SC',serif;letter-spacing:.14em;text-transform:uppercase;font-size:21px;color:var(--paper)}
</style>
</head>
<body>
  <div class="canvas">
    <svg class="foxmark" viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
    <div class="qmark">&ldquo;</div>
    <div class="pad">
      <div class="top">
        <div class="brand">
          <svg viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
          <span class="wordmark">Tuned Yota</span>
        </div>
        <span class="eyebrow">Customer Review</span>
      </div>
      <div class="stars">★★★★★</div>
      <div class="quote">First drive after the tune and the gear hunting is just gone — smoother shifts, instant throttle. Should've done it sooner.</div>
      <div class="spacer"></div>
      <div class="attr">Marcus R.<br><span>5th-Gen 4Runner · Duluth, MN</span></div>
      <div class="foot">
        <span class="pill">Find Your Exact Tune →</span>
        <span class="url">tunedyota.com</span>
      </div>
    </div>
  </div>
</body>
</html>
