<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Tuned Yota — EVENT FLYER · 1080×565 (link preview / FB / website). Text left, full-height photo + QR card right. -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Spectral:wght@500;600;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--blue:#B3D0D9;--sand:#DFC4B5;--sage:#99A08E;--sage-d:#7c8472;--paper:#F3EFEA;--ink:#3A2E26}
  *{margin:0;box-sizing:border-box}
  body{background:#cfcdca;display:grid;place-items:center;min-height:100vh;padding:24px;font-family:'Lato',sans-serif}
  .canvas{width:1080px;height:565px;position:relative;overflow:hidden;color:var(--paper);background:radial-gradient(120% 130% at 10% 0%,#5B4B42 0%,#3A2E26 55%,#2a221c 100%)}
  .foxmark{position:absolute;left:-90px;bottom:-140px;width:400px;height:auto;opacity:.10;z-index:1}
  .row{position:absolute;inset:0;display:flex}
  .left{flex:1;padding:48px 50px;display:flex;flex-direction:column;position:relative;z-index:2}
  .brand{display:flex;align-items:center;gap:14px}.brand svg{width:62px;height:62px}
  .wordmark{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:22px;color:#fff}
  .eyebrow{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.24em;text-transform:uppercase;font-size:16px;color:var(--sand);margin-top:30px}
  .city{font-family:'Spectral',serif;font-weight:700;font-size:72px;line-height:.95;color:#fff;margin-top:8px}
  .date{font-family:'Spectral',serif;font-weight:600;font-size:34px;color:var(--blue);margin-top:8px}
  .chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
  .chip{font-family:'Lato';font-weight:900;font-size:14px;color:var(--paper);border:2px solid rgba(179,208,217,.5);border-radius:999px;padding:8px 15px}
  .spacer{flex:1}
  .slots{font-family:'Lato';font-weight:900;font-size:19px;color:#fff;margin-bottom:14px}.slots b{color:var(--sand)}
  .foot{display:flex;align-items:center;gap:16px}
  .pill{font-family:'Lato';font-weight:900;font-size:18px;background:var(--blue);color:#23303a;border-radius:999px;padding:13px 24px}
  .url{font-family:'Spectral SC',serif;letter-spacing:.13em;text-transform:uppercase;font-size:14px;color:var(--paper)}
  .right{flex:0 0 404px;position:relative;overflow:hidden}
  .right img{width:100%;height:100%;object-fit:cover;display:block}
  .rscrim{position:absolute;inset:0;background:linear-gradient(90deg,#2a221c 0%,rgba(42,34,28,.35) 18%,transparent 46%)}
  .qrcard{position:absolute;right:22px;bottom:22px;display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;padding:13px 16px 13px 13px;box-shadow:0 16px 44px -16px rgba(0,0,0,.7)}
  .qrcard img{width:96px;height:96px;display:block}
  .qrcard .qt{font-family:'Spectral',serif;font-weight:700;font-size:21px;color:var(--ink);line-height:1.08}
  .qrcard .qu{font-family:'Spectral SC',serif;letter-spacing:.1em;text-transform:uppercase;font-size:12px;color:var(--sage-d);margin-top:6px}
</style>
</head>
<body>
  <div class="canvas">
    <svg class="foxmark" viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
    <div class="row">
      <div class="left">
        <div class="brand">
          <svg viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
          <span class="wordmark">Tuned Yota</span>
        </div>
        <div class="eyebrow">OTT Tuning Event</div>
        <div class="city">Green Bay, WI</div>
        <div class="date">September 12, 2026</div>
        <div class="chips"><span class="chip">Dyno-proven</span><span class="chip">Emissions intact</span><span class="chip">Authorized Magnuson dealer</span></div>
        <div class="spacer"></div>
        <div class="slots">Limited slots — <b>book before they fill.</b></div>
        <div class="foot"><span class="pill">Find Your Exact Tune →</span><span class="url">tunedyota.com · (612) 406-7117</span></div>
      </div>
      <div class="right">
        <img src="../../../site/images/toyota-tundra.jpg" alt="">
        <div class="rscrim"></div>
        <div class="qrcard">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=0&data=https%3A%2F%2Ftunedyota.com%2Ffind-your-exact-tune%3Futm_source%3Dflyer%26utm_campaign%3Dgreen-bay" alt="Scan to book">
          <div><div class="qt">Scan to<br>book</div><div class="qu">tunedyota.com</div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
