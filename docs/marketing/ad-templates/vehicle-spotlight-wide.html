<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Tuned Yota — VEHICLE SPOTLIGHT · 1080×565 (link preview / FB shared link / website). data: photo, model, price. -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Spectral:wght@500;600;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--blue:#B3D0D9;--sand:#DFC4B5;--sage:#99A08E;--paper:#F3EFEA}
  *{margin:0;box-sizing:border-box}
  body{background:#cfcdca;display:grid;place-items:center;min-height:100vh;padding:24px;font-family:'Lato',sans-serif}
  .canvas{width:1080px;height:565px;position:relative;overflow:hidden;color:var(--paper)}
  .photo,.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(30,23,18,.94) 0%,rgba(36,28,22,.55) 48%,rgba(36,28,22,.1) 100%)}
  .foxmark{position:absolute;right:34px;top:-40px;width:300px;height:auto;opacity:.16}
  .pad{position:absolute;inset:0;padding:48px 54px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:14px}
  .top svg{width:54px;height:54px;filter:drop-shadow(0 2px 10px rgba(0,0,0,.5))}
  .wordmark{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:22px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .spacer{flex:1}
  .eyebrow{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.22em;text-transform:uppercase;font-size:16px;color:var(--blue);text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .headline{font-family:'Spectral',serif;font-weight:700;font-size:58px;line-height:1.0;color:#fff;margin-top:6px;text-shadow:0 4px 22px rgba(0,0,0,.55)}
  .meta{font-family:'Lato';font-weight:900;font-size:21px;color:var(--sand);margin-top:14px}
  .foot{display:flex;align-items:center;gap:18px;margin-top:18px}
  .pill{font-family:'Lato';font-weight:900;font-size:19px;background:var(--blue);color:#23303a;border-radius:999px;padding:14px 24px}
  .url{font-family:'Spectral SC',serif;letter-spacing:.14em;text-transform:uppercase;font-size:15px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6)}
</style>
</head>
<body>
  <div class="canvas">
    <div class="photo"><img src="../../../site/images/toyota-tundra.jpg" alt="Toyota Tundra"></div>
    <div class="scrim"></div>
    <svg class="foxmark" viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
    <div class="pad">
      <div class="top">
        <svg viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
        <span class="wordmark">Tuned Yota</span>
      </div>
      <div class="spacer"></div>
      <div class="eyebrow">Toyota Tundra · OTT Tune</div>
      <div class="headline">Sharper. Smoother. Stronger.</div>
      <div class="meta">From $500 · dyno-proven · real, drivable power</div>
      <div class="foot">
        <span class="pill">Find Your Exact Tune →</span>
        <span class="url">tunedyota.com</span>
      </div>
    </div>
  </div>
</body>
</html>
