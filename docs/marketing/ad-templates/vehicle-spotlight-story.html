<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Tuned Yota — VEHICLE SPOTLIGHT · 1080×1920 (Story / Reel / TikTok). data: photo, model, price, proof. -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Spectral:wght@500;600;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--blue:#B3D0D9;--sand:#DFC4B5;--sage:#99A08E;--paper:#F3EFEA}
  *{margin:0;box-sizing:border-box}
  body{background:#cfcdca;display:grid;place-items:center;min-height:100vh;padding:24px;font-family:'Lato',sans-serif}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--paper)}
  .photo,.photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(36,28,22,.66) 0%,rgba(36,28,22,.08) 30%,rgba(36,28,22,.15) 52%,rgba(30,23,18,.94) 100%)}
  .foxmark{position:absolute;right:-70px;top:120px;width:520px;height:auto;opacity:.16}
  .pad{position:absolute;inset:0;padding:90px 80px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:18px}
  .brand svg{width:84px;height:84px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5))}
  .wordmark{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:30px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5)}
  .tag{font-family:'Spectral SC',serif;letter-spacing:.2em;text-transform:uppercase;font-size:15px;color:var(--blue);text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .spacer{flex:1}
  .eyebrow{font-family:'Spectral SC',serif;font-weight:600;letter-spacing:.24em;text-transform:uppercase;font-size:26px;color:var(--blue);text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .headline{font-family:'Spectral',serif;font-weight:700;font-size:128px;line-height:.98;letter-spacing:-.01em;color:#fff;margin-top:16px;text-shadow:0 4px 28px rgba(0,0,0,.55)}
  .meta{font-family:'Lato';font-weight:900;font-size:36px;color:var(--sand);margin-top:28px}
  .proof{font-size:30px;font-weight:700;color:var(--paper);margin-top:12px;opacity:.95;line-height:1.4}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:44px;gap:24px}
  .pill{font-family:'Lato';font-weight:900;font-size:30px;background:var(--blue);color:#23303a;border-radius:999px;padding:22px 36px;white-space:nowrap}
  .url{font-family:'Spectral SC',serif;letter-spacing:.14em;text-transform:uppercase;font-size:21px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6)}
</style>
</head>
<body>
  <div class="canvas">
    <div class="photo"><img src="../../../site/images/toyota-tundra.jpg" alt="Toyota Tundra"></div>
    <div class="scrim"></div>
    <svg class="foxmark" viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
    <div class="pad">
      <div class="top">
        <div class="brand">
          <svg viewBox="3.879 5.098 40.002 39.316" xmlns="http://www.w3.org/2000/svg"><path fill="#B3D0D9" d="M23.881,44.414L3.879,29.408l5.022-7.53V5.098L19.837,18.77h8.094L38.86,5.098v16.78l5.021,7.53L23.881,44.414z M7.037,28.869l16.844,12.638l16.85-12.638l-4.189-6.287V11.726l-7.5,9.36H18.72l-7.493-9.36v10.857L7.037,28.869z"/></svg>
          <span class="wordmark">Tuned Yota</span>
        </div>
        <span class="tag">Undeniable Performance</span>
      </div>
      <div class="spacer"></div>
      <div class="eyebrow">Toyota Tundra · OTT Tune</div>
      <div class="headline">Sharper.<br>Smoother.<br>Stronger.</div>
      <div class="meta">From $500 · dyno-proven · emissions intact</div>
      <div class="proof">Fixes lazy shifting, throttle lag &amp; gear hunting — 5-gas verified.</div>
      <div class="foot">
        <span class="pill">Find Your Exact Tune →</span>
        <span class="url">tunedyota.com</span>
      </div>
    </div>
  </div>
</body>
</html>
